<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>블로그 발행기</title>
  <script src="https://t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <style>
    :root{
      --bg:#ffffff;
      --line:#e6ebf1;
      --text:#111318;
      --muted:#67707b;
      --blue:#0f7cff;
      --blue-soft:#eef5ff;
      --shadow:0 14px 30px rgba(15,23,42,.05);
      --hero-on:#dff7bf;
      --hero-on-line:#b7e37d;
      --hero-on-text:#4e7b10;
      --hero-off:#f3f5f8;
      --hero-off-line:#dce3ea;
      --hero-off-text:#9aa4af;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:#fff;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif !important;
      letter-spacing:-0.02em;
      overflow-x:hidden;
    }
    body{min-width:0}
    img{display:block;max-width:100%}
    button,input,select{font:inherit}
    button{border:none;background:none;cursor:pointer}
    .page{
      min-height:100vh;
      background:linear-gradient(180deg,#ffffff 0%,#f9fbff 100%);
      overflow-x:hidden;
    }
    .shell{
      width:100%;
      max-width:980px;
      margin:0 auto;
      padding:0 20px 128px;
      min-width:0;
      overflow-x:hidden;
    }
    .head{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(230,235,241,.95);
      padding:14px 0 12px;
    }
    .head-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
      min-width:0;
    }
    .title{
      font-size:22px;
      line-height:1.1;
      font-weight:900;
      color:#111318;
      letter-spacing:-0.04em;
      min-width:0;
    }
    .ghost-btn{
      min-height:40px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111;
      font-size:14px;
      font-weight:800;
      flex:0 0 auto;
    }

    .top-tools{
      display:grid;
      grid-template-columns:190px minmax(0,1fr);
      gap:8px;
      align-items:center;
      min-width:0;
    }
    .date-nav{
      display:grid;
      grid-template-columns:32px minmax(0,1fr) 32px;
      align-items:center;
      gap:4px;
      min-height:44px;
      padding:0 6px;
      border:1px solid #dce6f1;
      border-radius:14px;
      background:#fff;
      box-shadow:0 8px 20px rgba(15,23,42,.03);
      min-width:0;
      overflow:hidden;
    }
    .nav-arrow{
      width:32px;
      min-width:32px;
      max-width:32px;
      min-height:30px;
      height:30px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:10px;
      color:#111318;
      font-size:20px;
      font-weight:900;
      flex:0 0 32px;
      user-select:none;
    }
    .date-trigger{
      min-width:0;
      width:100%;
      min-height:30px;
      height:30px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:13px;
      font-weight:900;
      letter-spacing:-0.03em;
      color:#111318;
    }
    .search-col{
      min-width:0;
      width:100%;
    }
    .search-input{
      width:100%;
      min-width:0;
      min-height:44px;
      padding:0 14px;
      border-radius:14px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:14px;
      font-weight:800;
      outline:none;
      box-shadow:0 8px 20px rgba(15,23,42,.03);
    }
    .search-input::placeholder{
      color:rgba(123,135,148,.55);
      font-weight:700;
    }
    .meta-line{
      margin-top:8px;
      padding-left:2px;
      font-size:12px;
      color:#7b8794;
      font-weight:800;
      line-height:1.4;
    }

    .section{
      margin-top:16px;
      border:1px solid var(--line);
      border-radius:28px;
      background:#fff;
      box-shadow:var(--shadow);
      padding:14px;
      min-width:0;
      overflow:hidden;
    }
    .section-title{
      margin:0 0 12px;
      font-size:18px;
      line-height:1.25;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.04em;
    }
    .empty{
      border:1px dashed #d9e3ed;
      border-radius:22px;
      background:#fff;
      padding:28px 18px;
      text-align:center;
      color:#7b8794;
      font-size:14px;
      font-weight:800;
    }

    .listing-slider-wrap{
      width:100%;
      overflow-x:auto;
      overflow-y:visible;
      -webkit-overflow-scrolling:touch;
      min-width:0;
    }
    .listing-slider-wrap::-webkit-scrollbar{display:none}
    .listing-slider{
      display:flex;
      gap:12px;
      width:max-content;
      max-width:none;
      min-width:100%;
    }
    .listing-card{
      flex:0 0 232px;
      width:232px;
      border:1px solid #e6ebf1;
      border-radius:22px;
      background:#fff;
      overflow:hidden;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      cursor:pointer;
    }
    .listing-card.is-active{
      border-color:#bfdcff;
      box-shadow:0 14px 26px rgba(15,124,255,.10);
    }
    .listing-thumb{
      width:100%;
      height:152px;
      background:#edf2f7 center/cover no-repeat;
    }
    .listing-body{
      padding:12px;
      display:grid;
      gap:7px;
    }
    .listing-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }
    .listing-team{
      min-height:24px;
      padding:0 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .listing-team.shopping{background:#fff3f7;color:#c13f73;border:1px solid #efb6c8}
    .listing-team.factory{background:#eef5ff;color:#0f7cff;border:1px solid #cfe2ff}
    .listing-no{
      font-size:11px;
      color:#7b8794;
      font-weight:900;
    }
    .listing-title{
      font-size:16px;
      line-height:1.4;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.03em;
      min-height:44px;
      word-break:keep-all;
    }
    .listing-address,.listing-price{
      font-size:12px;
      line-height:1.5;
      color:#58616b;
      font-weight:700;
      word-break:keep-all;
    }

    .slider-bar-wrap{
      display:block;
      margin-top:10px;
      padding:16px 0;
    }
    .slider-track{
      position:relative;
      height:6px;
      background:#eef2f6;
      border-radius:999px;
      overflow:visible;
    }
    .slider-track-hit{
      position:absolute;
      left:0;
      right:0;
      top:50%;
      height:36px;
      transform:translateY(-50%);
      background:transparent;
      cursor:pointer;
    }
    .slider-thumb-hit{
      position:absolute;
      left:0;
      top:50%;
      height:36px;
      width:0;
      transform:translateY(-50%) translateX(0);
      display:flex;
      align-items:center;
      background:transparent;
      cursor:grab;
    }
    .slider-thumb{
      width:100%;
      height:6px;
      background:#0f7cff;
      border-radius:999px;
    }

    .selected-summary{
      display:none;
      margin-top:16px;
      border:1px solid var(--line);
      border-radius:24px;
      background:#fff;
      box-shadow:var(--shadow);
      padding:16px;
    }
    .selected-summary.show{display:block}
    .selected-title{
      font-size:20px;
      line-height:1.3;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.04em;
      margin-bottom:6px;
    }
    .selected-sub{
      font-size:13px;
      line-height:1.6;
      color:#66707a;
      font-weight:700;
    }

    .assets-section{display:none}
    .assets-section.show{display:block}
    .tools-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .tools-left,.tools-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .chip{
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#5d6670;
      font-size:12px;
      font-weight:900;
    }
    .mini-btn{
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:12px;
      font-weight:900;
    }
    .mini-btn.blue{background:#eef5ff;border-color:#cfe2ff;color:#0f7cff}
    .mini-btn.pink{background:#fff3f7;border-color:#efb6c8;color:#b83268}

    .asset-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
      min-width:0;
    }
    .asset-card{
      border:1px solid #e6ebf1;
      border-radius:22px;
      background:#fff;
      overflow:hidden;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      min-width:0;
    }
    .asset-preview{
      position:relative;
      width:100%;
      aspect-ratio:1 / .9;
      background:#edf2f7 center/cover no-repeat;
      border-bottom:1px solid #eef2f6;
    }
    .asset-hero{
      position:absolute;
      top:8px;
      left:8px;
      min-height:22px;
      padding:0 6px;
      border-radius:8px;
      background:var(--hero-off);
      border:1px solid var(--hero-off-line);
      color:var(--hero-off-text);
      font-size:10px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      cursor:pointer;
      z-index:2;
    }
    .asset-card.is-hero .asset-hero{
      background:var(--hero-on);
      border-color:var(--hero-on-line);
      color:var(--hero-on-text);
    }
    .asset-check{
      position:absolute;
      top:8px;
      right:8px;
      width:24px;
      height:24px;
      border-radius:8px;
      background:#fff;
      border:2px solid #0f7cff;
      color:transparent;
      font-size:14px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      cursor:pointer;
      z-index:2;
      box-shadow:0 6px 14px rgba(15,23,42,.08);
    }
    .asset-card.is-selected .asset-check{
      background:#0f7cff;
      border-color:#0f7cff;
      color:#fff;
    }
    .asset-body{
      padding:9px;
      display:grid;
      gap:6px;
    }
    .asset-fixed-label{
      width:100%;
      min-height:32px;
      border-radius:10px;
      border:1px solid #dce6f1;
      background:#f8fbff;
      color:#2643a2;
      padding:6px 10px;
      font-size:12px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .select{
      width:100%;
      min-height:32px;
      border-radius:10px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111;
      padding:0 8px;
      outline:none;
      font-size:12px;
      font-weight:800;
    }
    .asset-paragraph-mobile-btn{
      display:none;
      width:100%;
      min-height:40px;
      border-radius:12px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      padding:0 12px;
      font-size:13px;
      font-weight:900;
      letter-spacing:-0.03em;
    }

    .paragraph-picker{
      position:fixed;
      inset:0;
      z-index:185;
      display:none;
      align-items:flex-end;
      justify-content:center;
      background:rgba(17,24,39,.42);
      backdrop-filter:blur(2px);
    }
    .paragraph-picker.show{display:flex}
    .paragraph-picker-sheet{
      width:100%;
      max-width:980px;
      background:#fff;
      border-radius:24px 24px 0 0;
      padding:16px 0 calc(18px + env(safe-area-inset-bottom, 0px));
      box-shadow:0 -18px 42px rgba(15,23,42,.16);
    }
    .paragraph-picker-head{
      padding:0 16px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .paragraph-picker-title{
      font-size:16px;
      line-height:1.3;
      font-weight:900;
      color:#111318;
      letter-spacing:-0.04em;
    }
    .paragraph-picker-close{
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:22px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .paragraph-picker-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
      padding:0 12px;
    }
    .paragraph-picker-btn{
      min-height:54px;
      border-radius:16px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      padding:0 6px;
      font-size:15px;
      font-weight:900;
      letter-spacing:-0.04em;
    }
    .paragraph-picker-btn.is-active{
      background:#eef5ff;
      border-color:#bfdcff;
      color:#0f7cff;
    }

    .image-viewer{
      position:fixed;
      inset:0;
      z-index:180;
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:rgba(17,24,39,.82);
      backdrop-filter:blur(3px);
    }
    .image-viewer.show{display:flex}
    .image-viewer-dialog{
      position:relative;
      width:min(92vw, 980px);
      max-height:88vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .image-viewer-img{
      display:block;
      max-width:100%;
      max-height:88vh;
      border-radius:20px;
      background:#fff;
      box-shadow:0 18px 42px rgba(0,0,0,.28);
      object-fit:contain;
    }
    .image-viewer-close{
      position:absolute;
      top:-14px;
      right:-14px;
      width:42px;
      height:42px;
      border-radius:999px;
      background:#fff;
      border:1px solid #dce6f1;
      color:#111318;
      font-size:24px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 22px rgba(15,23,42,.18);
    }

    .bottom-bar{
      position:fixed;
      left:50%;
      bottom:calc(18px + env(safe-area-inset-bottom, 0px));
      transform:translateX(-50%);
      z-index:40;
      width:min(980px - 32px, calc(100% - 20px));
      display:flex;
      gap:10px;
      padding:10px;
      border-radius:22px;
      border:1px solid #dfe7f0;
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(10px);
      box-shadow:0 16px 36px rgba(15,23,42,.12);
    }
    .bottom-btn{
      flex:1 1 auto;
      min-height:52px;
      border-radius:16px;
      font-size:15px;
      font-weight:900;
      letter-spacing:-0.03em;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111;
    }
    .bottom-btn.primary{
      background:#0f7cff;
      border-color:#0f7cff;
      color:#fff;
    }
    .bottom-btn:disabled{opacity:.5;cursor:default}

    .calendar-modal{
      position:fixed;
      inset:0;
      z-index:120;
      display:none;
      background:#f7f8fb;
    }
    .calendar-modal.show{display:block}
    .calendar-sheet{
      width:100vw;
      height:100dvh;
      min-height:100dvh;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      background:#f7f8fb;
    }
    .calendar-top{
      position:sticky;
      top:0;
      z-index:3;
      min-height:72px;
      background:rgba(247,248,251,.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid #e7ebf1;
    }
    .calendar-top-inner{
      max-width:980px;
      margin:0 auto;
      padding:0 20px;
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .calendar-back{
      min-height:42px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid #d8e0ea;
      background:#fff;
      color:#111318;
      font-size:14px;
      font-weight:800;
    }
    .calendar-title{
      flex:1 1 auto;
      text-align:center;
      font-size:18px;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.04em;
    }
    .calendar-spacer{width:72px;flex:0 0 72px}
    .calendar-inner{
      max-width:980px;
      margin:0 auto;
      padding:14px 20px 28px;
    }
    .calendar-shell{
      border:1px solid #e5e9ef;
      border-radius:30px;
      background:#fdfefe;
      box-shadow:0 14px 30px rgba(15,23,42,.04);
      padding:18px 18px 16px;
      overflow:hidden;
    }
    .calendar-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .calendar-nav{
      width:42px;
      height:42px;
      border-radius:999px;
      border:1px solid #dde4ec;
      background:#fff;
      color:#111318;
      font-size:24px;
      line-height:1;
      font-weight:500;
    }
    .calendar-month-label{
      font-size:17px;
      font-weight:800;
      color:#17191d;
      letter-spacing:-0.03em;
    }
    .calendar-weekdays{
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
      padding:0 2px 8px;
      border-bottom:1px solid #edf1f5;
    }
    .calendar-weekday{
      text-align:center;
      font-size:12px;
      font-weight:700;
      color:#7f8792;
      padding:0 0 6px;
    }
    .calendar-grid{
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
    }
    .calendar-cell{
      min-height:76px;
      padding:5px 5px 5px;
      border-right:1px solid #eef2f6;
      border-bottom:1px solid #eef2f6;
      background:transparent;
      text-align:left;
      display:flex;
      flex-direction:column;
      gap:2px;
      border-radius:0;
      min-width:0;
    }
    .calendar-cell:nth-child(7n){border-right:none}
    .calendar-cell.is-selected{background:#eef5ff}
    .calendar-day-number{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:4px;
      font-size:16px;
      line-height:1.15;
      font-weight:700;
      color:#111318;
    }
    .calendar-lines{
      margin-top:3px;
      display:grid;
      gap:2px;
      line-height:1.22;
    }
    .calendar-line{
      font-size:11.5px;
      line-height:1.32;
      font-weight:400;
      color:#5f6873;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .calendar-line.zero{display:none}

    .loading-overlay{
      position:fixed;
      inset:0;
      z-index:140;
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(3px);
    }
    .loading-overlay.show{display:flex}
    .loading-panel{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-align:center;
    }
    .loading-buddy{
      width:74px;
      height:74px;
      object-fit:cover;
      border-radius:18px;
      animation:buddyBounce 1.15s ease-in-out infinite;
      box-shadow:0 10px 22px rgba(15,124,255,.16);
    }
    .loading-text{
      min-height:24px;
      font-size:18px;
      font-weight:800;
      line-height:1.4;
      color:#2b8fe8;
      letter-spacing:-0.03em;
    }
    @keyframes buddyBounce{
      0%,100%{transform:translateY(0) scale(1)}
      20%{transform:translateY(-3px) scale(1.01)}
      50%{transform:translateY(-10px) scale(1.04)}
      75%{transform:translateY(-4px) scale(1.01)}
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:calc(92px + env(safe-area-inset-bottom, 0px));
      transform:translateX(-50%);
      z-index:160;
      min-width:180px;
      max-width:calc(100% - 48px);
      padding:13px 16px;
      border-radius:14px;
      background:rgba(17,24,39,.92);
      color:#fff;
      font-size:14px;
      line-height:1.45;
      font-weight:800;
      text-align:center;

  <script>
    const CONFIG = {
      adminListUrl: 'https://script.google.com/macros/s/AKfycbznhBvYFIv_GKeNoGIPFTi_mIXXH04BOvYrb4ZN9dk_Cc4Xjir3TP_vL3bbPrLLxgg2/exec',
      editorUrl: '/blog-editor',
      statusUrl: '/blog-status'
    };

    let rawItems = [];
    let selectedDate = '';
    let calendarCurrentMonth = '';
    let calendarOverviewMap = {};
    let selectedListing = null;
    let selectedAddressSearchData = null;
    let lastLookupResult = null;
    let assets = [];
    let searchTimer = null;
    let activeParagraphPickerAssetId = '';
    let selectedAiStyle = '깔끔형';

    const els = {
      goStatusBtn: document.getElementById('goStatusBtn'),
      prevDateBtn: document.getElementById('prevDateBtn'),
      nextDateBtn: document.getElementById('nextDateBtn'),
      datePickerBtn: document.getElementById('datePickerBtn'),
      searchInput: document.getElementById('searchInput'),
      dateMetaLine: document.getElementById('dateMetaLine'),
      listingEmpty: document.getElementById('listingEmpty'),
      listingSliderWrap: document.getElementById('listingSliderWrap'),
      listingSlider: document.getElementById('listingSlider'),
      listingSliderBarWrap: document.getElementById('listingSliderBarWrap'),
      listingSliderTrack: document.getElementById('listingSliderTrack'),
      listingSliderTrackHit: document.getElementById('listingSliderTrackHit'),
      listingSliderBarHit: document.getElementById('listingSliderBarHit'),
      listingSliderBar: document.getElementById('listingSliderBar'),
      selectedSummary: document.getElementById('selectedSummary'),
      selectedListingTitle: document.getElementById('selectedListingTitle'),
      selectedListingSub: document.getElementById('selectedListingSub'),
      assetsSection: document.getElementById('assetsSection'),
      assetGrid: document.getElementById('assetGrid'),
      selectedCountChip: document.getElementById('selectedCountChip'),
      heroCountChip: document.getElementById('heroCountChip'),
      generateInfoImageBtn: document.getElementById('generateInfoImageBtn'),
      draftSaveBtn: document.getElementById('draftSaveBtn'),
      publishPrepBtn: document.getElementById('publishPrepBtn'),
      aiCallModal: document.getElementById('aiCallModal'),
      aiStyleGrid: document.getElementById('aiStyleGrid'),
      aiDirectionInput: document.getElementById('aiDirectionInput'),
      aiCallCancelBtn: document.getElementById('aiCallCancelBtn'),
      aiCallConfirmBtn: document.getElementById('aiCallConfirmBtn'),
      calendarModal: document.getElementById('calendarModal'),
      calendarBackBtn: document.getElementById('calendarBackBtn'),
      calendarPrevBtn: document.getElementById('calendarPrevBtn'),
      calendarNextBtn: document.getElementById('calendarNextBtn'),
      calendarMonthLabel: document.getElementById('calendarMonthLabel'),
      calendarGrid: document.getElementById('calendarGrid'),
      loadingOverlay: document.getElementById('loadingOverlay'),
      loadingText: document.getElementById('loadingText'),
      toast: document.getElementById('toast'),
      imageViewer: document.getElementById('imageViewer'),
      imageViewerClose: document.getElementById('imageViewerClose'),
      imageViewerImg: document.getElementById('imageViewerImg'),
      paragraphPicker: document.getElementById('paragraphPicker'),
      paragraphPickerClose: document.getElementById('paragraphPickerClose'),
      paragraphPickerGrid: document.getElementById('paragraphPickerGrid')
    };

    function text(v){ return String(v == null ? '' : v).trim(); }
    function escapeAttr(v){
      return String(v == null ? '' : v)
        .replace(/&/g,'&amp;')
        .replace(/"/g,'&quot;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
    }
    function parseDateValue(value){
      const s = text(value);
      if(!s) return null;
      const t = new Date(s).getTime();
      return Number.isNaN(t) ? null : t;
    }
    function formatDateKeyFromTs(ts){
      const d = new Date(ts);
      return [
        d.getFullYear(),
        String(d.getMonth()+1).padStart(2,'0'),
        String(d.getDate()).padStart(2,'0')
      ].join('-');
    }
    function formatDateLabel(dateKey){
      if(!dateKey) return '날짜 선택';
      const d = new Date(dateKey + 'T00:00:00');
      return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
    }
    function formatMonthLabel(monthKey){
      const parts = String(monthKey || '').split('-');
      if(parts.length !== 2) return '';
      return Number(parts[0]) + '.' + parts[1];
    }
    function getCurrentMonthKeyFromDate(dateKey){
      return text(dateKey).slice(0, 7);
    }
    function detectTeamByListingNumber(listingNumber){
      const s = text(listingNumber).toUpperCase();
      if(s.indexOf('SK-') === 0 || s.indexOf('SK') === 0) return 'shopping';
      if(s.indexOf('MK-') === 0 || s.indexOf('MK') === 0) return 'factory';
      return '';
    }
    function teamLabel(teamType){
      if(teamType === 'shopping') return '상가';
      if(teamType === 'factory') return '공장';
      return '매물';
    }
    function firstDayOfMonthKey(baseDateKey){
      const d = baseDateKey ? new Date(baseDateKey + 'T00:00:00') : new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    }
    function safeJsonParse(textValue, fallback){
      try{
        const parsed = JSON.parse(textValue);
        return parsed == null ? fallback : parsed;
      }catch(e){
        return fallback;
      }
    }
    function showToast(message){
      if(!message) return;
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(function(){
        els.toast.classList.remove('show');
      }, 1800);
    }
    function setLoading(on, label){
      els.loadingText.textContent = label || '불러오는 중';
      els.loadingOverlay.classList.toggle('show', !!on);
    }

    function normalizeItem(item, idx){
      const photoList = safeJsonParse(item && item.photoUrlsJson || '[]', []) || [];
      let firstPhoto = '';
      if(Array.isArray(photoList) && photoList.length){
        const p0 = photoList[0];
        firstPhoto = typeof p0 === 'string' ? p0 : (p0 && (p0.heroUrl || p0.url || p0.lightUrl || p0.thumbUrl)) || '';
      }
      return {
        id: text(item && item.listingNumber) || ('LIST-' + idx),
        listingNumber: text(item && item.listingNumber),
        title: text(item && item.title) || text(item && item.summary1) || '제목 없음',
        address: text(item && item.address),
        dealType: text(item && item.dealType),
        price: text(item && (item.price || item.salePrice)),
        deposit: text(item && item.deposit),
        monthlyRent: text(item && item.monthlyRent),
        heroUrl: text(item && item.heroUrl) || firstPhoto,
        photoUrlsJson: text(item && item.photoUrlsJson) || '[]',
        createdAt: text(item && item.createdAt),
        updatedAt: text(item && item.updatedAt),
        raw: item || {}
      };
    }

    function formatDealPrice(item){
      const dealType = text(item.dealType);
      const price = text(item.price);
      if(dealType && price) return dealType + ' / ' + price;
      if(dealType) return dealType;
      if(price) return price;
      if(item.deposit || item.monthlyRent){
        return '보증금 ' + (item.deposit || '-') + ' / 월세 ' + (item.monthlyRent || '-');
      }
      return '-';
    }

    function fetchPostJson(payload){
      return fetch(CONFIG.adminListUrl, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body: JSON.stringify(payload)
      }).then(function(res){
        if(!res.ok) throw new Error('조회 실패: ' + res.status);
        return res.json();
      });
    }

    function fetchAdminItems(){
      const monthKey = calendarCurrentMonth || firstDayOfMonthKey(selectedDate || formatDateKeyFromTs(Date.now()));
      setLoading(true, '매물 불러오는 중');
      return Promise.all([
        fetchPostJson({ action: 'listAdminProperties' }),
        fetchPostJson({ action: 'getCalendarOverview', month: monthKey })
      ])
      .then(function(results){
        const propertyData = results[0] || {};
        const calendarData = results[1] || {};

        const items = Array.isArray(propertyData && propertyData.items) ? propertyData.items : [];
        rawItems = items.map(normalizeItem);

        calendarCurrentMonth = monthKey;
        calendarOverviewMap = {};

        (Array.isArray(calendarData && calendarData.days) ? calendarData.days : []).forEach(function(day){
          const dateKey = text(day && day.dateKey);
          calendarOverviewMap[dateKey] = {
            shoppingCount: Number(day && day.shoppingCount || 0),
            factoryCount: Number(day && day.factoryCount || 0),
            threadCount: Number(day && day.threadCount || 0)
          };
        });

        if(!selectedDate){
          selectedDate = formatDateKeyFromTs(Date.now());
        }

        renderDateMetaLine();
        renderCalendarGrid();
        applyFiltersAndRenderListings();
      })
      .catch(function(err){
        console.error(err);
        els.listingEmpty.style.display = 'block';
        els.listingEmpty.textContent = '매물 데이터를 불러오지 못했습니다.';
        els.listingSliderWrap.style.display = 'none';
        showToast((err && err.message) || '불러오기 실패');
      })
      .finally(function(){
        setLoading(false);
      });
    }

    function getLocalCalendarPropertiesByDate(dateKey){
      return rawItems
        .filter(function(item){
          const created = parseDateValue(item && item.createdAt);
          if(!created) return false;
          return formatDateKeyFromTs(created) === dateKey;
        })
        .sort(function(a, b){
          return (parseDateValue(b.createdAt) || 0) - (parseDateValue(a.createdAt) || 0);
        });
    }

    function matchesKeyword(item, keyword){
      if(!keyword) return true;
      const haystack = [
        item.title, item.address, item.listingNumber, item.dealType, item.price,
        item.raw && item.raw.summary1, item.raw && item.raw.summary2, item.raw && item.raw.summary3
      ].map(text).join(' ').toLowerCase();
      return haystack.indexOf(keyword.toLowerCase()) > -1;
    }

    function applyFiltersAndRenderListings(){
      const keyword = text(els.searchInput.value);
      let items = selectedDate ? getLocalCalendarPropertiesByDate(selectedDate) : rawItems.slice();
      if(keyword){
        items = items.filter(function(item){ return matchesKeyword(item, keyword); });
      }
      renderListingSlider(items);
    }

    function renderListingSlider(items){
      selectedListing = null;
      assets = [];
      lastLookupResult = null;
      selectedAddressSearchData = null;
      els.selectedSummary.classList.remove('show');
      els.assetsSection.classList.remove('show');
      els.assetGrid.innerHTML = '';
      syncBottomButtons();

      if(!Array.isArray(items) || !items.length){
        els.listingEmpty.style.display = 'block';
        els.listingEmpty.textContent = '해당 조건의 매물이 없습니다.';
        els.listingSliderWrap.style.display = 'none';
        if(els.listingSliderBarWrap) els.listingSliderBarWrap.style.display = 'none';
        return;
      }

      els.listingEmpty.style.display = 'none';
      els.listingSliderWrap.style.display = 'block';
      if(els.listingSliderBarWrap){
        els.listingSliderBarWrap.style.display = (window.innerWidth <= 860 ? 'none' : 'block');
      }

      els.listingSlider.innerHTML = items.map(function(item){
        const team = detectTeamByListingNumber(item.listingNumber);

        return ''
          + '<div class="listing-card" data-id="' + escapeAttr(item.id) + '">'
          + '  <div class="listing-thumb" style="' + thumb + '"></div>'
          + '  <div class="listing-body">'
          + '    <div class="listing-top">'
          + '      <div class="listing-team ' + team + '">' + teamLabel(team) + '</div>'
          + '      <div class="listing-no">' + escapeAttr(item.listingNumber) + '</div>'
          + '    </div>'
          + '    <div class="listing-title">' + escapeAttr(item.title) + '</div>'
          + '    <div class="listing-address">' + escapeAttr(item.address || '주소 정보 없음') + '</div>'
          + '    <div class="listing-price">' + escapeAttr(formatDealPrice(item)) + '</div>'
          + '  </div>'
          + '</div>';

      els.listingSlider.onclick = function(e){

    function renderAssetMeta(){
      const selectedCount = assets.filter(function(v){ return !!v.selected; }).length;
      const hero = assets.find(function(v){ return !!v.isHero; });
      els.selectedCountChip.textContent = '선택 ' + selectedCount;

      const hasHero = assets.some(function(v){ return !!v.isHero; });

      const key = selectedDate;

      els.datePickerBtn.textContent = key ? formatDateLabel(key) : '날짜 선택';
      els.dateMetaLine.textContent = key
        ? (formatDateLabel(key) + ' · 상가 ' + (counts.shoppingCount || 0) + ' · 공장 ' + (counts.factoryCount || 0))

    function renderCalendarGrid(){
      els.calendarMonthLabel.textContent = formatMonthLabel(calendarCurrentMonth);
      const parts = String(calendarCurrentMonth || '').split('-');
      const year = Number(parts[0] || 0);
      const monthIndex = Number(parts[1] || 1) - 1;
      const first = new Date(year, monthIndex, 1);
      const start = new Date(first);
      const mondayOffset = (first.getDay() + 6) % 7;
      start.setDate(first.getDate() - mondayOffset);

      let html = '';
      for(let i=0;i<42;i++){
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        const dateKey = formatDateKeyFromTs(date.getTime());
        const isSelected = dateKey === selectedDate;
        const counts = calendarOverviewMap[dateKey] || { shoppingCount:0, factoryCount:0, threadCount:0 };
        html += ''
          + '<button type="button" class="calendar-cell' + (isSelected ? ' is-selected' : '') + '" data-date-key="' + dateKey + '">'
          + '  <div class="calendar-day-number">' + date.getDate() + '</div>'
          + '  <div class="calendar-lines">'
          + '    <div class="calendar-line' + ((counts.shoppingCount || 0) ? '' : ' zero') + '">상가 ' + (counts.shoppingCount || 0) + '</div>'
          + '    <div class="calendar-line' + ((counts.factoryCount || 0) ? '' : ' zero') + '">공장 ' + (counts.factoryCount || 0) + '</div>'
          + '  </div>'
          + '</button>';
      }
      els.calendarGrid.innerHTML = html;

      Array.prototype.forEach.call(els.calendarGrid.querySelectorAll('.calendar-cell'), function(cell){
        cell.addEventListener('click', function(){
          selectedDate = cell.getAttribute('data-date-key');
          renderDateMetaLine();
          applyFiltersAndRenderListings();
          closeCalendarModal();
        });
      });
    }

    function moveCalendarMonth(offset){
      const parts = String(calendarCurrentMonth || firstDayOfMonthKey()).split('-');
      const d = new Date(Number(parts[0]), Number(parts[1]) - 1 + offset, 1);
      calendarCurrentMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      fetchCalendarOverviewOnly();
    }

    function fetchCalendarOverviewOnly(){
      setLoading(true, '달력 불러오는 중');
      fetchPostJson({ action:'getCalendarOverview', month: calendarCurrentMonth })
        .then(function(calendarData){
          calendarOverviewMap = {};
          (Array.isArray(calendarData && calendarData.days) ? calendarData.days : []).forEach(function(day){
            const dateKey = text(day && day.dateKey);
            calendarOverviewMap[dateKey] = {
              shoppingCount: Number(day && day.shoppingCount || 0),
              factoryCount: Number(day && day.factoryCount || 0),
              threadCount: Number(day && day.threadCount || 0)
            };
          });
          renderCalendarGrid();
          renderDateMetaLine();
        })
        .catch(function(err){
          console.error(err);
          showToast((err && err.message) || '달력 불러오기 실패');

        .finally(function(){
          setLoading(false);
        });

    function makeInfoImageAddress_(value){
      var s = String(value == null ? '' : value).replace(/\s+/g, ' ').trim();
      if(!s) return '-';

      var parts = s.split(' ').filter(Boolean);
      if(!parts.length) return '-';

      var kept = [];
      for(var i = 0; i < parts.length; i++){
        var p = parts[i];

        if(/\d/.test(p)) break;

        kept.push(p);

        if(/[동읍면가리]$/.test(p)) break;
        if(/[로길]$/.test(p)) break;
      }

      var out = kept.join(' ').trim();
      return out || '-';
    }

function infoFirstNonEmpty(){
      for(var i=0;i<arguments.length;i++){
        var v = arguments[i];
        if(v == null) continue;
        v = String(v).trim();
        if(v) return v;
      }
      return '';
    }
    function infoNumberText(n){
      if(!isFinite(n)) return '';
      if(Math.abs(n - Math.round(n)) < 1e-9) return String(Math.round(n));
      return (Math.round(n*100)/100).toString();
    }
    function infoFormatDate(v){
      v = String(v == null ? '' : v).replace(/\D/g,'');
      if(v.length !== 8) return String(v || '').trim();
      return v.slice(0,4)+'.'+v.slice(4,6)+'.'+v.slice(6,8);
    }
    function infoFormatArea(v){
      if(v == null || v === '') return '-';
      var n = Number(v);
      if(!isFinite(n) || n <= 0) return '-';
      var py = n / 3.305785;
      return infoNumberText(n) + '㎡ / ' + infoNumberText(py) + '평';
    }
    function infoFormatPercent(v){
      if(v == null || v === '') return '-';
      var n = Number(v);
      if(!isFinite(n)) return String(v).trim() || '-';
      return infoNumberText(n) + '%';
    }
    function infoFormatHeight(v){
      if(v == null || v === '') return '-';
      var n = Number(v);
      if(!isFinite(n) || n === 0) return '-';
      return infoNumberText(n) + 'm';
    }
    function infoUniqueNonEmpty(arr){
      var out = [];
      (arr || []).forEach(function(v){
        v = String(v == null ? '' : v).trim();
        if(v && out.indexOf(v) === -1) out.push(v);
      });
      return out;
    }
    function infoFindPositive(items, key){
      var best = null;
      (items || []).forEach(function(it){
        var n = Number(it && it[key]);
        if(isFinite(n) && n > 0 && (best == null || n > best)) best = n;
      });
      return best;
    }
    function infoBuildFloorText(v){
      var g = infoFirstNonEmpty(v && v.grndFlrCnt);
      var u = infoFirstNonEmpty(v && v.ugrndFlrCnt);
      if(!g && !u) return '-';
      return '지상 ' + (g || '0') + '층 / 지하 ' + (u || '0') + '층';
    }
    function infoBuildingSortKey(name){
      var m = String(name || '').match(/(\d+)/);
      return m ? parseInt(m[1],10) : 9999;
    }
    function infoFloorSortKey(name){
      var s = String(name || '').trim();
      var m = s.match(/-?\d+/);
      if(!m) return 9999;
      return parseInt(m[0],10);
    }
    function infoJoinAreaPurpose(area, purpose, struct){
      var parts = [];
      if(area && area !== '-') parts.push(area);
      if(purpose && purpose !== '-') parts.push(purpose);
      if(struct && struct !== '-') parts.push(struct);
      return parts.length ? parts.join(' / ') : '-';
    }
    function infoGetBuildingArchArea(buildingSource, flrItemsForBuilding){
      var direct = Number(buildingSource && buildingSource.archArea);
      if(isFinite(direct) && direct > 0) return direct;
      var firstFloorArea = null;
      (flrItemsForBuilding || []).forEach(function(f){
        var floorName = String(f.flrNoNm || '').trim();
        var floorGb = String(f.flrGbCdNm || '').trim();
        var floorNo = String(f.flrNo == null ? '' : f.flrNo).trim();
        var area = Number(f && f.area);
        if(!isFinite(area) || area <= 0) return;
        var isFirstFloor = floorName === '1층' || (floorGb === '지상' && floorNo === '1');
        if(isFirstFloor) firstFloorArea = area;
      });
      return firstFloorArea;
    }
    function extractLookupImageRows(data){
      var apis = (data && data.apis) || {};
      var titleItems = ((apis.title || {}).items || []).slice();
      var recapItems = ((apis.recap || {}).items || []).slice();
      var basisItems = ((apis.basis || {}).items || []).slice();
      var jijiguItems = ((apis.jijigu || {}).items || []).slice();
      var flrItems = ((apis.flr || {}).items || []).slice();
      var titleFirst = ((apis.title || {}).firstItem || {});
      var recapFirst = ((apis.recap || {}).firstItem || {});

      var zoningParts = infoUniqueNonEmpty(
        basisItems.map(function(it){ return it.jiyukCdNm; })
          .concat(basisItems.map(function(it){ return it.jiguCdNm; }))
          .concat(basisItems.map(function(it){ return it.guyukCdNm; }))
          .concat(jijiguItems.map(function(it){ return it.jiyukCdNm; }))
          .concat(jijiguItems.map(function(it){ return it.jiguCdNm; }))
          .concat(jijiguItems.map(function(it){ return it.guyukCdNm; }))
          .concat(jijiguItems.map(function(it){ return it.jijigu; }))
      ).join(' / ');

      var landArea = Number(recapFirst.platArea);
      if(!isFinite(landArea) || landArea <= 0) landArea = infoFindPositive(recapItems, 'platArea');
      if(!isFinite(landArea) || landArea <= 0) landArea = infoFindPositive(titleItems, 'platArea');

      var archArea = Number(recapFirst.archArea);
      if(!isFinite(archArea) || archArea <= 0) archArea = infoFindPositive(recapItems, 'archArea');
      if(!isFinite(archArea) || archArea <= 0) {
        archArea = titleItems.reduce(function(sum, it){
          var n = Number(it.archArea);
          return sum + (isFinite(n) && n > 0 ? n : 0);
        }, 0);
      }

      var totArea = Number(recapFirst.totArea);
      if(!isFinite(totArea) || totArea <= 0) totArea = infoFindPositive(recapItems, 'totArea');
      if(!isFinite(totArea) || totArea <= 0) {
        totArea = titleItems.reduce(function(sum, it){
          var n = Number(it.totArea);
          return sum + (isFinite(n) && n > 0 ? n : 0);
        }, 0);
      }

      var mainCnt = titleItems.filter(function(it){ return String(it.mainAtchGbCd || '').trim() === '0'; }).length;
      var atchCnt = titleItems.filter(function(it){ return String(it.mainAtchGbCd || '').trim() && String(it.mainAtchGbCd || '').trim() !== '0'; }).length;
      if(!mainCnt && recapFirst.mainBldCnt) mainCnt = Number(recapFirst.mainBldCnt) || 0;
      if(!atchCnt && recapFirst.atchBldCnt) atchCnt = Number(recapFirst.atchBldCnt) || 0;
      var totalCnt = titleItems.length || (mainCnt + atchCnt);
      var compText = '-';
      if(totalCnt){
        compText = '총 ' + totalCnt + '동';
        if(mainCnt || atchCnt) compText += ' (주건축물 ' + (mainCnt || 0) + '동, 부속건축물 ' + (atchCnt || 0) + '동)';
      }

      var summaryRows = [
        ['주소', makeInfoImageAddress_(infoFirstNonEmpty(
        data && data.normalized && data.normalized.jibunAddress,
        data && data.address,
        titleFirst.platPlc,
        recapFirst.platPlc,
        '-'
      ))],
        ['도로명주소', makeInfoImageAddress_(infoFirstNonEmpty(
        data && data.normalized && data.normalized.roadAddress,
        titleFirst.newPlatPlc,
        recapFirst.newPlatPlc,
        '-'
      ))],
        ['건축물구성', compText],

    function drawInfoRowsToBlob(title, rows){
      return new Promise(function(resolve, reject){
        try{
          var canvas = document.createElement('canvas');
          var ctx = canvas.getContext('2d');

          var safeRows = Array.isArray(rows) ? rows.filter(function(row){
            return Array.isArray(row) && (text(row[0]) || text(row[1]));
          }) : [];

          var paddingLeft = 30;
          var paddingRight = 30;
          var paddingTop = 34;
          var paddingBottom = 34;
          var titleH = 52;
          var tableW = 740;
          var labelW = 210;
          var valueW = tableW - labelW;
          var xLabel = paddingLeft;
          var xValue = paddingLeft + labelW;

          canvas.width = paddingLeft + tableW + paddingRight;
          canvas.height = 200;

          function splitLines(ctx, value, maxWidth){
            var words = String(value == null ? '' : value).split(/\s+/).filter(Boolean);
            if(!words.length) return [''];
            var lines = [];
            var line = '';
            words.forEach(function(word){
              var test = line ? (line + ' ' + word) : word;
              if(ctx.measureText(test).width <= maxWidth){
                line = test;
              }else{
                if(line) lines.push(line);
                line = word;
              }
            });
            if(line) lines.push(line);
            return lines;
          }

          ctx.font = '900 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif';

          var rowHeights = safeRows.map(function(row){
            var lines = splitLines(ctx, row[1], valueW - 24);
            return Math.max(54, 28 + lines.length * 24);
          });

          var totalRowsHeight = rowHeights.reduce(function(acc, h){ return acc + h; }, 0);
          canvas.height = paddingTop + titleH + totalRowsHeight + paddingBottom;

          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.fillStyle = '#111827';
          ctx.font = '900 26px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif';
          ctx.textBaseline = 'top';
          ctx.fillText(String(title || ''), paddingLeft, paddingTop - 4);

          var startY = paddingTop + titleH;

          for(var i=0;i<safeRows.length;i++){
            var row = safeRows[i];
            var rh = rowHeights[i];
            var y = startY;

            ctx.fillStyle = '#f8fbff';
            ctx.fillRect(xLabel, y, labelW, rh);

            ctx.strokeStyle = '#e7edf5';
            ctx.beginPath(); ctx.moveTo(xLabel, y); ctx.lineTo(xLabel + tableW, y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(xValue, y); ctx.lineTo(xValue, y + rh); ctx.stroke();

            ctx.fillStyle = '#344054';
            ctx.font = '900 17px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif';
            ctx.textBaseline = 'middle';
            ctx.fillText(String(row[0] || ''), xLabel + 14, y + rh / 2);

            ctx.fillStyle = '#111827';
            ctx.font = '900 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif';
            ctx.textBaseline = 'top';
            var lines = splitLines(ctx, row[1], valueW - 24);
            var textY = y + 14;
            lines.forEach(function(line){
              ctx.fillText(String(line || ''), xValue + 14, textY);
              textY += 24;
            });

            startY += rh;
          }

          ctx.beginPath();
          ctx.moveTo(xLabel, startY);
          ctx.lineTo(xLabel + tableW, startY);
          ctx.strokeStyle = '#e7edf5';
          ctx.stroke();

          canvas.toBlob(function(blob){
            if(!blob) reject(new Error('이미지 생성 실패'));
            else resolve(blob);
          }, 'image/jpeg', 0.92);
        }catch(err){
          reject(err);
        }
      });
    }

    
    function blobToDataUrl(blob){
      return new Promise(function(resolve, reject){
        try{
          var reader = new FileReader();
          reader.onloadend = function(){
            resolve(reader.result || '');
          };
          reader.onerror = function(){
            reject(new Error('dataURL 변환 실패'));
          };
          reader.readAsDataURL(blob);
        }catch(err){
          reject(err);
        }
      });
    }

    function jsonpLookupCall(params){
      return new Promise(function(resolve, reject){
        var cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*1000);
        var script = document.createElement('script');
        var done = false;
        var timer = null;

        function cleanup(){
          try{ delete window[cb]; }catch(e){}
          if(timer) clearTimeout(timer);
          if(script.parentNode) script.parentNode.removeChild(script);
        }

        window[cb] = function(payload){
          if(done) return;
          done = true;
          cleanup();
          resolve(payload);
        };

        script.onerror = function(){
          if(done) return;
          done = true;
          cleanup();
          reject(new Error('JSONP 요청 실패'));
        };

        params = params || {};
        params.callback = cb;
        params._ts = Date.now();

        var q = new URLSearchParams();
        Object.keys(params).forEach(function(k){
          q.set(k, params[k] == null ? '' : String(params[k]));
        });

        script.src = CONFIG.adminListUrl + '?' + q.toString();
        document.body.appendChild(script);

        timer = setTimeout(function(){
          if(done) return;
          done = true;
          cleanup();
          reject(new Error('JSONP 타임아웃'));
        }, 15000);
      });
    }

              sourceObj.lightUrl ||
              sourceObj.thumbUrl ||
              item.previewUrl ||
              ''
            ),
            fileId: text(sourceObj.fileId || ''),
            fileName: text(sourceObj.fileName || sourceObj.name || ''),
            mimeType: text(sourceObj.mimeType || ''),
            kind: text(sourceObj.kind || '')
          };
        });
    }

    function buildCreateBlogDraftPayload(){
      if(!selectedListing){
        throw new Error('먼저 매물을 선택해주세요.');
      }

      var directionText = text(els.aiDirectionInput && els.aiDirectionInput.value);
      var selectedAssets = buildSelectedAssetsForPayload();
      var hero = selectedAssets.find(function(item){ return !!item.isHero; });

      if(!selectedAssets.length){
        throw new Error('선택된 이미지가 없습니다.');
      }
      if(!hero){
        throw new Error('대표 이미지가 없습니다.');
      }

      var assetOrder = selectedAssets.map(function(item){ return item.assetId; });
      var selectedAssetIds = selectedAssets.map(function(item){ return item.assetId; });
      var assetParagraphMap = {};
      var assetTypeMap = {};
      var assetSourceMap = {};

      selectedAssets.forEach(function(item){
        assetParagraphMap[item.assetId] = item.paragraph || 'p1';
        assetTypeMap[item.assetId] = item.assetType || 'photo';
        assetSourceMap[item.assetId] = item.assetSource || 'property_photo';
      });

      return {
        action:'createBlogDraft',
        blogDraft:{
          listingNumber: text(selectedListing.listingNumber),
          selectedDate: text(selectedDate || ''),
          searchKeyword: text(els.searchInput && els.searchInput.value),
          styleType: text(selectedAiStyle || '깔끔형'),
          directionText: directionText,
          status: 'asset_pending',
          subStatus: 'init',
          userAgent: navigator.userAgent || ''
        },
        listingSnapshot: Object.assign({}, selectedListing.raw || {}, {
          listingNumber: text(selectedListing.listingNumber),
          title: text(selectedListing.title),
          address: text(selectedListing.address),
          addressMasked: maskAddressForBlog(selectedListing.address),
          dealType: text(selectedListing.dealType),
          price: text(selectedListing.price),
          deposit: text(selectedListing.deposit),
          monthlyRent: text(selectedListing.monthlyRent),
          pageUrl: text(selectedListing.raw && selectedListing.raw.pageUrl)
        }),
        assetBundle:{
          sourceFolderHint:{
            listingNumber: text(selectedListing.listingNumber)
          },
          basicInfoFolderName:'basic info',
          blogAssetsFolderName:'blog assets',
          heroAssetId: text(hero.assetId),
          selectedAssetIds: selectedAssetIds,
          assetOrder: assetOrder,
          assetParagraphMap: assetParagraphMap,
          assetTypeMap: assetTypeMap,
          assetSourceMap: assetSourceMap,
          assets: selectedAssets
        },
        clientMeta:{
          createdFrom:'blog_publisher',
          pageUrl: location.href,
          viewportWidth: window.innerWidth || 0,
          viewportHeight: window.innerHeight || 0
        }
      };
    }

    function buildEditorMoveUrl(blogId, directionText){
      return CONFIG.editorUrl
        + '?blogId=' + encodeURIComponent(blogId)
        + '&style=' + encodeURIComponent(text(selectedAiStyle || '깔끔형'))
        + '&direction=' + encodeURIComponent(text(directionText || ''));
    }

    function saveDraft(){
      if(!selectedListing){
        showToast('먼저 매물 선택');
        return;
      }
      setLoading(true, '임시저장 중');
      fetchPostJson({
        action:'saveBlogDraft',
        payload: collectDraftPayload()
      })
      .then(function(data){
        if(!data || data.ok === false){
          throw new Error((data && data.message) || '임시저장 실패');
        }
        showToast('임시저장 완료');
      })
      .catch(function(err){
        console.error(err);
        showToast((err && err.message) || '임시저장 실패');
      })
      .finally(function(){
        setLoading(false);
      });
    }

    function openAiCallModal(){
      if(els.publishPrepBtn.disabled) return;
      els.aiCallModal.classList.add('show');
      els.aiCallModal.setAttribute('aria-hidden', 'false');
      syncAiStyleButtons();
      document.body.style.overflow = 'hidden';
    }

    function closeAiCallModal(){
      els.aiCallModal.classList.remove('show');
      els.aiCallModal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function syncAiStyleButtons(){
      Array.prototype.forEach.call(els.aiStyleGrid.querySelectorAll('.ai-style-btn'), function(btn){
        btn.classList.toggle('is-active', btn.getAttribute('data-style') === selectedAiStyle);
      });
    }

    function submitAiCall(){
      var directionText = text(els.aiDirectionInput && els.aiDirectionInput.value);
      var payload = null;

      try{
        payload = buildCreateBlogDraftPayload();
      }catch(err){
        console.error(err);
        showToast((err && err.message) || '페이로드 생성 실패');
        return;
      }

      closeAiCallModal();
      setLoading(true, 'AI 호출 준비중');

      fetchPostJson(payload)
        .then(function(data){
          if(!data || data.ok === false){
            throw new Error((data && data.message) || '초안 생성 실패');
          }

          var blogId = text(data.blogId);
          if(!blogId){
            throw new Error('blogId 없음');
          }

          var moveUrl = buildEditorMoveUrl(blogId, directionText);
          els.loadingText.textContent = 'AI 호출 중';

          return wait(5000).then(function(){
            location.href = moveUrl;
          });
        })
        .catch(function(err){
          console.error(err);
          setLoading(false);
          showToast((err && err.message) || 'AI 호출 실패');
        });
    }

    function goRelativeDate(offset){
      const base = selectedDate ? new Date(selectedDate + 'T00:00:00') : new Date();
      base.setDate(base.getDate() + offset);
      selectedDate = formatDateKeyFromTs(base.getTime());
      const nextMonth = getCurrentMonthKeyFromDate(selectedDate);
      if(nextMonth !== calendarCurrentMonth){
        calendarCurrentMonth = nextMonth;
        fetchCalendarOverviewOnly();
      }else{
        renderDateMetaLine();
        applyFiltersAndRenderListings();
      }
    }

    function bindSliderBar(){
      if(!els.listingSliderWrap || !els.listingSliderBarHit) return;
      function update(){
        const wrap = els.listingSliderWrap;
        const hit = els.listingSliderBarHit;
        const scrollWidth = wrap.scrollWidth || 0;
        const clientWidth = wrap.clientWidth || 0;
        const maxScroll = Math.max(0, scrollWidth - clientWidth);

        if(scrollWidth <= clientWidth + 2){
          hit.style.width = '100%';
          hit.style.transform = 'translateY(-50%) translateX(0)';
          return;
        }

        const thumbWidthPx = Math.max(36, (clientWidth / scrollWidth) * clientWidth);
        const maxTravelPx = Math.max(0, clientWidth - thumbWidthPx);
        const leftPx = maxScroll > 0 ? (wrap.scrollLeft / maxScroll) * maxTravelPx : 0;

        hit.style.width = thumbWidthPx + 'px';
        hit.style.transform = 'translateY(-50%) translateX(' + leftPx + 'px)';
      }
      els.listingSliderWrap.addEventListener('scroll', update, {passive:true});
      window.addEventListener('resize', update);
      bindSliderBar._update = update;
    }

    function bindSliderBarDrag(){
      const wrap = els.listingSliderWrap;
      const track = els.listingSliderTrack;
      const trackHit = els.listingSliderTrackHit;
      const thumb = els.listingSliderBarHit;
      if(!wrap || !track || !trackHit || !thumb) return;

      function maxScroll(){
        return Math.max(0, wrap.scrollWidth - wrap.clientWidth);
      }

      function syncFromClientX(clientX){
        const trackRect = track.getBoundingClientRect();
        const thumbWidth = thumb.offsetWidth || 0;
        const usable = Math.max(1, trackRect.width - thumbWidth);
        let left = clientX - trackRect.left - (thumbWidth / 2);
        left = Math.max(0, Math.min(usable, left));
        const ratio = usable > 0 ? (left / usable) : 0;
        wrap.scrollLeft = ratio * maxScroll();
        if(bindSliderBar._update) bindSliderBar._update();
      }

      let draggingTrack = false;
      function onTrackDown(e){
        if(window.innerWidth <= 860) return;
        if(e.pointerType === 'mouse' && e.button !== 0) return;
        draggingTrack = true;
        syncFromClientX(e.clientX);
        try{ trackHit.setPointerCapture(e.pointerId); }catch(err){}
        e.preventDefault();
        e.stopPropagation();
      }
      function onTrackMove(e){
        if(!draggingTrack) return;
        syncFromClientX(e.clientX);
        e.preventDefault();
        e.stopPropagation();
      }
      function onTrackUp(e){
        if(!draggingTrack) return;
        draggingTrack = false;
        try{ trackHit.releasePointerCapture(e.pointerId); }catch(err){}
        e.preventDefault();
        e.stopPropagation();
      }

      trackHit.addEventListener('pointerdown', onTrackDown);
      trackHit.addEventListener('pointermove', onTrackMove);
      trackHit.addEventListener('pointerup', onTrackUp);
      trackHit.addEventListener('pointercancel', onTrackUp);
      trackHit.addEventListener('lostpointercapture', onTrackUp);

      let draggingThumb = false;
      function onThumbDown(e){
        if(window.innerWidth <= 860) return;
        if(e.pointerType === 'mouse' && e.button !== 0) return;
        draggingThumb = true;
        thumb.style.cursor = 'grabbing';
        try{ thumb.setPointerCapture(e.pointerId); }catch(err){}
        e.preventDefault();
        e.stopPropagation();
      }
      function onThumbMove(e){
        if(!draggingThumb) return;
        syncFromClientX(e.clientX);
        e.preventDefault();
        e.stopPropagation();
      }
      function onThumbUp(e){
        if(!draggingThumb) return;
        draggingThumb = false;
        thumb.style.cursor = 'grab';
        try{ thumb.releasePointerCapture(e.pointerId); }catch(err){}
        e.preventDefault();
        e.stopPropagation();
      }

      thumb.addEventListener('pointerdown', onThumbDown);
      thumb.addEventListener('pointermove', onThumbMove);
      thumb.addEventListener('pointerup', onThumbUp);
      thumb.addEventListener('pointercancel', onThumbUp);
      thumb.addEventListener('lostpointercapture', onThumbUp);
    }

    function bindEvents(){
      els.goStatusBtn.addEventListener('click', function(){
        location.href = CONFIG.statusUrl;
      });
      els.prevDateBtn.addEventListener('click', function(){ goRelativeDate(-1); });
      els.nextDateBtn.addEventListener('click', function(){ goRelativeDate(1); });
      els.datePickerBtn.addEventListener('click', openCalendarModal);
      els.calendarBackBtn.addEventListener('click', closeCalendarModal);
      els.calendarModal.addEventListener('click', function(e){
        if(e.target === els.calendarModal) closeCalendarModal();
      });
      els.calendarPrevBtn.addEventListener('click', function(){ moveCalendarMonth(-1); });
      els.calendarNextBtn.addEventListener('click', function(){ moveCalendarMonth(1); });
      els.searchInput.addEventListener('input', function(){
        clearTimeout(searchTimer);
        searchTimer = setTimeout(applyFiltersAndRenderListings, 220);
      });
      els.generateInfoImageBtn.addEventListener('click', generateInfoImages);
      els.draftSaveBtn.addEventListener('click', saveDraft);
      els.publishPrepBtn.addEventListener('click', openAiCallModal);
      els.aiStyleGrid.addEventListener('click', function(e){
        var btn = e.target.closest('.ai-style-btn');
        if(!btn) return;
        selectedAiStyle = btn.getAttribute('data-style') || '깔끔형';
        syncAiStyleButtons();
      });
      els.aiCallCancelBtn.addEventListener('click', closeAiCallModal);
      els.aiCallConfirmBtn.addEventListener('click', submitAiCall);
      els.aiCallModal.addEventListener('click', function(e){
        if(e.target === els.aiCallModal) closeAiCallModal();
      });
      els.imageViewerClose.addEventListener('click', closeImageViewer);
      els.imageViewer.addEventListener('click', function(e){
        if(e.target === els.imageViewer) closeImageViewer();
      });
      els.paragraphPickerClose.addEventListener('click', closeParagraphPicker);
      els.paragraphPicker.addEventListener('click', function(e){
        if(e.target === els.paragraphPicker) closeParagraphPicker();
      });
      document.addEventListener('keydown', function(e){
        if(e.key === 'Escape' && els.imageViewer.classList.contains('show')) closeImageViewer();
        if(e.key === 'Escape' && els.paragraphPicker.classList.contains('show')) closeParagraphPicker();
        if(e.key === 'Escape' && els.aiCallModal.classList.contains('show')) closeAiCallModal();
      });
    }

    bindEvents();
    bindSliderBar();
    bindSliderBarDrag();
    selectedDate = formatDateKeyFromTs(Date.now());
    calendarCurrentMonth = firstDayOfMonthKey(selectedDate);
    renderDateMetaLine();
    fetchAdminItems();
  </script>
</body>
</html>
