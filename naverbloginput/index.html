<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>블로그 발행기</title>
  <script src="https://t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <style>
    :root{
      --bg:#ffffff;
      --line:#e6ebf1;
      --text:#111318;
      --muted:#67707b;
      --blue:#0f7cff;
      --blue-soft:#eef5ff;
      --shadow:0 14px 30px rgba(15,23,42,.05);
      --hero-on:#dff7bf;
      --hero-on-line:#b7e37d;
      --hero-on-text:#4e7b10;
      --hero-off:#f3f5f8;
      --hero-off-line:#dce3ea;
      --hero-off-text:#9aa4af;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:#fff;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif !important;
      letter-spacing:-0.02em;
      overflow-x:hidden;
    }
    body{min-width:0}
    img{display:block;max-width:100%}
    button,input,select{font:inherit}
    button{border:none;background:none;cursor:pointer}
    .page{
      min-height:100vh;
      background:linear-gradient(180deg,#ffffff 0%,#f9fbff 100%);
      overflow-x:hidden;
    }
    .shell{
      width:100%;
      max-width:980px;
      margin:0 auto;
      padding:0 20px 128px;
      min-width:0;
      overflow-x:hidden;
    }
    .head{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(230,235,241,.95);
      padding:14px 0 12px;
    }
    .head-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
      min-width:0;
    }
    .title{
      font-size:22px;
      line-height:1.1;
      font-weight:900;
      color:#111318;
      letter-spacing:-0.04em;
      min-width:0;
    }
    .ghost-btn{
      min-height:40px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111;
      font-size:14px;
      font-weight:800;
      flex:0 0 auto;
    }

    .top-tools{
      display:grid;
      grid-template-columns:190px minmax(0,1fr);
      gap:8px;
      align-items:center;
      min-width:0;
    }
    .date-nav{
      display:grid;
      grid-template-columns:32px minmax(0,1fr) 32px;
      align-items:center;
      gap:4px;
      min-height:44px;
      padding:0 6px;
      border:1px solid #dce6f1;
      border-radius:14px;
      background:#fff;
      box-shadow:0 8px 20px rgba(15,23,42,.03);
      min-width:0;
      overflow:hidden;
    }
    .nav-arrow{
      width:32px;
      min-width:32px;
      max-width:32px;
      min-height:30px;
      height:30px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:10px;
      color:#111318;
      font-size:20px;
      font-weight:900;
      flex:0 0 32px;
      user-select:none;
    }
    .date-trigger{
      min-width:0;
      width:100%;
      min-height:30px;
      height:30px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:13px;
      font-weight:900;
      letter-spacing:-0.03em;
      color:#111318;
    }
    .search-col{
      min-width:0;
      width:100%;
    }
    .search-input{
      width:100%;
      min-width:0;
      min-height:44px;
      padding:0 14px;
      border-radius:14px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:14px;
      font-weight:800;
      outline:none;
      box-shadow:0 8px 20px rgba(15,23,42,.03);
    }
    .search-input::placeholder{
      color:rgba(123,135,148,.55);
      font-weight:700;
    }
    .meta-line{
      margin-top:8px;
      padding-left:2px;
      font-size:12px;
      color:#7b8794;
      font-weight:800;
      line-height:1.4;
    }

    .section{
      margin-top:16px;
      border:1px solid var(--line);
      border-radius:28px;
      background:#fff;
      box-shadow:var(--shadow);
      padding:14px;
      min-width:0;
      overflow:hidden;
    }
    .section-title{
      margin:0 0 12px;
      font-size:18px;
      line-height:1.25;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.04em;
    }
    .empty{
      border:1px dashed #d9e3ed;
      border-radius:22px;
      background:#fff;
      padding:28px 18px;
      text-align:center;
      color:#7b8794;
      font-size:14px;
      font-weight:800;
    }

    .listing-slider-wrap{
      width:100%;
      overflow-x:auto;
      overflow-y:visible;
      -webkit-overflow-scrolling:touch;
      min-width:0;
    }
    .listing-slider-wrap::-webkit-scrollbar{display:none}
    .listing-slider{
      display:flex;
      gap:12px;
      width:max-content;
      max-width:none;
      min-width:100%;
    }
    .listing-card{
      flex:0 0 232px;
      width:232px;
      border:1px solid #e6ebf1;
      border-radius:22px;
      background:#fff;
      overflow:hidden;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      cursor:pointer;
    }
    .listing-card.is-active{
      border-color:#bfdcff;
      box-shadow:0 14px 26px rgba(15,124,255,.10);
    }
    .listing-thumb{
      width:100%;
      height:152px;
      background:#edf2f7 center/cover no-repeat;
    }
    .listing-body{
      padding:12px;
      display:grid;
      gap:7px;
    }
    .listing-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }
    .listing-team{
      min-height:24px;
      padding:0 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .listing-team.shopping{background:#fff3f7;color:#c13f73;border:1px solid #efb6c8}
    .listing-team.factory{background:#eef5ff;color:#0f7cff;border:1px solid #cfe2ff}
    .listing-no{
      font-size:11px;
      color:#7b8794;
      font-weight:900;
    }
    .listing-title{
      font-size:16px;
      line-height:1.4;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.03em;
      min-height:44px;
      word-break:keep-all;
    }
    .listing-address,.listing-price{
      font-size:12px;
      line-height:1.5;
      color:#58616b;
      font-weight:700;
      word-break:keep-all;
    }

    .slider-bar-wrap{
      display:block;
      margin-top:10px;
      padding:16px 0;
    }
    .slider-track{
      position:relative;
      height:6px;
      background:#eef2f6;
      border-radius:999px;
      overflow:visible;
    }
    .slider-track-hit{
      position:absolute;
      left:0;
      right:0;
      top:50%;
      height:36px;
      transform:translateY(-50%);
      background:transparent;
      cursor:pointer;
    }
    .slider-thumb-hit{
      position:absolute;
      left:0;
      top:50%;
      height:36px;
      width:0;
      transform:translateY(-50%) translateX(0);
      display:flex;
      align-items:center;
      background:transparent;
      cursor:grab;
    }
    .slider-thumb{
      width:100%;
      height:6px;
      background:#0f7cff;
      border-radius:999px;
    }

    .selected-summary{
      display:none;
      margin-top:16px;
      border:1px solid var(--line);
      border-radius:24px;
      background:#fff;
      box-shadow:var(--shadow);
      padding:16px;
    }
    .selected-summary.show{display:block}
    .selected-title{
      font-size:20px;
      line-height:1.3;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.04em;
      margin-bottom:6px;
    }
    .selected-sub{
      font-size:13px;
      line-height:1.6;
      color:#66707a;
      font-weight:700;
    }

    .assets-section{display:none}
    .assets-section.show{display:block}
    .tools-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .tools-left,.tools-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .chip{
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#5d6670;
      font-size:12px;
      font-weight:900;
    }
    .mini-btn{
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:12px;
      font-weight:900;
    }
    .mini-btn.blue{background:#eef5ff;border-color:#cfe2ff;color:#0f7cff}
    .mini-btn.pink{background:#fff3f7;border-color:#efb6c8;color:#b83268}

    .asset-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
      min-width:0;
    }
    .asset-card{
      border:1px solid #e6ebf1;
      border-radius:22px;
      background:#fff;
      overflow:hidden;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      min-width:0;
    }
    .asset-preview{
      position:relative;
      width:100%;
      aspect-ratio:1 / .9;
      background:#edf2f7 center/cover no-repeat;
      border-bottom:1px solid #eef2f6;
    }
    .asset-hero{
      position:absolute;
      top:8px;
      left:8px;
      min-height:22px;
      padding:0 6px;
      border-radius:8px;
      background:var(--hero-off);
      border:1px solid var(--hero-off-line);
      color:var(--hero-off-text);
      font-size:10px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      cursor:pointer;
      z-index:2;
    }
    .asset-card.is-hero .asset-hero{
      background:var(--hero-on);
      border-color:var(--hero-on-line);
      color:var(--hero-on-text);
    }
    .asset-check{
      position:absolute;
      top:8px;
      right:8px;
      width:24px;
      height:24px;
      border-radius:999px;
      background:rgba(255,255,255,.96);
      border:1px solid #dce6f1;
      color:#b8c2cc;
      font-size:14px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      cursor:pointer;
      z-index:2;
      box-shadow:0 6px 14px rgba(15,23,42,.08);
    }
    .asset-card.is-selected .asset-check{
      background:#0f7cff;
      border-color:#0f7cff;
      color:#fff;
    }
    .asset-body{
      padding:9px;
      display:grid;
      gap:6px;
    }
    .select{
      width:100%;
      min-height:32px;
      border-radius:10px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111;
      padding:0 8px;
      outline:none;
      font-size:12px;
      font-weight:800;
    }

    .bottom-bar{
      position:fixed;
      left:50%;
      bottom:calc(18px + env(safe-area-inset-bottom, 0px));
      transform:translateX(-50%);
      z-index:40;
      width:min(980px - 32px, calc(100% - 20px));
      display:flex;
      gap:10px;
      padding:10px;
      border-radius:22px;
      border:1px solid #dfe7f0;
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(10px);
      box-shadow:0 16px 36px rgba(15,23,42,.12);
    }
    .bottom-btn{
      flex:1 1 auto;
      min-height:52px;
      border-radius:16px;
      font-size:15px;
      font-weight:900;
      letter-spacing:-0.03em;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111;
    }
    .bottom-btn.primary{
      background:#0f7cff;
      border-color:#0f7cff;
      color:#fff;
    }
    .bottom-btn:disabled{opacity:.5;cursor:default}

    .calendar-modal{
      position:fixed;
      inset:0;
      z-index:120;
      display:none;
      background:#f7f8fb;
    }
    .calendar-modal.show{display:block}
    .calendar-sheet{
      width:100vw;
      height:100dvh;
      min-height:100dvh;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      background:#f7f8fb;
    }
    .calendar-top{
      position:sticky;
      top:0;
      z-index:3;
      min-height:72px;
      background:rgba(247,248,251,.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid #e7ebf1;
    }
    .calendar-top-inner{
      max-width:980px;
      margin:0 auto;
      padding:0 20px;
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .calendar-back{
      min-height:42px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid #d8e0ea;
      background:#fff;
      color:#111318;
      font-size:14px;
      font-weight:800;
    }
    .calendar-title{
      flex:1 1 auto;
      text-align:center;
      font-size:18px;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.04em;
    }
    .calendar-spacer{width:72px;flex:0 0 72px}
    .calendar-inner{
      max-width:980px;
      margin:0 auto;
      padding:14px 20px 28px;
    }
    .calendar-shell{
      border:1px solid #e5e9ef;
      border-radius:30px;
      background:#fdfefe;
      box-shadow:0 14px 30px rgba(15,23,42,.04);
      padding:18px 18px 16px;
      overflow:hidden;
    }
    .calendar-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .calendar-nav{
      width:42px;
      height:42px;
      border-radius:999px;
      border:1px solid #dde4ec;
      background:#fff;
      color:#111318;
      font-size:24px;
      line-height:1;
      font-weight:500;
    }
    .calendar-month-label{
      font-size:17px;
      font-weight:800;
      color:#17191d;
      letter-spacing:-0.03em;
    }
    .calendar-weekdays{
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
      padding:0 2px 8px;
      border-bottom:1px solid #edf1f5;
    }
    .calendar-weekday{
      text-align:center;
      font-size:12px;
      font-weight:700;
      color:#7f8792;
      padding:0 0 6px;
    }
    .calendar-grid{
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
    }
    .calendar-cell{
      min-height:76px;
      padding:5px 5px 5px;
      border-right:1px solid #eef2f6;
      border-bottom:1px solid #eef2f6;
      background:transparent;
      text-align:left;
      display:flex;
      flex-direction:column;
      gap:2px;
      border-radius:0;
      min-width:0;
    }
    .calendar-cell:nth-child(7n){border-right:none}
    .calendar-cell.is-selected{background:#eef5ff}
    .calendar-day-number{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:4px;
      font-size:16px;
      line-height:1.15;
      font-weight:700;
      color:#111318;
    }
    .calendar-lines{
      margin-top:3px;
      display:grid;
      gap:2px;
      line-height:1.22;
    }
    .calendar-line{
      font-size:11.5px;
      line-height:1.32;
      font-weight:400;
      color:#5f6873;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .calendar-line.zero{display:none}

    .loading-overlay{
      position:fixed;
      inset:0;
      z-index:140;
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(3px);
    }
    .loading-overlay.show{display:flex}
    .loading-panel{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-align:center;
    }
    .loading-buddy{
      width:74px;
      height:74px;
      object-fit:cover;
      border-radius:18px;
      animation:buddyBounce 1.15s ease-in-out infinite;
      box-shadow:0 10px 22px rgba(15,124,255,.16);
    }
    .loading-text{
      min-height:24px;
      font-size:18px;
      font-weight:800;
      line-height:1.4;
      color:#2b8fe8;
      letter-spacing:-0.03em;
    }
    @keyframes buddyBounce{
      0%,100%{transform:translateY(0) scale(1)}
      20%{transform:translateY(-3px) scale(1.01)}
      50%{transform:translateY(-10px) scale(1.04)}
      75%{transform:translateY(-4px) scale(1.01)}
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:calc(92px + env(safe-area-inset-bottom, 0px));
      transform:translateX(-50%);
      z-index:160;
      min-width:180px;
      max-width:calc(100% - 48px);
      padding:13px 16px;
      border-radius:14px;
      background:rgba(17,24,39,.92);
      color:#fff;
      font-size:14px;
      line-height:1.45;
      font-weight:800;
      text-align:center;
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease;
    }
    .toast.show{opacity:1}


    .ai-style-modal{
      position:fixed;
      inset:0;
      z-index:130;
      display:none;
      background:rgba(15,23,42,.34);
      backdrop-filter:blur(2px);
      padding:18px;
      align-items:center;
      justify-content:center;
    }
    .ai-style-modal.show{display:flex}
    .ai-style-sheet{
      width:min(560px, 100%);
      max-width:560px;
      border:1px solid #dfe7f0;
      border-radius:28px;
      background:#fff;
      box-shadow:0 20px 48px rgba(15,23,42,.16);
      overflow:hidden;
    }
    .ai-style-head{
      padding:18px 18px 12px;
      border-bottom:1px solid #edf1f6;
      background:#fbfcfe;
    }
    .ai-style-title{
      margin:0;
      font-size:22px;
      line-height:1.2;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.04em;
    }
    .ai-style-sub{
      margin-top:6px;
      font-size:13px;
      line-height:1.55;
      color:#6b7280;
      font-weight:700;
    }
    .ai-style-body{
      padding:18px;
      display:grid;
      gap:16px;
    }
    .style-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }
    .style-card{
      border:1px solid #dce6f1;
      border-radius:18px;
      background:#fff;
      padding:14px 12px;
      text-align:left;
      min-height:84px;
      transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .style-card.is-active{
      border-color:#0f7cff;
      background:#eef5ff;
      box-shadow:0 10px 20px rgba(15,124,255,.08);
    }
    .style-card-title{
      font-size:15px;
      line-height:1.2;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.03em;
      margin-bottom:6px;
    }
    .style-card-desc{
      font-size:12px;
      line-height:1.5;
      color:#66707a;
      font-weight:700;
      word-break:keep-all;
    }
    .direction-wrap{
      display:grid;
      gap:8px;
    }
    .direction-label{
      font-size:14px;
      line-height:1.2;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.03em;
    }
    .direction-input{
      width:100%;
      min-height:108px;
      padding:14px;
      border-radius:18px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:14px;
      line-height:1.6;
      font-weight:700;
      resize:none;
      outline:none;
    }
    .direction-input::placeholder{
      color:#9aa4af;
      font-weight:700;
    }
    .ai-style-actions{
      display:flex;
      gap:10px;
      padding:0 18px 18px;
    }
    .ai-style-btn{
      flex:1 1 auto;
      min-height:50px;
      border-radius:16px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:14px;
      font-weight:900;
      letter-spacing:-0.03em;
    }
    .ai-style-btn.primary{
      background:#0f7cff;
      border-color:#0f7cff;
      color:#fff;
    }


    @media (max-width:860px){
      .shell{
        padding:0 14px 120px;
        overflow-x:hidden;
      }
      .top-tools{
        grid-template-columns:132px minmax(0,1fr);
        gap:6px;
      }

        min-height:38px;

      .listing-slider{
        display:flex;

      }
      .listing-card{
        flex:0 0 186px;

      .calendar-inner{

    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <div class="head">
        <div class="head-top">
          <div class="title"><span style="display:inline-block;margin-right:8px;font-weight:1000;font-size:1.28em;line-height:1;color:#19ce60;">N</span>블로그 발행기</div>
          <button type="button" class="ghost-btn" id="goStatusBtn"><span style="display:inline-block;margin-right:6px;font-weight:1000;font-size:1.18em;line-height:1;color:#19ce60;">N</span>현황판</button>
        </div>

        <div class="top-tools">
          <div class="date-nav">
            <button type="button" class="nav-arrow" id="prevDateBtn">‹</button>
            <button type="button" class="date-trigger" id="datePickerBtn">날짜 선택</button>
            <button type="button" class="nav-arrow" id="nextDateBtn">›</button>
          </div>
          <div class="search-col">
            <input id="searchInput" class="search-input" type="text" placeholder="제목, 주소, 매물번호 검색" autocomplete="off" />
          </div>
        </div>

        <div class="meta-line" id="dateMetaLine">날짜를 선택하거나 검색하세요.</div>
      </div>

      <section class="section">
        <h2 class="section-title">매물 선택</h2>
        <div id="listingEmpty" class="empty">매물을 불러오는 중입니다.</div>

        <div id="listingSliderWrap" class="listing-slider-wrap" style="display:none;">
          <div id="listingSlider" class="listing-slider"></div>
        </div>

        <div id="listingSliderBarWrap" class="slider-bar-wrap" style="display:none;">
          <div id="listingSliderTrack" class="slider-track">
            <div id="listingSliderTrackHit" class="slider-track-hit"></div>
            <div id="listingSliderBarHit" class="slider-thumb-hit">
              <div id="listingSliderBar" class="slider-thumb"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="selectedSummary" class="selected-summary">
        <div id="selectedListingTitle" class="selected-title"></div>
        <div id="selectedListingSub" class="selected-sub"></div>
      </section>

      <section id="assetsSection" class="section assets-section">
        <div class="tools-row">
          <div class="tools-left">
            <div id="selectedCountChip" class="chip">선택 0</div>
            <div id="heroCountChip" class="chip">대표 미지정</div>
          </div>
          <div class="tools-right">
            <button type="button" class="mini-btn blue" id="runLookupBtn">건축물 조회</button>
            <button type="button" class="mini-btn pink" id="generateInfoImageBtn">정보 이미지 생성</button>
          </div>
        </div>

        <h2 class="section-title">사진 배치</h2>
        <div id="assetGrid" class="asset-grid"></div>
      </section>
    </div>

    <div class="bottom-bar">
      <button type="button" class="bottom-btn" id="draftSaveBtn">임시저장</button>
      <button type="button" class="bottom-btn primary" id="publishPrepBtn" disabled>AI호출</button>
    </div>
  </div>


  <div id="aiStyleModal" class="ai-style-modal" aria-hidden="true">
    <div class="ai-style-sheet">
      <div class="ai-style-head">
        <h3 class="ai-style-title">발행스타일 선택</h3>
        <div class="ai-style-sub">원하는 글 스타일을 고르고, 필요하면 글 방향도 간단히 적어주세요.</div>
      </div>
      <div class="ai-style-body">
        <div id="styleGrid" class="style-grid"></div>
        <div class="direction-wrap">
          <div class="direction-label">글방향 디렉션</div>
          <textarea id="directionInput" class="direction-input" placeholder="예: 너무 광고같지 않게, 실수요자 관점으로, 투자자 느낌 나게"></textarea>
        </div>
      </div>
      <div class="ai-style-actions">
        <button type="button" class="ai-style-btn" id="aiStyleCancelBtn">취소</button>
        <button type="button" class="ai-style-btn primary" id="aiStyleConfirmBtn">확인</button>
      </div>
    </div>
  </div>

  <div id="calendarModal" class="calendar-modal" aria-hidden="true">
    <div class="calendar-sheet">
      <div class="calendar-top">
        <div class="calendar-top-inner">
          <button type="button" class="calendar-back" id="calendarBackBtn">← 뒤로</button>
          <div class="calendar-title">캘린더</div>
          <div class="calendar-spacer"></div>
        </div>
      </div>

      <div class="calendar-inner">
        <section class="calendar-shell">
          <div class="calendar-head">
            <button type="button" class="calendar-nav" id="calendarPrevBtn">‹</button>
            <div id="calendarMonthLabel" class="calendar-month-label">2026.04</div>
            <button type="button" class="calendar-nav" id="calendarNextBtn">›</button>
          </div>

          <div class="calendar-weekdays">
            <div class="calendar-weekday">월</div>
            <div class="calendar-weekday">화</div>
            <div class="calendar-weekday">수</div>
            <div class="calendar-weekday">목</div>
            <div class="calendar-weekday">금</div>
            <div class="calendar-weekday">토</div>
            <div class="calendar-weekday">일</div>
          </div>

          <div id="calendarGrid" class="calendar-grid"></div>
        </section>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
    <div class="loading-panel">
      <img class="loading-buddy" src="https://cdn.imweb.me/thumbnail/20260407/eb862821485f9.jpg" alt="로딩">
      <div id="loadingText" class="loading-text">불러오는 중</div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const CONFIG = {
      adminListUrl: 'https://script.google.com/macros/s/AKfycbznhBvYFIv_GKeNoGIPFTi_mIXXH04BOvYrb4ZN9dk_Cc4Xjir3TP_vL3bbPrLLxgg2/exec',
      editorUrl: '/blog-editor',
      statusUrl: '/blog-status'
    };

    let rawItems = [];
    let selectedDate = '';
    let calendarCurrentMonth = '';
    let calendarOverviewMap = {};
    let selectedListing = null;
    let selectedAddressSearchData = null;
    let lastLookupResult = null;
    let assets = [];
    let searchTimer = null;
    let selectedStyleType = 'info';
    let directionNote = '';

    const STYLE_OPTIONS = [
      { id:'info', title:'정보형', desc:'담백하고 정리된 설명형' },
      { id:'trust', title:'신뢰형', desc:'차분하고 믿음 가는 톤' },
      { id:'friendly', title:'친근형', desc:'부드럽고 쉽게 읽히는 톤' },
      { id:'sales', title:'광고형', desc:'매력 포인트를 강하게 강조' },
      { id:'short', title:'간결형', desc:'짧고 빠르게 핵심 전달' },
      { id:'expert', title:'전문형', desc:'분석적이고 단단한 문체' }
    ];

    const els = {
      goStatusBtn: document.getElementById('goStatusBtn'),
      prevDateBtn: document.getElementById('prevDateBtn'),
      nextDateBtn: document.getElementById('nextDateBtn'),
      datePickerBtn: document.getElementById('datePickerBtn'),
      searchInput: document.getElementById('searchInput'),
      dateMetaLine: document.getElementById('dateMetaLine'),
      listingEmpty: document.getElementById('listingEmpty'),
      listingSliderWrap: document.getElementById('listingSliderWrap'),
      listingSlider: document.getElementById('listingSlider'),
      listingSliderBarWrap: document.getElementById('listingSliderBarWrap'),
      listingSliderTrack: document.getElementById('listingSliderTrack'),
      listingSliderTrackHit: document.getElementById('listingSliderTrackHit'),
      listingSliderBarHit: document.getElementById('listingSliderBarHit'),
      listingSliderBar: document.getElementById('listingSliderBar'),
      selectedSummary: document.getElementById('selectedSummary'),
      selectedListingTitle: document.getElementById('selectedListingTitle'),
      selectedListingSub: document.getElementById('selectedListingSub'),
      assetsSection: document.getElementById('assetsSection'),
      assetGrid: document.getElementById('assetGrid'),
      selectedCountChip: document.getElementById('selectedCountChip'),
      heroCountChip: document.getElementById('heroCountChip'),
      runLookupBtn: document.getElementById('runLookupBtn'),
      generateInfoImageBtn: document.getElementById('generateInfoImageBtn'),
      draftSaveBtn: document.getElementById('draftSaveBtn'),
      publishPrepBtn: document.getElementById('publishPrepBtn'),
      aiStyleModal: document.getElementById('aiStyleModal'),
      styleGrid: document.getElementById('styleGrid'),
      directionInput: document.getElementById('directionInput'),
      aiStyleCancelBtn: document.getElementById('aiStyleCancelBtn'),
      aiStyleConfirmBtn: document.getElementById('aiStyleConfirmBtn'),
      calendarModal: document.getElementById('calendarModal'),
      calendarBackBtn: document.getElementById('calendarBackBtn'),
      calendarPrevBtn: document.getElementById('calendarPrevBtn'),
      calendarNextBtn: document.getElementById('calendarNextBtn'),
      calendarMonthLabel: document.getElementById('calendarMonthLabel'),
      calendarGrid: document.getElementById('calendarGrid'),
      loadingOverlay: document.getElementById('loadingOverlay'),
      loadingText: document.getElementById('loadingText'),
      toast: document.getElementById('toast')
    };

    function text(v){ return String(v == null ? '' : v).trim(); }
    function escapeAttr(v){
      return String(v == null ? '' : v)
        .replace(/&/g,'&amp;')
        .replace(/"/g,'&quot;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
    }
    function parseDateValue(value){
      const s = text(value);
      if(!s) return null;
      const t = new Date(s).getTime();
      return Number.isNaN(t) ? null : t;
    }
    function formatDateKeyFromTs(ts){
      const d = new Date(ts);
      return [
        d.getFullYear(),
        String(d.getMonth()+1).padStart(2,'0'),
        String(d.getDate()).padStart(2,'0')
      ].join('-');
    }
    function formatDateLabel(dateKey){
      if(!dateKey) return '날짜 선택';
      const d = new Date(dateKey + 'T00:00:00');
      return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
    }
    function formatMonthLabel(monthKey){
      const parts = String(monthKey || '').split('-');
      if(parts.length !== 2) return '';
      return Number(parts[0]) + '.' + parts[1];
    }
    function getCurrentMonthKeyFromDate(dateKey){
      return text(dateKey).slice(0, 7);
    }
    function detectTeamByListingNumber(listingNumber){
      const s = text(listingNumber).toUpperCase();
      if(s.indexOf('SK-') === 0 || s.indexOf('SK') === 0) return 'shopping';
      if(s.indexOf('MK-') === 0 || s.indexOf('MK') === 0) return 'factory';
      return '';
    }
    function teamLabel(teamType){
      if(teamType === 'shopping') return '상가';
      if(teamType === 'factory') return '공장';
      return '매물';
    }
    function firstDayOfMonthKey(baseDateKey){
      const d = baseDateKey ? new Date(baseDateKey + 'T00:00:00') : new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    }
    function safeJsonParse(textValue, fallback){
      try{
        const parsed = JSON.parse(textValue);
        return parsed == null ? fallback : parsed;
      }catch(e){
        return fallback;
      }
    }
    function showToast(message){
      if(!message) return;
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(function(){
        els.toast.classList.remove('show');
      }, 1800);
    }
    function setLoading(on, label){
      els.loadingText.textContent = label || '불러오는 중';
      els.loadingOverlay.classList.toggle('show', !!on);
    }

    function normalizeItem(item, idx){
      const photoList = safeJsonParse(item && item.photoUrlsJson || '[]', []) || [];
      let firstPhoto = '';
      if(Array.isArray(photoList) && photoList.length){
        const p0 = photoList[0];
        firstPhoto = typeof p0 === 'string' ? p0 : (p0 && (p0.heroUrl || p0.url || p0.lightUrl || p0.thumbUrl)) || '';
      }
      return {
        id: text(item && item.listingNumber) || ('LIST-' + idx),
        listingNumber: text(item && item.listingNumber),
        title: text(item && item.title) || text(item && item.summary1) || '제목 없음',
        address: text(item && item.address),
        dealType: text(item && item.dealType),
        price: text(item && (item.price || item.salePrice)),
        deposit: text(item && item.deposit),
        monthlyRent: text(item && item.monthlyRent),
        heroUrl: text(item && item.heroUrl) || firstPhoto,
        photoUrlsJson: text(item && item.photoUrlsJson) || '[]',
        createdAt: text(item && item.createdAt),
        updatedAt: text(item && item.updatedAt),
        raw: item || {}
      };
    }

    function formatDealPrice(item){
      const dealType = text(item.dealType);
      const price = text(item.price);
      if(dealType && price) return dealType + ' / ' + price;
      if(dealType) return dealType;
      if(price) return price;
      if(item.deposit || item.monthlyRent){
        return '보증금 ' + (item.deposit || '-') + ' / 월세 ' + (item.monthlyRent || '-');
      }
      return '-';
    }

    function fetchPostJson(payload){
      return fetch(CONFIG.adminListUrl, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body: JSON.stringify(payload)
      }).then(function(res){
        if(!res.ok) throw new Error('조회 실패: ' + res.status);
        return res.json();
      });
    }

    function fetchAdminItems(){
      const monthKey = calendarCurrentMonth || firstDayOfMonthKey(selectedDate || formatDateKeyFromTs(Date.now()));
      setLoading(true, '매물 불러오는 중');
      return Promise.all([
        fetchPostJson({ action: 'listAdminProperties' }),
        fetchPostJson({ action: 'getCalendarOverview', month: monthKey })
      ])
      .then(function(results){
        const propertyData = results[0] || {};
        const calendarData = results[1] || {};

        const items = Array.isArray(propertyData && propertyData.items) ? propertyData.items : [];
        rawItems = items.map(normalizeItem);

        calendarCurrentMonth = monthKey;
        calendarOverviewMap = {};

        (Array.isArray(calendarData && calendarData.days) ? calendarData.days : []).forEach(function(day){
          const dateKey = text(day && day.dateKey);
          calendarOverviewMap[dateKey] = {
            shoppingCount: Number(day && day.shoppingCount || 0),
            factoryCount: Number(day && day.factoryCount || 0),
            threadCount: Number(day && day.threadCount || 0)
          };
        });

        if(!selectedDate){
          selectedDate = formatDateKeyFromTs(Date.now());
        }

        renderDateMetaLine();
        renderCalendarGrid();
        applyFiltersAndRenderListings();
      })
      .catch(function(err){
        console.error(err);
        els.listingEmpty.style.display = 'block';
        els.listingEmpty.textContent = '매물 데이터를 불러오지 못했습니다.';
        els.listingSliderWrap.style.display = 'none';
        showToast((err && err.message) || '불러오기 실패');
      })
      .finally(function(){
        setLoading(false);
      });
    }

    function getLocalCalendarPropertiesByDate(dateKey){
      return rawItems
        .filter(function(item){
          const created = parseDateValue(item && item.createdAt);
          if(!created) return false;
          return formatDateKeyFromTs(created) === dateKey;
        })
        .sort(function(a, b){
          return (parseDateValue(b.createdAt) || 0) - (parseDateValue(a.createdAt) || 0);
        });
    }

    function matchesKeyword(item, keyword){
      if(!keyword) return true;
      const haystack = [
        item.title, item.address, item.listingNumber, item.dealType, item.price,
        item.raw && item.raw.summary1, item.raw && item.raw.summary2, item.raw && item.raw.summary3
      ].map(text).join(' ').toLowerCase();
      return haystack.indexOf(keyword.toLowerCase()) > -1;
    }

    function applyFiltersAndRenderListings(){
      const keyword = text(els.searchInput.value);
      let items = selectedDate ? getLocalCalendarPropertiesByDate(selectedDate) : rawItems.slice();
      if(keyword){
        items = items.filter(function(item){ return matchesKeyword(item, keyword); });
      }
      renderListingSlider(items);
    }

    function renderListingSlider(items){
      selectedListing = null;
      assets = [];
      lastLookupResult = null;
      selectedAddressSearchData = null;
      els.selectedSummary.classList.remove('show');
      els.assetsSection.classList.remove('show');
      els.assetGrid.innerHTML = '';
      syncBottomButtons();

      if(!Array.isArray(items) || !items.length){
        els.listingEmpty.style.display = 'block';
        els.listingEmpty.textContent = '해당 조건의 매물이 없습니다.';
        els.listingSliderWrap.style.display = 'none';
        if(els.listingSliderBarWrap) els.listingSliderBarWrap.style.display = 'none';
        return;
      }

      els.listingEmpty.style.display = 'none';
      els.listingSliderWrap.style.display = 'block';
      if(els.listingSliderBarWrap){
        els.listingSliderBarWrap.style.display = (window.innerWidth <= 860 ? 'none' : 'block');
      }

      els.listingSlider.innerHTML = items.map(function(item){
        const team = detectTeamByListingNumber(item.listingNumber);
        const thumb = item.heroUrl ? "background-image:url('" + escapeAttr(item.heroUrl) + "')" : '';
        return ''
          + '<div class="listing-card" data-id="' + escapeAttr(item.id) + '">'
          + '  <div class="listing-thumb" style="' + thumb + '"></div>'
          + '  <div class="listing-body">'
          + '    <div class="listing-top">'
          + '      <div class="listing-team ' + team + '">' + teamLabel(team) + '</div>'
          + '      <div class="listing-no">' + escapeAttr(item.listingNumber) + '</div>'
          + '    </div>'
          + '    <div class="listing-title">' + escapeAttr(item.title) + '</div>'
          + '    <div class="listing-address">' + escapeAttr(item.address || '주소 정보 없음') + '</div>'
          + '    <div class="listing-price">' + escapeAttr(formatDealPrice(item)) + '</div>'
          + '  </div>'
          + '</div>';
      }).join('');

      els.listingSlider.onclick = function(e){
        const card = e.target.closest('.listing-card');
        const id = card ? card.getAttribute('data-id') : '';
        if(!id) return;
        const found = items.find(function(v){ return String(v.id) === String(id); });
        if(found){
          selectListing(found);
        }
      };

      if(bindSliderBar._update && window.innerWidth > 860){
        bindSliderBar._update();
      }
    }

    function selectListing(item){
      selectedListing = item;
      selectedAddressSearchData = null;
      lastLookupResult = null;
      assets = buildPhotoAssets(item.photoUrlsJson);
      if(assets[0]) assets[0].isHero = true;

      Array.prototype.forEach.call(els.listingSlider.querySelectorAll('.listing-card'), function(card){
        card.classList.toggle('is-active', card.getAttribute('data-id') === String(item.id));
      });

      els.selectedSummary.classList.add('show');
      els.selectedListingTitle.textContent = item.title || '선택된 매물';
      els.selectedListingSub.textContent = [item.listingNumber || '-', item.address || '-', formatDealPrice(item)].join(' · ');
      renderAssets();
    }

    function buildPhotoAssets(photoUrlsJson){
      const list = safeJsonParse(photoUrlsJson || '[]', []) || [];
      return (Array.isArray(list) ? list : []).map(function(row, idx){
        return {
          assetId: 'photo_' + idx,
          previewUrl: typeof row === 'string' ? row : text(row && (row.heroUrl || row.url || row.lightUrl || row.thumbUrl)),
          selected: true,
          paragraph: 'p1',
          isHero: false,
          source: row
        };
      });
    }

    function paragraphOptionsHtml(current){
      let html = '';
      for(let i=1;i<=9;i++){
        const value = 'p' + i;
        html += '<option value="' + value + '"' + (current === value ? ' selected' : '') + '>' + i + '단락</option>';
      }
      return html;
    }

    function renderAssets(){
      if(!selectedListing){
        els.assetsSection.classList.remove('show');
        syncBottomButtons();
        return;
      }

      els.assetsSection.classList.add('show');
      els.assetGrid.innerHTML = assets.map(function(item){
        const preview = item.previewUrl ? "background-image:url('" + escapeAttr(item.previewUrl) + "')" : '';
        return ''
          + '<div class="asset-card' + (item.isHero ? ' is-hero' : '') + (item.selected ? ' is-selected' : '') + '" data-asset-id="' + escapeAttr(item.assetId) + '">'
          + '  <div class="asset-preview" style="' + preview + '">'
          + '    <button type="button" class="asset-hero">대표</button>'
          + '    <button type="button" class="asset-check">' + (item.selected ? '✓' : '') + '</button>'
          + '  </div>'
          + '  <div class="asset-body">'
          + '    <select class="select asset-paragraph-select">'
          + paragraphOptionsHtml(item.paragraph)
          + '    </select>'
          + '  </div>'
          + '</div>';
      }).join('');

      Array.prototype.forEach.call(els.assetGrid.querySelectorAll('.asset-card'), function(card){
        const assetId = card.getAttribute('data-asset-id');
        const item = assets.find(function(v){ return v.assetId === assetId; });
        if(!item) return;

        const paraSelect = card.querySelector('.asset-paragraph-select');
        const checkBtn = card.querySelector('.asset-check');
        const heroBtn = card.querySelector('.asset-hero');

        paraSelect.addEventListener('change', function(){
          item.paragraph = paraSelect.value;
        });
        checkBtn.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          item.selected = !item.selected;
          renderAssets();
        });
        heroBtn.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          assets.forEach(function(v){ v.isHero = false; });
          item.isHero = true;
          renderAssets();
        });
      });

      renderAssetMeta();
      syncBottomButtons();
    }

    function renderAssetMeta(){
      const selectedCount = assets.filter(function(v){ return !!v.selected; }).length;
      const hero = assets.find(function(v){ return !!v.isHero; });
      els.selectedCountChip.textContent = '선택 ' + selectedCount;
      els.heroCountChip.textContent = hero ? '대표 지정됨' : '대표 미지정';
    }

    function syncBottomButtons(){
      const hasListing = !!selectedListing;
      const selectedCount = assets.filter(function(v){ return !!v.selected; }).length;
      const hasHero = assets.some(function(v){ return !!v.isHero; });
      els.draftSaveBtn.disabled = !hasListing;
      els.publishPrepBtn.disabled = !(hasListing && selectedCount > 0 && hasHero);
    }

    function renderDateMetaLine(){
      const key = selectedDate;
      const counts = key ? (calendarOverviewMap[key] || { shoppingCount:0, factoryCount:0 }) : null;
      els.datePickerBtn.textContent = key ? formatDateLabel(key) : '날짜 선택';
      els.dateMetaLine.textContent = key
        ? (formatDateLabel(key) + ' · 상가 ' + (counts.shoppingCount || 0) + ' · 공장 ' + (counts.factoryCount || 0))
        : '날짜를 선택하거나 검색하세요.';
    }

    function renderCalendarGrid(){
      els.calendarMonthLabel.textContent = formatMonthLabel(calendarCurrentMonth);
      const parts = String(calendarCurrentMonth || '').split('-');
      const year = Number(parts[0] || 0);
      const monthIndex = Number(parts[1] || 1) - 1;
      const first = new Date(year, monthIndex, 1);
      const start = new Date(first);
      const mondayOffset = (first.getDay() + 6) % 7;
      start.setDate(first.getDate() - mondayOffset);

      let html = '';
      for(let i=0;i<42;i++){
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        const dateKey = formatDateKeyFromTs(date.getTime());
        const isSelected = dateKey === selectedDate;
        const counts = calendarOverviewMap[dateKey] || { shoppingCount:0, factoryCount:0, threadCount:0 };
        html += ''
          + '<button type="button" class="calendar-cell' + (isSelected ? ' is-selected' : '') + '" data-date-key="' + dateKey + '">'
          + '  <div class="calendar-day-number">' + date.getDate() + '</div>'
          + '  <div class="calendar-lines">'
          + '    <div class="calendar-line' + ((counts.shoppingCount || 0) ? '' : ' zero') + '">상가 ' + (counts.shoppingCount || 0) + '</div>'
          + '    <div class="calendar-line' + ((counts.factoryCount || 0) ? '' : ' zero') + '">공장 ' + (counts.factoryCount || 0) + '</div>'
          + '  </div>'
          + '</button>';
      }
      els.calendarGrid.innerHTML = html;

      Array.prototype.forEach.call(els.calendarGrid.querySelectorAll('.calendar-cell'), function(cell){
        cell.addEventListener('click', function(){
          selectedDate = cell.getAttribute('data-date-key');
          renderDateMetaLine();
          applyFiltersAndRenderListings();
          closeCalendarModal();
        });
      });
    }

    function moveCalendarMonth(offset){
      const parts = String(calendarCurrentMonth || firstDayOfMonthKey()).split('-');
      const d = new Date(Number(parts[0]), Number(parts[1]) - 1 + offset, 1);
      calendarCurrentMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      fetchCalendarOverviewOnly();
    }

    function fetchCalendarOverviewOnly(){
      setLoading(true, '달력 불러오는 중');
      fetchPostJson({ action:'getCalendarOverview', month: calendarCurrentMonth })
        .then(function(calendarData){
          calendarOverviewMap = {};
          (Array.isArray(calendarData && calendarData.days) ? calendarData.days : []).forEach(function(day){
            const dateKey = text(day && day.dateKey);
            calendarOverviewMap[dateKey] = {
              shoppingCount: Number(day && day.shoppingCount || 0),
              factoryCount: Number(day && day.factoryCount || 0),
              threadCount: Number(day && day.threadCount || 0)
            };
          });
          renderCalendarGrid();
          renderDateMetaLine();
        })
        .catch(function(err){
          console.error(err);
          showToast((err && err.message) || '달력 불러오기 실패');
        })
        .finally(function(){
          setLoading(false);
        });
    }

    function openCalendarModal(){
      els.calendarModal.classList.add('show');
      renderCalendarGrid();
    }
    function closeCalendarModal(){
      els.calendarModal.classList.remove('show');
    }

    function openAddressSearch(initialQuery){
      try{
        new daum.Postcode({
          oncomplete: function(data){
            selectedAddressSearchData = {
              roadAddress: data.roadAddress || '',
              jibunAddress: data.jibunAddress || '',
              sigunguCode: data.sigunguCode || '',
              bcode: data.bcode || '',
              zonecode: data.zonecode || '',
              buildingName: data.buildingName || '',
              apartment: data.apartment || '',
              addressType: data.userSelectedType || ''
            };
            showToast('주소 선택 완료');
          }
        }).open({ q: initialQuery || (selectedListing && selectedListing.address) || '' });
      }catch(e){
        console.error(e);
        showToast('주소검색 오류');
      }
    }

    function runLookup(){
      if(!selectedListing){
        showToast('먼저 매물 선택');
        return;
      }
      if(!selectedAddressSearchData){
        openAddressSearch(selectedListing.address || '');
        return;
      }
      setLoading(true, '건축물 조회 중');
      const payload = { action:'fetchPublicPropertyBySearchResult' };
      Object.keys(selectedAddressSearchData).forEach(function(k){
        payload[k] = selectedAddressSearchData[k];
      });
      fetchPostJson(payload)
        .then(function(data){
          if(!(data && data.ok)){
            throw new Error((data && (data.error || data.message)) || '조회 실패');
          }
          lastLookupResult = data;
          showToast('조회 완료');
        })
        .catch(function(err){
          console.error(err);
          showToast((err && err.message) || '조회 실패');
        })
        .finally(function(){
          setLoading(false);
        });
    }

    function generateInfoImages(){
      if(!selectedListing){
        showToast('먼저 매물 선택');
        return;
      }
      if(!lastLookupResult){
        showToast('먼저 건축물 조회');
        return;
      }
      setLoading(true, '정보 이미지 생성 중');
      fetchPostJson({
        action:'generateBlogInfoImages',
        listingNumber:selectedListing.listingNumber,
        lookupResult:lastLookupResult
      })
      .then(function(data){
        if(!data || data.ok === false){
          throw new Error((data && data.message) || '정보 이미지 생성 실패');
        }
        const images = Array.isArray(data.images) ? data.images : [];
        if(!images.length){
          showToast('생성된 정보 이미지 없음');
          return;
        }
        const base = assets.filter(function(v){ return String(v.assetId).indexOf('info_') === 0; }).length;
        images.forEach(function(img, idx){
          assets.push({
            assetId:'info_' + (base + idx),
            previewUrl:text(img && (img.url || img.previewUrl)),
            selected:true,
            paragraph:'p2',
            isHero:false,
            source:img
          });
        });
        renderAssets();
        showToast('정보 이미지 추가');
      })
      .catch(function(err){
        console.error(err);
        showToast((err && err.message) || '정보 이미지 생성 실패');
      })
      .finally(function(){
        setLoading(false);
      });
    }

    function collectDraftPayload(){
      const hero = assets.find(function(v){ return !!v.isHero; });
      return {
        listingNumber: selectedListing ? selectedListing.listingNumber : '',
        title: selectedListing ? selectedListing.title : '',
        address: selectedListing ? selectedListing.address : '',
        heroAssetId: hero ? hero.assetId : '',
        selectedAssetIdsJson: JSON.stringify(assets.filter(function(v){ return !!v.selected; }).map(function(v){ return v.assetId; })),
        assetOrderJson: JSON.stringify(assets.map(function(v){ return v.assetId; })),
        assetParagraphMapJson: JSON.stringify(assets.reduce(function(acc, item){
          acc[item.assetId] = item.paragraph || 'p1';
          return acc;
        }, {})),
        assetTypeMapJson: JSON.stringify(assets.reduce(function(acc, item){
          acc[item.assetId] = String(item.assetId).indexOf('info_') === 0 ? 'info_image' : 'photo';
          return acc;
        }, {})),
        assetSourceMapJson: JSON.stringify(assets.reduce(function(acc, item){
          acc[item.assetId] = item.source || item.previewUrl || '';
          return acc;
        }, {})),
        selectedDate: selectedDate || '',
        searchKeyword: text(els.searchInput.value),
        status: 'draft'
      };
    }

    function saveDraft(){
      if(!selectedListing){
        showToast('먼저 매물 선택');
        return;
      }
      setLoading(true, '임시저장 중');
      fetchPostJson({
        action:'saveBlogDraft',
        payload: collectDraftPayload()
      })
      .then(function(data){
        if(!data || data.ok === false){
          throw new Error((data && data.message) || '임시저장 실패');
        }
        showToast('임시저장 완료');
      })
      .catch(function(err){
        console.error(err);
        showToast((err && err.message) || '임시저장 실패');
      })
      .finally(function(){
        setLoading(false);
      });
    }

    function goEditor(){
      if(els.publishPrepBtn.disabled) return;
      setLoading(true, '초안 저장 중');
      fetchPostJson({
        action:'saveBlogDraft',
        payload: collectDraftPayload()
      })
      .then(function(data){
        if(!data || data.ok === false){
          throw new Error((data && data.message) || '초안 저장 실패');
        }
        const blogId = text(data.blogId);
        if(!blogId){
          throw new Error('blogId 없음');
        }
        location.href = CONFIG.editorUrl + '?blogId=' + encodeURIComponent(blogId);
      })
      .catch(function(err){
        console.error(err);
        showToast((err && err.message) || '초안 저장 실패');
      })
      .finally(function(){
        setLoading(false);
      });
    }

    function goRelativeDate(offset){
      const base = selectedDate ? new Date(selectedDate + 'T00:00:00') : new Date();
      base.setDate(base.getDate() + offset);
      selectedDate = formatDateKeyFromTs(base.getTime());
      const nextMonth = getCurrentMonthKeyFromDate(selectedDate);
      if(nextMonth !== calendarCurrentMonth){
        calendarCurrentMonth = nextMonth;
        fetchCalendarOverviewOnly();
      }else{
        renderDateMetaLine();
        applyFiltersAndRenderListings();
      }
    }


    function renderStyleOptions(){
      if(!els.styleGrid) return;
      els.styleGrid.innerHTML = STYLE_OPTIONS.map(function(opt){
        return ''
          + '<button type="button" class="style-card' + (opt.id === selectedStyleType ? ' is-active' : '') + '" data-style-id="' + escapeAttr(opt.id) + '">'
          + '  <div class="style-card-title">' + escapeAttr(opt.title) + '</div>'
          + '  <div class="style-card-desc">' + escapeAttr(opt.desc) + '</div>'
          + '</button>';
      }).join('');

      Array.prototype.forEach.call(els.styleGrid.querySelectorAll('.style-card'), function(card){
        card.addEventListener('click', function(){
          selectedStyleType = card.getAttribute('data-style-id') || 'info';
          renderStyleOptions();
        });
      });
    }

    function openAiStyleModal(){
      directionNote = els.directionInput ? els.directionInput.value : directionNote;
      renderStyleOptions();
      if(els.directionInput) els.directionInput.value = directionNote || '';
      els.aiStyleModal.classList.add('show');
    }

    function closeAiStyleModal(){
      if(els.directionInput) directionNote = els.directionInput.value || '';
      els.aiStyleModal.classList.remove('show');
    }

    function confirmAiStyleModal(){
      directionNote = els.directionInput ? els.directionInput.value || '' : '';
      showToast('UX만 세팅됨');
      closeAiStyleModal();
    }


    function bindSliderBar(){
      if(!els.listingSliderWrap || !els.listingSliderBarHit) return;
      function update(){
        const wrap = els.listingSliderWrap;
        const hit = els.listingSliderBarHit;
        const scrollWidth = wrap.scrollWidth || 0;
        const clientWidth = wrap.clientWidth || 0;
        const maxScroll = Math.max(0, scrollWidth - clientWidth);

        if(scrollWidth <= clientWidth + 2){
          hit.style.width = '100%';
          hit.style.transform = 'translateY(-50%) translateX(0)';
          return;
        }

        const thumbWidthPx = Math.max(36, (clientWidth / scrollWidth) * clientWidth);
        const maxTravelPx = Math.max(0, clientWidth - thumbWidthPx);
        const leftPx = maxScroll > 0 ? (wrap.scrollLeft / maxScroll) * maxTravelPx : 0;

        hit.style.width = thumbWidthPx + 'px';
        hit.style.transform = 'translateY(-50%) translateX(' + leftPx + 'px)';
      }
      els.listingSliderWrap.addEventListener('scroll', update, {passive:true});
      window.addEventListener('resize', update);
      bindSliderBar._update = update;
    }

    function bindSliderBarDrag(){
      const wrap = els.listingSliderWrap;
      const track = els.listingSliderTrack;
      const trackHit = els.listingSliderTrackHit;
      const thumb = els.listingSliderBarHit;
      if(!wrap || !track || !trackHit || !thumb) return;

      function maxScroll(){
        return Math.max(0, wrap.scrollWidth - wrap.clientWidth);
      }

      function syncFromClientX(clientX){
        const trackRect = track.getBoundingClientRect();
        const thumbWidth = thumb.offsetWidth || 0;
        const usable = Math.max(1, trackRect.width - thumbWidth);
        let left = clientX - trackRect.left - (thumbWidth / 2);
        left = Math.max(0, Math.min(usable, left));
        const ratio = usable > 0 ? (left / usable) : 0;
        wrap.scrollLeft = ratio * maxScroll();
        if(bindSliderBar._update) bindSliderBar._update();
      }

      let draggingTrack = false;
      function onTrackDown(e){
        if(window.innerWidth <= 860) return;
        if(e.pointerType === 'mouse' && e.button !== 0) return;
        draggingTrack = true;
        syncFromClientX(e.clientX);
        try{ trackHit.setPointerCapture(e.pointerId); }catch(err){}
        e.preventDefault();
        e.stopPropagation();
      }
      function onTrackMove(e){
        if(!draggingTrack) return;
        syncFromClientX(e.clientX);
        e.preventDefault();
        e.stopPropagation();
      }
      function onTrackUp(e){
        if(!draggingTrack) return;
        draggingTrack = false;
        try{ trackHit.releasePointerCapture(e.pointerId); }catch(err){}
        e.preventDefault();
        e.stopPropagation();
      }

      trackHit.addEventListener('pointerdown', onTrackDown);
      trackHit.addEventListener('pointermove', onTrackMove);
      trackHit.addEventListener('pointerup', onTrackUp);
      trackHit.addEventListener('pointercancel', onTrackUp);
      trackHit.addEventListener('lostpointercapture', onTrackUp);

      let draggingThumb = false;
      function onThumbDown(e){
        if(window.innerWidth <= 860) return;
        if(e.pointerType === 'mouse' && e.button !== 0) return;
        draggingThumb = true;
        thumb.style.cursor = 'grabbing';
        try{ thumb.setPointerCapture(e.pointerId); }catch(err){}
        e.preventDefault();
        e.stopPropagation();
      }
      function onThumbMove(e){
        if(!draggingThumb) return;
        syncFromClientX(e.clientX);
        e.preventDefault();
        e.stopPropagation();
      }
      function onThumbUp(e){
        if(!draggingThumb) return;
        draggingThumb = false;
        thumb.style.cursor = 'grab';
        try{ thumb.releasePointerCapture(e.pointerId); }catch(err){}
        e.preventDefault();
        e.stopPropagation();
      }

      thumb.addEventListener('pointerdown', onThumbDown);
      thumb.addEventListener('pointermove', onThumbMove);
      thumb.addEventListener('pointerup', onThumbUp);
      thumb.addEventListener('pointercancel', onThumbUp);
      thumb.addEventListener('lostpointercapture', onThumbUp);
    }

    function bindEvents(){
      els.goStatusBtn.addEventListener('click', function(){
        location.href = CONFIG.statusUrl;
      });
      els.prevDateBtn.addEventListener('click', function(){ goRelativeDate(-1); });
      els.nextDateBtn.addEventListener('click', function(){ goRelativeDate(1); });
      els.datePickerBtn.addEventListener('click', openCalendarModal);
      els.calendarBackBtn.addEventListener('click', closeCalendarModal);
      els.calendarModal.addEventListener('click', function(e){
        if(e.target === els.calendarModal) closeCalendarModal();
      });
      els.calendarPrevBtn.addEventListener('click', function(){ moveCalendarMonth(-1); });
      els.calendarNextBtn.addEventListener('click', function(){ moveCalendarMonth(1); });
      els.searchInput.addEventListener('input', function(){
        clearTimeout(searchTimer);
        searchTimer = setTimeout(applyFiltersAndRenderListings, 220);
      });
      els.runLookupBtn.addEventListener('click', runLookup);
      els.generateInfoImageBtn.addEventListener('click', generateInfoImages);
      els.draftSaveBtn.addEventListener('click', saveDraft);
      els.publishPrepBtn.addEventListener('click', openAiStyleModal);
      els.aiStyleCancelBtn.addEventListener('click', closeAiStyleModal);
      els.aiStyleConfirmBtn.addEventListener('click', confirmAiStyleModal);
      els.aiStyleModal.addEventListener('click', function(e){
        if(e.target === els.aiStyleModal) closeAiStyleModal();
      });
    }

    bindEvents();
    bindSliderBar();
    bindSliderBarDrag();
    selectedDate = formatDateKeyFromTs(Date.now());
    calendarCurrentMonth = firstDayOfMonthKey(selectedDate);
    renderDateMetaLine();
    fetchAdminItems();
  </script>
</body>
</html>
