<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>블로그 에디터</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --paper:#ffffff;
      --ink:#16181d;
      --muted:#6b7280;
      --line:#e7ecf2;
      --blue:#0f7cff;
      --blue-soft:#eef5ff;
      --shadow:0 18px 38px rgba(15,23,42,.08);
      --page:920px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif}
    body{min-width:0}
    button,input,textarea{font:inherit}
    button{cursor:pointer;border:none;background:none}
    input,textarea{outline:none}
    .page{min-height:100vh;padding:0 0 72px}
    .topbar{
      position:sticky;top:0;z-index:40;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:12px 16px;
      background:rgba(245,247,251,.9);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(231,236,242,.9);
    }
    .top-left,.top-right{display:flex;align-items:center;gap:10px;min-width:0}
    .btn{
      min-height:42px;padding:0 14px;border-radius:14px;border:1px solid var(--line);
      background:#fff;color:var(--ink);font-size:14px;font-weight:900;letter-spacing:-0.03em;
      box-shadow:0 8px 20px rgba(15,23,42,.04)
    }
    .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
    .chip{
      display:inline-flex;align-items:center;justify-content:center;min-height:30px;padding:0 12px;
      border-radius:999px;background:var(--blue-soft);border:1px solid #cfe2ff;color:var(--blue);
      font-size:12px;font-weight:900;white-space:nowrap
    }
    .shell{max-width:var(--page);margin:0 auto;padding:18px 14px 0}
    .paper{
      background:var(--paper);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:28px;overflow:hidden;
    }
    .hero{background:#eef2f7;aspect-ratio:16/9;background-position:center;background-size:cover}
    .hero.empty{display:flex;align-items:center;justify-content:center;color:#8b95a1;font-size:15px;font-weight:800}
    .article{padding:26px 22px 34px}
    .meta-line{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;color:#7a8491;font-size:13px;font-weight:800}
    .meta-pill{display:inline-flex;align-items:center;min-height:28px;padding:0 10px;border-radius:999px;background:#f7f9fc;border:1px solid #e8edf4}
    .title{margin:0;font-size:38px;line-height:1.24;font-weight:950;letter-spacing:-0.05em;word-break:keep-all}
    .lead{margin:16px 0 0;font-size:20px;line-height:1.85;color:#2f3742;font-weight:700;word-break:keep-all;white-space:pre-line}
    .lead.is-empty{color:#98a1ad}
    .divider{height:1px;background:var(--line);margin:28px 0}
    .block{margin:0 0 34px}
    .section-title{margin:0 0 16px;font-size:34px;line-height:1.3;font-weight:950;letter-spacing:-0.04em;word-break:keep-all}
    .paragraphs{display:grid;gap:18px}
    .paragraph{
      margin:0;font-size:19px;line-height:2.02;color:#2e3741;font-weight:500;word-break:keep-all;white-space:pre-line;
    }
    .paragraph.is-empty{color:#98a1ad}
    .figure{margin:22px 0 26px}
    .figure img{width:100%;display:block;border-radius:22px;border:1px solid #ebeff5;background:#f0f4f8}
    .figcap{margin-top:8px;font-size:12px;color:#85909d;font-weight:800}
    .section-image-stack{display:grid;gap:18px;margin:18px 0 10px}
    .section-kicker{margin:0 0 8px;font-size:12px;font-weight:900;color:#7d8794;letter-spacing:.08em;text-transform:uppercase}
    .basic-info-block{margin-top:44px;padding-top:6px}
    .info-strip{margin:30px 0;padding:18px 18px;border-radius:22px;background:#fbfcff;border:1px solid #e9eef5}
    .info-strip-title{font-size:15px;font-weight:900;margin:0 0 10px;color:#1d2430}
    .thumb-lines{display:grid;gap:8px}
    .thumb-line{font-size:16px;font-weight:800;color:#334155}
    .cta{margin-top:40px;padding:24px;border-radius:24px;background:#fbfcff;border:1px solid #e9eef5}
    .cta-title{margin:0 0 8px;font-size:22px;font-weight:900;letter-spacing:-0.04em}
    .cta-text{margin:0;font-size:16px;line-height:1.75;color:#475161;font-weight:700;white-space:pre-line}
    .hashtags{margin-top:26px;display:flex;flex-wrap:wrap;gap:10px}
    .tag{display:inline-flex;align-items:center;min-height:34px;padding:0 12px;border-radius:999px;background:#eef5ff;border:1px solid #d5e6ff;color:#2369d9;font-size:13px;font-weight:900}
    .footer-note{margin-top:28px;font-size:12px;color:#9aa3af;font-weight:800}

    .editbox{display:none !important;margin-top:10px}
    .editbox.show{display:none !important}
    .textarea,.input{
      width:100%;padding:14px 15px;border-radius:18px;border:1px solid #dce5ef;background:#fff;color:var(--ink);
      font-size:15px;line-height:1.7;font-weight:700
    }
    .textarea{min-height:140px;resize:vertical}
    .mini-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}
    .mini-btn{min-height:38px;padding:0 12px;border-radius:12px;border:1px solid #dce5ef;background:#fff;color:var(--ink);font-size:13px;font-weight:900}
    .mini-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
    .touch-hint{margin-top:8px;font-size:12px;color:#97a1ae;font-weight:800}
    .editable{cursor:text}
    .editable:hover{opacity:.98}
    .editable.is-editing{
      outline:2px solid rgba(15,124,255,.18);
      border-radius:10px;
      background:#f8fbff;
    }

    .floating-tools{
      position:fixed;right:18px;bottom:18px;z-index:35;display:flex;flex-direction:column;gap:10px;
    }
    .fab{min-width:52px;min-height:52px;padding:0 14px;border-radius:16px;background:#fff;border:1px solid var(--line);box-shadow:0 14px 28px rgba(15,23,42,.1);font-size:13px;font-weight:900;color:#1a202c}

    .loading-overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(255,255,255,.74);backdrop-filter:blur(3px);padding:24px}
    .loading-overlay.show{display:flex}
    .loading-panel{display:grid;gap:12px;justify-items:center;text-align:center}
    .spinner{width:66px;height:66px;border-radius:999px;border:5px solid #dae8ff;border-top-color:#0f7cff;animation:spin 1s linear infinite}
    .loading-text{font-size:18px;font-weight:900;color:#257fe3;letter-spacing:-0.03em}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:120;min-width:180px;max-width:calc(100% - 40px);padding:13px 16px;border-radius:14px;background:rgba(17,24,39,.92);color:#fff;font-size:14px;font-weight:800;line-height:1.45;text-align:center;opacity:0;pointer-events:none;transition:opacity .18s ease}
    .toast.show{opacity:1}

    @media (max-width: 900px){
      .title{font-size:31px}
      .lead{font-size:18px;line-height:1.9}
      .section-title{font-size:30px}
      .paragraph{font-size:17px;line-height:1.92}
      .article{padding:20px 16px 28px}
      .shell{padding:12px 10px 0}
      .topbar{flex-wrap:wrap;align-items:flex-start}
      .top-right{width:100%;justify-content:flex-end;flex-wrap:wrap}
      .floating-tools{right:12px;bottom:14px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="top-left">
        <button type="button" class="btn" id="backBtn">← 뒤로</button>
        <div class="chip" id="statusChip">초안 로딩중</div>
      </div>
      <div class="top-right">
        <button type="button" class="btn" id="saveBtn">임시저장</button>
        <button type="button" class="btn primary" id="publishBtn">발행준비</button>
      </div>
    </div>

    <div class="shell">
      <article class="paper">
        <div class="hero empty" id="heroBox">대표 이미지 없음</div>
        <div class="article">
          <div class="meta-line">
            <span class="meta-pill" id="metaListing">매물번호 -</span>
            <span class="meta-pill" id="metaStatus">상태 -</span>
            <span class="meta-pill" id="metaStyle">스타일 -</span>
          </div>

          <h1 class="title editable" id="titleDisplay">제목을 불러오는 중입니다.</h1>
          <div class="editbox" id="titleEditBox">
            <input type="text" class="input" id="titleInput" placeholder="제목 입력" />
            <div class="mini-actions">
              <button type="button" class="mini-btn" id="titleCancelBtn">취소</button>
              <button type="button" class="mini-btn primary" id="titleSaveBtn">저장</button>
            </div>
          </div>

          <p class="lead editable" id="leadDisplay">도입 문구를 불러오는 중입니다.</p>
          <div class="editbox" id="leadEditBox">
            <textarea class="textarea" id="leadInput" placeholder="도입 문구"></textarea>
            <div class="mini-actions">
              <button type="button" class="mini-btn" id="leadCancelBtn">취소</button>
              <button type="button" class="mini-btn primary" id="leadSaveBtn">저장</button>
            </div>
          </div>

          <div class="touch-hint">제목이나 문단을 터치하면 바로 수정할 수 있습니다.</div>

          <div class="divider"></div>

          <div id="articleSections"></div>

          <div class="info-strip" id="thumbStrip" style="display:none;">
            <div class="info-strip-title">썸네일 문구</div>
            <div class="thumb-lines" id="thumbLines"></div>
          </div>

          <section class="cta">
            <h3 class="cta-title editable" id="ctaLabelDisplay">문의하기</h3>
            <div class="editbox" id="ctaLabelEditBox">
              <input type="text" class="input" id="ctaLabelInput" placeholder="CTA 라벨" />
              <div class="mini-actions">
                <button type="button" class="mini-btn" id="ctaLabelCancelBtn">취소</button>
                <button type="button" class="mini-btn primary" id="ctaLabelSaveBtn">저장</button>
              </div>
            </div>

            <p class="cta-text editable" id="ctaTextDisplay">문의 문구를 입력하세요.</p>
            <div class="editbox" id="ctaTextEditBox">
              <textarea class="textarea" id="ctaTextInput" placeholder="CTA 문구"></textarea>
              <div class="mini-actions">
                <button type="button" class="mini-btn" id="ctaTextCancelBtn">취소</button>
                <button type="button" class="mini-btn primary" id="ctaTextSaveBtn">저장</button>
              </div>
            </div>
          </section>

          <div class="hashtags" id="tagWrap"></div>
          <div class="footer-note" id="footerNote">blogId를 불러오는 중입니다.</div>
        </div>
      </article>
    </div>

    <div class="floating-tools">
      <button type="button" class="fab" id="tagEditBtn">태그수정</button>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
    <div class="loading-panel">
      <div class="spinner"></div>
      <div id="loadingText" class="loading-text">불러오는 중</div>
    </div>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    const CONFIG = {
      adminListUrl: 'https://script.google.com/macros/s/AKfycbznhBvYFIv_GKeNoGIPFTi_mIXXH04BOvYrb4ZN9dk_Cc4Xjir3TP_vL3bbPrLLxgg2/exec',
      listUrl: '/naverbloginput'
    };

    const state = {
      blogId: '',
      row: null,
      original: null,
      tags: [],
      thumbs: [],
      cta: { label:'', text:'' },
      bodyParagraphs: [],
      overviewParagraphs: [],
      sectionParagraphs: {}
    };

    const els = {
      backBtn: document.getElementById('backBtn'),
      saveBtn: document.getElementById('saveBtn'),
      publishBtn: document.getElementById('publishBtn'),
      statusChip: document.getElementById('statusChip'),
      heroBox: document.getElementById('heroBox'),
      metaListing: document.getElementById('metaListing'),
      metaStatus: document.getElementById('metaStatus'),
      metaStyle: document.getElementById('metaStyle'),
      titleDisplay: document.getElementById('titleDisplay'),
      titleEditBox: document.getElementById('titleEditBox'),
      titleInput: document.getElementById('titleInput'),
      titleCancelBtn: document.getElementById('titleCancelBtn'),
      titleSaveBtn: document.getElementById('titleSaveBtn'),
      leadDisplay: document.getElementById('leadDisplay'),
      leadEditBox: document.getElementById('leadEditBox'),
      leadInput: document.getElementById('leadInput'),
      leadCancelBtn: document.getElementById('leadCancelBtn'),
      leadSaveBtn: document.getElementById('leadSaveBtn'),
      articleSections: document.getElementById('articleSections'),
      thumbStrip: document.getElementById('thumbStrip'),
      thumbLines: document.getElementById('thumbLines'),
      ctaLabelDisplay: document.getElementById('ctaLabelDisplay'),
      ctaLabelEditBox: document.getElementById('ctaLabelEditBox'),
      ctaLabelInput: document.getElementById('ctaLabelInput'),
      ctaLabelCancelBtn: document.getElementById('ctaLabelCancelBtn'),
      ctaLabelSaveBtn: document.getElementById('ctaLabelSaveBtn'),
      ctaTextDisplay: document.getElementById('ctaTextDisplay'),
      ctaTextEditBox: document.getElementById('ctaTextEditBox'),
      ctaTextInput: document.getElementById('ctaTextInput'),
      ctaTextCancelBtn: document.getElementById('ctaTextCancelBtn'),
      ctaTextSaveBtn: document.getElementById('ctaTextSaveBtn'),
      tagWrap: document.getElementById('tagWrap'),
      footerNote: document.getElementById('footerNote'),
      tagEditBtn: document.getElementById('tagEditBtn'),
      loadingOverlay: document.getElementById('loadingOverlay'),
      loadingText: document.getElementById('loadingText'),
      toast: document.getElementById('toast')
    };

    function text(v){ return String(v == null ? '' : v).trim(); }
    function esc(v){ return String(v == null ? '' : v).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
    function parseJson(v, fallback){ try{ const x = JSON.parse(v); return x == null ? fallback : x; }catch(e){ return fallback; } }
    function getParam(name){ return new URLSearchParams(location.search).get(name) || ''; }
    function setLoading(on, label){ els.loadingText.textContent = label || '불러오는 중'; els.loadingOverlay.classList.toggle('show', !!on); }
    function showToast(msg){ if(!msg) return; els.toast.textContent = msg; els.toast.classList.add('show'); clearTimeout(showToast._timer); showToast._timer=setTimeout(()=>els.toast.classList.remove('show'),1800); }
    function fetchPostJson(payload){
      return fetch(CONFIG.adminListUrl, {
        method:'POST', mode:'cors', headers:{'Content-Type':'text/plain;charset=UTF-8'}, body: JSON.stringify(payload)
      }).then(res => { if(!res.ok) throw new Error('요청 실패: ' + res.status); return res.json(); });
    }
    function splitParagraphs(bodyText){ return text(bodyText).split(/\n{2,}/).map(s=>s.trim()).filter(Boolean); }
    function bodyTextToHtml(bodyText){ return splitParagraphs(bodyText).map(p => '<p>' + esc(p).replace(/\n/g,'<br>') + '</p>').join('\n'); }
    function toDirectImageUrl(url){
      const s = text(url);
      let m = s.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if(m && m[1]) return 'https://drive.google.com/uc?export=view&id=' + m[1];
      m = s.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if(m && m[1]) return 'https://drive.google.com/uc?export=view&id=' + m[1];
      return s;
    }
    function makeDealPrice(row){
      const deal = text(row.dealTypeSnapshot || row.dealType);
      const price = text(row.priceSnapshot || row.price);
      if(deal && price) return deal + ' / ' + price;
      return deal || price || '-';
    }

    function makeOverview(row){
      const listing = parseJson(row.listingSnapshotJson || '{}', {});
      const lines = [];
      const bullets = [listing.summary1, listing.summary2, listing.summary3].map(text).filter(Boolean);
      if(bullets.length) lines.push.apply(lines, bullets);
      const info = [];
      if(text(listing.propertyType)) info.push('유형 ' + text(listing.propertyType));
      if(text(listing.floorInfo)) info.push('층수 ' + text(listing.floorInfo));
      if(text(listing.exclusiveAreaPy)) info.push('전용 ' + text(listing.exclusiveAreaPy) + '평');
      if(text(listing.moveInDate)) info.push('입주 ' + text(listing.moveInDate));
      if(text(listing.parkingCount)) info.push('주차 ' + text(listing.parkingCount));
      if(info.length) lines.push(info.join(' · '));
      if(!lines.length) lines.push('매물 기본정보를 바탕으로 블로그 내용을 정리해 주세요.');
      return lines;
    }
    function htmlToPlainParagraphs(html){
      const s = text(html);
      if(!s) return [];
      try{
        const div = document.createElement('div');
        div.innerHTML = s;
        const paras = [];
        Array.prototype.forEach.call(div.querySelectorAll('p'), function(p){
          const t = text((p.innerText || '').replace(/\u00A0/g,' '));
          if(t) paras.push(t);
        });
        if(paras.length) return paras;
        const t = text((div.innerText || '').replace(/\u00A0/g,' '));
        return t ? t.split(/\n{2,}/).map(text).filter(Boolean) : [];
      }catch(_){
        return [];
      }
    }
    function makeBodyParagraphs(row){
      const fromJson = parseJson(row.paragraphTextJson || '[]', []);
      if(Array.isArray(fromJson) && fromJson.map(text).filter(Boolean).length){
        return fromJson.map(text).filter(Boolean);
      }
      const fromBody = splitParagraphs(row.bodyText || '');
      if(fromBody.length) return fromBody;
      const fromHtml = htmlToPlainParagraphs(row.bodyHtml || '');
      if(fromHtml.length) return fromHtml;
      const listing = parseJson(row.listingSnapshotJson || '{}', {});
      const fallback = [];
      const memo = text(listing.memo || row.memo || '');
      if(text(listing.title)) fallback.push(text(listing.title));
      const facts = [
        text(listing.addressMasked || row.addressMasked || row.address),
        makeDealPrice(row),
        text(listing.approvalDate) ? '사용승인 ' + text(listing.approvalDate) : '',
        text(listing.buildingComposition),
        text(listing.zoning)
      ].filter(Boolean);
      if(facts.length) fallback.push(facts.join(' · '));
      if(memo) fallback.push(memo);
      if(!fallback.length) fallback.push('AI 초안이 아직 생성되지 않았습니다.');
      return fallback;
    }
    function getTeamType(row){
      const no = text(row && row.listingNumber).toUpperCase();
      if(no.indexOf('SK') === 0) return 'commercial';
      return 'factory';
    }
    function getSectionMeta(row){
      const team = getTeamType(row);
      return team === 'commercial'
        ? [
            { key:'hero_intro', heading:'매물 한눈에 보기', slots:['hero','p1'], min:1 },
            { key:'property_overview', heading:'매물 개요', slots:['p1'], min:1 },
            { key:'location_context', heading:'입지와 접근', slots:['p2','p3'], min:1 },
            { key:'building_and_usage', heading:'공간 구성', slots:['p4','p5'], min:1 },
            { key:'strengths_summary', heading:'핵심 포인트', slots:['p6'], min:1 },
            { key:'detailed_note', heading:'세부 참고', slots:['p7','p8','p9'], min:1 }
          ]
        : [
            { key:'hero_intro', heading:'매물 한눈에 보기', slots:['hero','p1'], min:1 },
            { key:'property_overview', heading:'매물 개요', slots:['p1'], min:1 },
            { key:'location_context', heading:'야드와 진입', slots:['p2','p3'], min:1 },
            { key:'building_and_usage', heading:'내부와 작업 동선', slots:['p4','p5'], min:1 },
            { key:'strengths_summary', heading:'설비와 장점', slots:['p6'], min:1 },
            { key:'detailed_note', heading:'세부 참고', slots:['p7','p8','p9'], min:1 }
          ];
    }
    function distributeParagraphs(paragraphs, sections){
      const list = (paragraphs || []).slice();
      const count = sections.length;
      const out = {};
      sections.forEach(function(sec){ out[sec.key] = []; });
      if(!list.length) return out;
      let idx = 0;
      sections.forEach(function(sec){
        if(idx < list.length && sec.min > 0){
          out[sec.key].push(list[idx++]);
        }
      });
      let secIndex = 0;
      while(idx < list.length){
        const sec = sections[Math.min(secIndex, sections.length - 1)];
        out[sec.key].push(list[idx++]);
        secIndex = (secIndex + 1) % sections.length;
      }
      return out;
    }
    function renderParagraphList(list, key){
      return (list || []).map(function(p, idx){
        const empty = !text(p);
        return '<p class="paragraph editable' + (empty ? ' is-empty' : '') + '" contenteditable="plaintext-only" spellcheck="false" data-edit-key="' + key + '" data-edit-idx="' + idx + '">' +
          (empty ? '내용을 입력하세요.' : esc(p)) +
          '</p>';
      }).join('');
    }

    function renderTags(){
      if(!state.tags.length){ els.tagWrap.innerHTML = ''; return; }
      els.tagWrap.innerHTML = state.tags.map(v => '<span class="tag">' + esc(v) + '</span>').join('');
    }
    function renderThumbs(){
      if(!state.thumbs.length){ els.thumbStrip.style.display='none'; els.thumbLines.innerHTML=''; return; }
      els.thumbStrip.style.display='block';
      els.thumbLines.innerHTML = state.thumbs.map(v => '<div class="thumb-line">' + esc(v) + '</div>').join('');
    }
    function mergeAssets(row){
      const snaps = parseJson(row.assetSnapshotJson || '[]', []);
      const infos = parseJson(row.infoImageFilesJson || '[]', []);
      const byId = {};
      infos.forEach(a => { byId[text(a.assetId)] = a; });
      return snaps.map(function(s){
        const id = text(s.assetId);
        const saved = byId[id] || {};
        return {
          assetId:id,
          type:text(saved.assetType || s.assetType),
          paragraph:text(saved.paragraph || s.paragraph || 'p1'),
          isHero:!!s.isHero,
          url: toDirectImageUrl(saved.url || s.previewUrl || s.originalUrl || ''),
          sourceLabel: text(saved.assetSource || s.assetSource)
        };
      }).filter(v => !!v.url);
    }
    function groupAssets(row){
      const assets = mergeAssets(row);
      const grouped = { hero:null, basic:[], p1:[], p2:[], p3:[], p4:[], p5:[], p6:[], p7:[], p8:[], p9:[] };
      const hero = assets.find(v => v.isHero) || assets[0] || null;
      if(hero) grouped.hero = hero;
      assets.forEach(function(v){
        if(v.type === 'basic_info') grouped.basic.push(v);
        if(/^p[1-9]$/.test(v.paragraph)) grouped[v.paragraph].push(v);
      });
      return grouped;
    }
    function uniqueAssets(list){
      const seen = {};
      return (list || []).filter(function(v){
        const id = text(v && v.assetId);
        if(!id || seen[id]) return false;
        seen[id] = true;
        return true;
      });
    }
    function getSectionImages(section, grouped){
      const out = [];
      (section.slots || []).forEach(function(slot){
        if(slot === 'hero'){
          if(grouped.hero) out.push(grouped.hero);
          return;
        }
        if(grouped[slot] && grouped[slot].length) out.push(grouped[slot][0]);
      });
      return uniqueAssets(out);
    }
    function renderFigure(asset, caption){
      if(!asset || !asset.url) return '';
      return '<div class="figure"><img src="' + esc(asset.url) + '" alt="이미지" /><div class="figcap">' + esc(caption || '본문 이미지') + '</div></div>';
    }
    function renderImages(row){
      const grouped = groupAssets(row);
      const hero = grouped.hero;
      if(hero){
        els.heroBox.classList.remove('empty');
        els.heroBox.style.backgroundImage = 'url("' + hero.url.replace(/"/g, '%22') + '")';
        els.heroBox.textContent = '';
      }else{
        els.heroBox.classList.add('empty');
        els.heroBox.style.backgroundImage='none';
        els.heroBox.textContent='대표 이미지 없음';
      }

      const sections = getSectionMeta(row);
      const renderedSections = sections.map(function(sec){
        const paras = state.sectionParagraphs[sec.key] || [];
        const images = getSectionImages(sec, grouped);
        const imageHtml = images.map(function(asset, idx){
          const cap = asset.isHero ? '대표 이미지' : (asset.paragraph ? asset.paragraph.toUpperCase() + ' 이미지' : '본문 이미지');
          return renderFigure(asset, cap + (idx === 0 ? '' : '')); 
        }).join('');
        return '<section class="block">'
          + '<div class="section-kicker">SECTION</div>'
          + '<h2 class="section-title">' + esc(sec.heading) + '</h2>'
          + '<div class="paragraphs">' + renderParagraphList(paras, sec.key) + '</div>'
          + (imageHtml ? '<div class="section-image-stack">' + imageHtml + '</div>' : '')
          + '</section>';
      }).join('');

      const basicInfoHtml = grouped.basic.length ? (
        '<section class="block basic-info-block">'
        + '<div class="section-kicker">BASIC INFO</div>'
        + '<h2 class="section-title">기본 정보</h2>'
        + '<div class="section-image-stack">'
        + grouped.basic.map(function(asset, idx){ return renderFigure(asset, '기본정보 이미지 ' + (idx + 1)); }).join('')
        + '</div>'
        + '</section>'
      ) : '';

      els.articleSections.innerHTML = renderedSections + basicInfoHtml;
    }
    function renderAll(row){
      state.row = row;
      state.original = JSON.parse(JSON.stringify(row));
      state.overviewParagraphs = makeOverview(row);
      state.bodyParagraphs = makeBodyParagraphs(row);
      state.tags = parseJson(row.hashtagsJson || '[]', []).map(text).filter(Boolean);
      state.thumbs = parseJson(row.thumbnailTextJson || '[]', []).map(text).filter(Boolean);
      state.cta = parseJson(row.ctaJson || '{}', {});
      state.sectionParagraphs = distributeParagraphs(state.bodyParagraphs, getSectionMeta(row));
      if(state.sectionParagraphs.hero_intro && state.overviewParagraphs[0]){
        state.sectionParagraphs.hero_intro = [state.overviewParagraphs[0]].concat(state.sectionParagraphs.hero_intro || []);
      }

      els.statusChip.textContent = [text(row.status), text(row.subStatus)].filter(Boolean).join(' / ') || '초안 편집';
      els.metaListing.textContent = '매물번호 ' + (text(row.listingNumber) || '-');
      els.metaStatus.textContent = '상태 ' + ([text(row.status), text(row.subStatus)].filter(Boolean).join(' / ') || '-');
      els.metaStyle.textContent = '스타일 ' + (text(row.styleType) || '-');
      els.footerNote.textContent = 'blogId: ' + (text(row.blogId) || state.blogId);

      els.titleDisplay.textContent = text(row.draftTitle || parseJson(row.listingSnapshotJson || '{}', {}).title || '제목을 입력하세요.');
      els.titleDisplay.classList.toggle('is-empty', !text(els.titleDisplay.textContent));
      const lead = state.overviewParagraphs[0] || '';
      els.leadDisplay.textContent = lead || '도입 문구를 입력하세요.';
      els.leadDisplay.classList.toggle('is-empty', !text(lead));
      els.ctaLabelDisplay.textContent = text(state.cta.label) || '문의하기';
      els.ctaTextDisplay.textContent = text(row.ctaText || state.cta.text) || '문의 문구를 입력하세요.';
      els.ctaTextDisplay.classList.toggle('is-empty', !text(row.ctaText || state.cta.text));

      renderImages(row);
      renderThumbs();
      renderTags();
    }
    function buildMinimalRow(){
      return {
        blogId: state.blogId,
        listingNumber: '',
        status: 'editing',
        subStatus: 'draft_generated',
        draftTitle: '',
        bodyText: '',
        bodyHtml: '',
        hashtagsJson: '[]',
        thumbnailTextJson: '[]',
        ctaJson: '{}',
        ctaText: '',
        listingSnapshotJson: '{}',
        assetSnapshotJson: '[]',
        infoImageFilesJson: '[]',
        styleType: text(getParam('style')),
        addressMasked: '',
        address: ''
      };
    }
    function loadDraft(){
      state.blogId = text(getParam('blogId'));
      if(!state.blogId){
        renderAll(buildMinimalRow());
        showToast('blogId 없이 열렸습니다');
        return;
      }
      setLoading(true, '초안 불러오는 중');
      fetchPostJson({ action:'getBlogDraftDetail', blogId: state.blogId })
        .then(function(data){
          const row = data && (data.row || data.blog || data.item);
          if(!row) throw new Error('초안 데이터 없음');
          renderAll(row);
          showToast('블로그 초안을 불러왔습니다');
        })
        .catch(function(err){
          console.error(err);
          renderAll(buildMinimalRow());
          showToast('서버 초안 로드 실패');
        })
        .finally(function(){ setLoading(false); });
    }
    function buildPatch(){
      const ordered = getSectionMeta(state.row || {}).reduce(function(acc, sec){ return acc.concat(state.sectionParagraphs[sec.key] || []); }, []);
      const bodyText = ordered.join('\n\n');
      return {
        draftTitle: text(els.titleDisplay.textContent),
        seoTitle: text(els.titleDisplay.textContent),
        bodyText: bodyText,
        bodyHtml: bodyTextToHtml(bodyText),
        paragraphTextJson: ordered,
        sectionStructureJson: parseJson((state.row && state.row.sectionStructureJson) || '[]', []),
        hashtagsJson: state.tags,
        thumbnailTextJson: state.thumbs,
        ctaText: text(els.ctaTextDisplay.textContent),
        ctaJson: {
          label: text(els.ctaLabelDisplay.textContent),
          text: text(els.ctaTextDisplay.textContent)
        }
      };
    }
    function saveDraft(){
      if(!state.blogId){ showToast('blogId가 없습니다'); return; }
      const patch = buildPatch();
      setLoading(true, '임시저장 중');
      fetchPostJson({ action:'saveBlogEditorDraft', blogId: state.blogId, patch: patch })
        .then(function(data){
          if(!data || data.ok === false) throw new Error((data && (data.message || data.error)) || '임시저장 실패');
          els.statusChip.textContent = '저장완료';
          showToast('임시저장 완료');
        })
        .catch(function(err){ console.error(err); showToast('임시저장 실패'); })
        .finally(function(){ setLoading(false); });
    }
    function markReady(){
      if(!state.blogId){ showToast('blogId가 없습니다'); return; }
      setLoading(true, '발행준비 저장 중');
      fetchPostJson({ action:'markBlogReadyToPublish', blogId: state.blogId })
        .then(function(data){
          if(!data || data.ok === false) throw new Error((data && (data.message || data.error)) || '발행준비 실패');
          els.statusChip.textContent = '발행준비';
          showToast('발행준비 완료');
        })
        .catch(function(err){ console.error(err); showToast('발행준비 실패'); })
        .finally(function(){ setLoading(false); });
    }
    function openEdit(key){}
    function placeCaretAtEnd(el){
      try{
        const range = document.createRange();
        range.selectNodeContents(el);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }catch(_){}
    }
    function normalizeEditableText(el){
      return text((el && el.innerText) || '').replace(/\u00A0/g,' ');
    }

    function bindInlineEditors(){
      function startInline(el){
        if(!el) return;
        el.classList.add('is-editing');
        el.setAttribute('contenteditable','plaintext-only');
        placeCaretAtEnd(el);
      }
      function endInline(el){
        if(!el) return;
        el.classList.remove('is-editing');
      }

      els.titleDisplay.addEventListener('click', function(){ startInline(els.titleDisplay); });
      els.titleDisplay.addEventListener('blur', function(){
        const v = normalizeEditableText(els.titleDisplay) || '제목을 입력하세요.';
        els.titleDisplay.textContent = v;
        endInline(els.titleDisplay);
      });

      els.leadDisplay.addEventListener('click', function(){ startInline(els.leadDisplay); });
      els.leadDisplay.addEventListener('blur', function(){
        const v = normalizeEditableText(els.leadDisplay);
        state.overviewParagraphs[0] = v;
        if(state.sectionParagraphs.hero_intro){
          if(state.sectionParagraphs.hero_intro.length){ state.sectionParagraphs.hero_intro[0] = v; }
          else if(v){ state.sectionParagraphs.hero_intro = [v]; }
        }
        els.leadDisplay.textContent = v || '도입 문구를 입력하세요.';
        els.leadDisplay.classList.toggle('is-empty', !v);
        renderImages(state.row || {});
        endInline(els.leadDisplay);
      });

      els.ctaLabelDisplay.addEventListener('click', function(){ startInline(els.ctaLabelDisplay); });
      els.ctaLabelDisplay.addEventListener('blur', function(){
        const v = normalizeEditableText(els.ctaLabelDisplay) || '문의하기';
        els.ctaLabelDisplay.textContent = v;
        endInline(els.ctaLabelDisplay);
      });

      els.ctaTextDisplay.addEventListener('click', function(){ startInline(els.ctaTextDisplay); });
      els.ctaTextDisplay.addEventListener('blur', function(){
        const v = normalizeEditableText(els.ctaTextDisplay);
        els.ctaTextDisplay.textContent = v || '문의 문구를 입력하세요.';
        els.ctaTextDisplay.classList.toggle('is-empty', !v);
        endInline(els.ctaTextDisplay);
      });

      document.addEventListener('click', function(e){
        const p = e.target.closest('.paragraph.editable');
        if(!p) return;
        startInline(p);
      });

      document.addEventListener('blur', function(e){
        const p = e.target.closest && e.target.closest('.paragraph.editable');
        if(!p) return;
        const key = p.getAttribute('data-edit-key');
        const idx = Number(p.getAttribute('data-edit-idx'));
        const value = normalizeEditableText(p);
        if(!state.sectionParagraphs[key]) state.sectionParagraphs[key] = [];
        state.sectionParagraphs[key][idx] = value;
        p.textContent = value || '내용을 입력하세요.';
        p.classList.toggle('is-empty', !value);
        if(key === 'hero_intro' && idx === 0){
          els.leadDisplay.textContent = value || '도입 문구를 입력하세요.';
          els.leadDisplay.classList.toggle('is-empty', !value);
          state.overviewParagraphs[0] = value;
        }
        endInline(p);
      }, true);

      els.tagEditBtn.addEventListener('click', function(){
        const joined = prompt('해시태그를 쉼표로 구분해서 입력하세요.', state.tags.join(', '));
        if(joined == null) return;
        state.tags = joined.split(',').map(text).filter(Boolean).map(v => v.startsWith('#') ? v : ('#' + v));
        renderTags();
      });
    }


    els.backBtn.addEventListener('click', function(){ if(document.referrer) history.back(); else location.href = CONFIG.listUrl; });
    els.saveBtn.addEventListener('click', saveDraft);
    els.publishBtn.addEventListener('click', markReady);

    bindInlineEditors();
    loadDraft();
  </script>
</body>
</html>
