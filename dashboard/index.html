<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maslow Korea</title>
  <style>
    :root{
      --bg:#ffffff;
      --line:#e6ebf1;
      --text:#111318;
      --muted:#67707b;
      --blue:#0f7cff;
      --shadow:0 14px 30px rgba(15,23,42,.05);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:#fff;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif !important;
      letter-spacing:-0.02em;
    }
    a{text-decoration:none;color:inherit}
    button,input{font:inherit}
    button{border:none;background:none;cursor:pointer}
    img{display:block;max-width:100%}

    .page{min-height:100vh;background:linear-gradient(180deg,#ffffff 0%,#f9fbff 100%)}
    .shell{width:100%;max-width:980px;margin:0 auto;padding:0 20px 48px}

    .topbar{
      position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;
      min-height:76px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(230,235,241,.9)
    }
    .topbar-left{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      width:auto;
      min-width:120px;
      flex:0 0 auto;
    }
    .topbar-right{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      flex:1 1 auto;
      min-width:0;
    }
    .topbar-greeting{
      display:inline-flex;
      align-items:center;
      min-height:44px;
      padding:0 4px;
      font-size:15px;
      font-weight:800;
      color:#5f6873;
      letter-spacing:-0.03em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }
    .brand-link{display:inline-flex;align-items:center;min-height:44px;padding:0 4px;font-size:18px;font-weight:900;color:#111}

    .hero-spacer{height:18px}
    .panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:12px 0 18px}
    .panel-card{
      position:relative;display:flex;flex-direction:column;justify-content:space-between;
      min-height:132px;padding:22px 22px 20px;border:1px solid var(--line);border-radius:28px;
      background:#fff;box-shadow:var(--shadow);text-align:left;transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease
    }
    .panel-card:hover{transform:translateY(-2px);box-shadow:0 18px 34px rgba(15,23,42,.08)}
    .panel-card.primary{background:linear-gradient(180deg,#f7fbff 0%,#eef6ff 100%);border-color:#cfe2ff}
    .panel-eyebrow{font-size:12px;font-weight:900;color:#7d8792;letter-spacing:.08em;text-transform:uppercase}
    .panel-title{margin-top:10px;font-size:30px;line-height:1.08;font-weight:900;color:#111318;letter-spacing:-0.05em}
    .panel-desc{margin-top:10px;font-size:14px;line-height:1.65;color:#66707a;font-weight:700}

    .panel-icon-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:2px;
    }
    .panel-icon{
      width:28px;
      height:28px;
      color:#6e7883;
      flex:0 0 28px;
    }

    .search-wrap{margin:0 0 14px}
    .search-box{
      display:flex;
      align-items:center;
      gap:12px;
      width:min(230px,100%);
      min-height:60px;
      padding:0 18px;
      border:1.5px solid #d9e4ef;
      border-radius:999px;
      background:#fff;
      box-shadow:0 8px 20px rgba(15,23,42,.03);
      transition:width .24s ease, box-shadow .24s ease, border-color .24s ease;
    }
    .search-box:focus-within{
      width:min(100%, 720px);
      border-color:#bfdcff;
      box-shadow:0 12px 24px rgba(15,124,255,.08)
    }
    .search-icon{flex:0 0 auto;font-size:18px;color:#7b8794;width:auto}
    .search-input{
      flex:1 1 auto;
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      color:#111318;
      font-size:17px;
      font-weight:800;
      letter-spacing:-0.03em
    }
    .search-input::placeholder{color:rgba(123,135,148,.55);font-weight:600}

    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:0 0 18px}
    .chip-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .filter-chip{
      min-height:36px;padding:0 14px;border-radius:999px;border:1px solid #dbe5ee;background:#fff;
      color:#5d6670;font-size:14px;font-weight:900;letter-spacing:-0.02em;transition:.18s ease
    }
    .filter-chip.active{background:#0f7cff;border-color:#0f7cff;color:#fff;box-shadow:0 10px 20px rgba(15,124,255,.16)}
    .toolbar-meta{font-size:13px;color:#7b8794;font-weight:800;letter-spacing:-0.02em}

    .group{margin:0 0 26px}
    .group-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 12px;padding:0 2px}
    .group-title{font-size:22px;line-height:1.2;font-weight:900;color:#202227;letter-spacing:-0.04em}
    .group-count{font-size:13px;color:#7b8794;font-weight:900}

    .card-list{display:grid;grid-template-columns:1fr;gap:12px}
    .property-card{border:1px solid var(--line);border-radius:24px;background:#fff;box-shadow:var(--shadow);overflow:hidden}
    .property-main{
      display:grid;grid-template-columns:112px 1fr;gap:14px;padding:14px;align-items:start;cursor:pointer
    }
    .thumb{width:112px;height:112px;border-radius:18px;background:#edf2f7 center/cover no-repeat;overflow:hidden;flex:0 0 112px}
    .card-content{min-width:0;display:grid;gap:8px}
    .title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .card-title{
      margin:0;font-size:24px;line-height:1.16;font-weight:900;color:#17191d;letter-spacing:-0.05em;word-break:keep-all
    }
    .status-chip{
      flex:0 0 auto;min-height:24px;padding:0 8px;border-radius:999px;font-size:11px;font-weight:900;
      display:inline-flex;align-items:center;justify-content:center;white-space:nowrap
    }
    .status-chip.visible{background:#eef5ff;color:#0f7cff;border:1px solid #cfe2ff}
    .status-chip.hidden{background:#f3f5f8;color:#7f8792;border:1px solid #dde3ea}
    .card-address{font-size:15px;line-height:1.55;color:#505862;font-weight:700;word-break:keep-all}
    .card-deal-price{
      font-size:15px;
      line-height:1.5;
      font-weight:900;
      color:#ff3c3c;
      letter-spacing:-0.03em;
      word-break:keep-all;
    }
    .card-meta{font-size:13px;line-height:1.5;color:#7b8794;font-weight:800;letter-spacing:-0.02em}
    .card-meta strong{color:#4f5863;font-weight:900}

    .card-bottom{border-top:1px solid #eef2f6;padding:10px 14px 12px;display:grid;gap:10px}
    .action-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .action-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .mini-btn{
      min-height:34px;padding:0 12px;border-radius:999px;border:1px solid #dce6f1;background:#fff;
      color:#111318;font-size:13px;font-weight:900;letter-spacing:-0.02em
    }
    .mini-btn.blue{border-color:#cfe2ff;background:#eef5ff;color:#0f7cff}
    .mini-btn.gray{border-color:#dde3ea;background:#f4f6f8;color:#6e7782}

    .channel-row{
      display:grid;
      grid-template-columns:repeat(9, 56px);
      justify-content:flex-start;
      gap:8px;
    }
    .channel-icon{
      position:relative;
      aspect-ratio:1 / 1;
      width:56px;
      min-width:56px;
      max-width:56px;
      min-height:56px;
      max-height:56px;
      height:56px;
      margin:0;
      border-radius:14px;
      border:1px solid #e4eaf1;
      background:#fafcff;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      overflow:hidden;
      flex:0 0 56px;
    }
    .channel-favicon{
      position:absolute;
      left:50%;
      top:50%;
      width:90%;
      height:90%;
      transform:translate(-50%, -50%);
      object-fit:cover;
      border-radius:4px;
      flex:none
    }
    .site-chip{
      position:relative;
      aspect-ratio:1 / 1;
      width:56px;
      min-width:56px;
      max-width:56px;
      min-height:56px;
      max-height:56px;
      height:56px;
      border-radius:14px;
      border:1px solid #e4eaf1;
      background:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0;
      overflow:hidden;
      flex:0 0 56px
    }
    .site-favicon{
      position:absolute;
      left:50%;
      top:50%;
      width:90%;
      height:90%;
      transform:translate(-50%, -50%);
      object-fit:cover;
      border-radius:4px;
      flex:none
    }
    .empty{border:1px dashed #d9e3ed;border-radius:24px;background:#fff;padding:30px 18px;text-align:center;color:#7b8794;font-size:15px;font-weight:800}

    .loading-overlay{
      position:fixed;
      inset:0;
      z-index:12050;
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(3px);
      -webkit-backdrop-filter:blur(3px);
    }
    .loading-overlay.show{display:flex}
    .loading-panel{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-align:center;
    }
    .loading-buddy{
      width:74px;
      height:74px;
      object-fit:cover;
      border-radius:18px;
      animation:buddyBounce 1.15s ease-in-out infinite;
      box-shadow:0 10px 22px rgba(15,124,255,.16);
    }
    .loading-text{
      min-height:24px;
      font-size:18px;
      font-weight:800;
      line-height:1.4;
      color:#2b8fe8;
      letter-spacing:-0.03em;
    }
    @keyframes buddyBounce{
      0%,100%{transform:translateY(0) scale(1)}
      20%{transform:translateY(-3px) scale(1.01)}
      50%{transform:translateY(-10px) scale(1.04)}
      75%{transform:translateY(-4px) scale(1.01)}
    }

    .calendar-inline-loading{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.42);
      pointer-events:none;
      z-index:4;
    }
    .calendar-inline-loading.show{display:flex}
    .calendar-inline-spinner{
      width:24px;
      height:24px;
      border-radius:999px;
      border:2.5px solid rgba(15,124,255,.18);
      border-top-color:#0f7cff;
      animation:calendarSpin .7s linear infinite;
    }
    @keyframes calendarSpin{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }

    .lock-overlay{
      position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;
      background:rgba(255,255,255,.78);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)
    }
    .lock-card{
      width:min(420px,100%);border:1px solid #e6ebf1;border-radius:30px;background:#fff;
      box-shadow:0 24px 48px rgba(15,23,42,.12);padding:24px 22px 22px
    }
    .lock-title{font-size:26px;line-height:1.1;font-weight:900;color:#17191d;letter-spacing:-0.05em;margin:0 0 12px}
    .lock-desc{font-size:14px;line-height:1.65;color:#66707a;font-weight:700;margin:0 0 16px}
    .lock-input{
      width:100%;min-height:56px;border:1.5px solid #dbe5ee;border-radius:18px;padding:0 16px;outline:none;
      font-size:20px;font-weight:900;letter-spacing:.08em;text-align:center;background:#fff;margin:0 0 12px
    }
    .lock-btn{width:100%;min-height:52px;border-radius:18px;background:#0f7cff;color:#fff;font-size:16px;font-weight:900;letter-spacing:-0.02em}
    .lock-error{margin-top:10px;font-size:13px;color:#d64545;font-weight:800;min-height:18px;text-align:center}

    .more-wrap{
      display:flex;
      justify-content:center;
      margin:8px 0 28px;
    }
    .more-btn{
      min-height:42px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:14px;
      font-weight:900;
      letter-spacing:-0.02em;
    }

    .channel-icon.is-not-yet .channel-favicon,
    .site-chip.is-not-yet .site-favicon{
      opacity:.26;
      filter:none;
    }

    .channel-modal{
      position:fixed;
      inset:0;
      z-index:12120;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(17,24,39,.38);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
    }
    .channel-modal.show{display:flex}
    .channel-modal-card{
      width:min(520px, calc(100vw - 32px));
      max-height:min(80vh, 680px);
      overflow:auto;
      background:#fff;
      border:1px solid #e6ebf1;
      border-radius:26px;
      box-shadow:0 24px 48px rgba(15,23,42,.14);
      padding:22px 24px 20px;
    }
    .channel-modal-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:0 0 14px;
    }
    .channel-modal-title{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:24px;
      line-height:1.15;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.04em;
    }
    .channel-modal-favicon{
      width:28px;
      height:28px;
      border-radius:8px;
      object-fit:cover;
      flex:0 0 28px;
      border:1px solid #e5ebf2;
      background:#fff;
    }
    .channel-modal-close{
      width:36px;
      height:36px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:18px;
      font-weight:900;
      flex:0 0 36px;
    }
    .channel-status-row{
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
      margin:0 0 16px;
      padding:4px 2px;
    }
    .channel-radio{
      display:inline-flex;
      align-items:center;
      gap:8px;
      width:auto;
      font-size:15px;
      font-weight:900;
      color:#23262b;
    }
    .channel-radio input{
      width:18px;
      height:18px;
      margin:0;
      accent-color:#0f7cff;
    }
    .channel-links{
      display:grid;
      gap:10px;
      margin:0 0 18px;
    }
    .channel-link-row{
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto;
      gap:8px;
      align-items:center;
    }
    .channel-link-input{
      width:100%;
      min-height:46px;
      border:1.5px solid #dbe5ee;
      border-radius:14px;
      padding:0 14px;
      outline:none;
      background:#fff;
      color:#111318;
      font-size:14px;
      font-weight:700;
      letter-spacing:-0.02em;
    }
    .channel-go-btn{
      min-height:46px;
      padding:0 14px;
      border-radius:14px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:13px;
      font-weight:900;
      letter-spacing:-0.02em;
      white-space:nowrap;
    }
    .channel-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
    }
    .channel-action-btn{
      min-height:42px;
      padding:0 16px;
      border-radius:999px;
      font-size:14px;
      font-weight:900;
      letter-spacing:-0.02em;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
    }
    .channel-action-btn.primary{
      border-color:#0f7cff;
      background:#0f7cff;
      color:#fff;
    }

    @media (max-width:860px){
      .shell{padding:0 16px 40px}
      .panel-grid{grid-template-columns:1fr 1fr;gap:10px}
      .panel-card{min-height:114px;padding:18px 16px 16px;border-radius:22px}
      .panel-title{font-size:24px}
      .topbar-greeting{font-size:13px}
      .search-box{width:min(220px,100%);min-height:54px;padding:0 16px}
      .search-box:focus-within{width:min(100%, 420px)}
      .property-main{grid-template-columns:90px 1fr;gap:12px;padding:12px}
      .thumb{width:90px;height:90px;border-radius:16px}
      .card-title{font-size:20px}
      .card-address{font-size:14px}
      .card-deal-price{font-size:14px}
      .channel-row{
        grid-template-columns:repeat(9, minmax(0, 1fr));
        gap:4px;
      }
      .channel-icon{
        position:relative;
        aspect-ratio:1 / 1;
        width:100%;
        min-width:0;
        max-width:none;
        height:auto;
        min-height:auto;
        max-height:none;
        margin:0;
        border-radius:10px;
        padding:0;
        flex:none;
      }
      .channel-favicon{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        object-fit:cover;
        transform:none;
        flex-basis:auto;
      }
      .site-chip{
        position:relative;
        aspect-ratio:1 / 1;
        width:100%;
        min-width:0;
        max-width:none;
        height:auto;
        min-height:auto;
        max-height:none;
        margin:0;
        border-radius:10px;
        padding:0;
        flex:none;
      }
      .site-favicon{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        object-fit:cover;
        transform:none;
        flex-basis:auto;
      }
      .loading-buddy{
        width:64px;
        height:64px;
        border-radius:16px;
      }
      .loading-text{
        font-size:16px;
      }
      .more-btn{
        min-height:38px;
        padding:0 16px;
        font-size:13px;
      }
      .channel-modal{
        padding:16px;
      }
      .channel-modal-card{
        width:min(520px, calc(100vw - 20px));
        max-height:min(78vh, 640px);
        border-radius:22px;
        padding:20px 18px 18px;
      }
      .channel-modal-title{
        font-size:20px;
      }
      .channel-status-row{
        gap:14px;
      }
      .channel-radio{
        font-size:14px;
      }
      .channel-link-input{
        min-height:42px;
        font-size:13px;
      }
      .channel-go-btn{
        min-height:42px;
        padding:0 12px;
        font-size:12px;
      }
      .channel-action-btn{
        min-height:40px;
        padding:0 14px;
        font-size:13px;
      }
    }
  
  .calendar-modal{
    position:fixed;
    inset:0;
    z-index:12100;
    display:none;
    background:#f7f8fb;
  }
  .calendar-modal.show{display:block}
  .calendar-modal-sheet{
    width:100vw;
    height:100dvh;
    min-height:100dvh;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    background:#f7f8fb;
  }
  .calendar-modal-topbar{
    position:sticky;
    top:0;
    z-index:3;
    min-height:72px;
    background:rgba(247,248,251,.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid #e7ebf1;
  }
  .calendar-modal-topbar-inner{
    max-width:980px;
    margin:0 auto;
    padding:0 20px;
    min-height:72px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .calendar-modal-back{
    min-height:42px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #d8e0ea;
    background:#fff;
    color:#111318;
    font-size:14px;
    font-weight:800;
    letter-spacing:-0.02em;
  }
  .calendar-modal-title{
    flex:1 1 auto;
    text-align:center;
    font-size:18px;
    font-weight:900;
    color:#17191d;
    letter-spacing:-0.04em;
  }
  .calendar-modal-spacer{width:72px;flex:0 0 72px}
  .calendar-modal-inner{
    width:100%;
    max-width:980px;
    margin:0 auto;
    padding:16px 20px 32px;
  }

  .calendar-notice-wrap{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    padding:4px 0 14px 14px;
  }
  .calendar-notice-main{min-width:0}
  .calendar-notice-label{
    font-size:11px;
    font-weight:800;
    letter-spacing:.08em;
    color:#8b95a1;
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .calendar-notice-text{
    font-size:18px;
    line-height:1.35;
    font-weight:800;
    color:#17191d;
    word-break:keep-all;
  }
  .calendar-notice-link{
    display:none;
    margin-top:6px;
    font-size:13px;
    line-height:1.45;
    color:#0f7cff;
    font-weight:700;
    word-break:break-all;
  }
  .calendar-notice-pencil{
    width:34px;
    height:34px;
    border-radius:999px;
    border:1px solid #d8e0ea;
    background:#fff;
    color:#5f6873;

      const saved = localStorage.getItem(CONFIG.authStorageKey) || '';
      const entry = Object.entries(PASSWORD_MAP).find(function(pair){
        return pair[1] === saved;
      });

    function getWriterMetaByCode(code){

        '6857': { name:'한이사', emoji:'👩‍🚒' },

      };
      return map[key] || { name:'작성자', emoji:'📝' };

    function getTodayDateKey(){
      const now = new Date();
      return [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2,'0'),
        String(now.getDate()).padStart(2,'0')
      ].join('-');
    }

    function getCurrentMonthKeyFromDate(dateKey){
      return text(dateKey).slice(0, 7);
    }

    function formatMonthLabel(monthKey){
      const parts = String(monthKey || '').split('-');
      if(parts.length !== 2) return '';
      return Number(parts[0]) + '.' + parts[1];
    }

    function formatDetailDate(dateKey){
      if(!dateKey) return '날짜 선택';
      const d = new Date(dateKey + 'T00:00:00');
      if(Number.isNaN(d.getTime())) return dateKey;
      const days = ['일','월','화','수','목','금','토'];
      return d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate() + ' (' + days[d.getDay()] + ')';
    }

    function escapeAttr(value){
      return String(value == null ? '' : value)
        .replace(/&/g,'&amp;')
        .replace(/"/g,'&quot;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
    }

    function deleteCalendarThread(rowId){
      const writerCode = getUnlockedWriterCode();
      const items = Array.isArray(calendarThreadMap[calendarSelectedDateKey]) ? calendarThreadMap[calendarSelectedDateKey] : [];
      const target = items.find(function(item){ return text(item.rowId) === text(rowId); });
      if(!target) return;
      if(text(target.writerCode) !== text(writerCode)) return;
      calendarThreadMap[calendarSelectedDateKey] = items.filter(function(item){
        return text(item.rowId) !== text(rowId);
      });
      calendarOverviewMap = buildLocalOverviewMapForMonth(calendarCurrentMonth);
      if(text(calendarEditingThreadId) === text(rowId)) resetCalendarThreadEditor();
      renderCalendarGrid();
      loadCalendarDateDetail(calendarSelectedDateKey);
    }

    function loadCalendarOverview(monthKey){
      startCalendarInlineLoading();

      return fetch(CONFIG.adminListUrl, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type':'text/plain;charset=UTF-8' },
        body: JSON.stringify({
          action: 'getCalendarOverview',
          month: monthKey
        })
      })
      .then(function(res){
        if(!res.ok) throw new Error('캘린더 불러오기 실패: ' + res.status);
        return res.json();
      })
      .then(function(data){
        if(!data || data.ok !== true){
          throw new Error((data && data.message) || '캘린더 불러오기 실패');
        }

        calendarCurrentMonth = monthKey;
        calendarCurrentNotice = data.notice || null;
        calendarOverviewMap = {};
        calendarThreadMap = {};

        const rawThreadMap = (data && data.threadsByDate && typeof data.threadsByDate === 'object')
          ? data.threadsByDate
          : {};

        Object.keys(rawThreadMap).forEach(function(dateKey){
          calendarThreadMap[dateKey] = Array.isArray(rawThreadMap[dateKey])
            ? rawThreadMap[dateKey].slice().sort(function(a, b){
                return (parseDateValue(b && b.createdAt) || 0) - (parseDateValue(a && a.createdAt) || 0);
              })
            : [];
        });

        (Array.isArray(data.days) ? data.days : []).forEach(function(day){
          const dateKey = text(day.dateKey);
          const localThreads = Array.isArray(calendarThreadMap[dateKey]) ? calendarThreadMap[dateKey] : [];
          calendarOverviewMap[dateKey] = {
            shoppingCount: Number(day.shoppingCount || 0),
            factoryCount: Number(day.factoryCount || 0),
            threadCount: localThreads.length || Number(day.threadCount || 0)
          };
          if(!calendarThreadMap[dateKey]){
            calendarThreadMap[dateKey] = [];
          }
        });

        renderCalendarNotice();
        calendarMonthLabel.textContent = formatMonthLabel(monthKey);
      })
      .catch(function(err){
        console.error(err);
        alert((err && err.message) ? err.message : '캘린더 데이터를 불러오지 못했습니다.');
      })
      .finally(function(){
        stopCalendarInlineLoading();
      });
    }

    function getLocalThreadItemsByDate(dateKey){
      const items = Array.isArray(calendarThreadMap[dateKey]) ? calendarThreadMap[dateKey].slice() : [];
      return items.sort(function(a,b){
        return (parseDateValue(b.createdAt) || 0) - (parseDateValue(a.createdAt) || 0);
      });
    }

    function buildLocalOverviewMapForMonth(monthKey){
      const map = {};
      const parts = monthKey.split('-');
      const year = Number(parts[0]);
      const monthIndex = Number(parts[1]) - 1;
      const lastDate = new Date(year, monthIndex + 1, 0);
      const totalDays = lastDate.getDate();

      for(let day = 1; day <= totalDays; day += 1){
        const dateKey = [year, String(monthIndex + 1).padStart(2,'0'), String(day).padStart(2,'0')].join('-');
        map[dateKey] = { shoppingCount:0, factoryCount:0, threadCount:0 };
      }

      rawItems.forEach(function(item){
        const created = parseDateValue(item && item.createdAt);
        if(!created) return;
        const d = new Date(created);
        const dateKey = [d.getFullYear(), String(d.getMonth() + 1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
        if(getCurrentMonthKeyFromDate(dateKey) !== monthKey || !map[dateKey]) return;
        const teamType = detectTeamByListingNumber(item.listingNumber);
        if(teamType === 'shopping') map[dateKey].shoppingCount += 1;
        else if(teamType === 'factory') map[dateKey].factoryCount += 1;
      });

      Object.keys(calendarThreadMap).forEach(function(dateKey){
        if(getCurrentMonthKeyFromDate(dateKey) !== monthKey || !map[dateKey]) return;
        map[dateKey].threadCount = getLocalThreadItemsByDate(dateKey).length;
      });

      return map;
    }

    function renderCalendarGrid(){
      const parts = calendarCurrentMonth.split('-');
      const year = Number(parts[0]);
      const monthIndex = Number(parts[1]) - 1;
      const firstDate = new Date(year, monthIndex, 1);
      const lastDate = new Date(year, monthIndex + 1, 0);
      const firstWeekday = firstDate.getDay();
      const totalDays = lastDate.getDate();
      const todayKey = getTodayDateKey();
      let html = '';

      for(let i = 0; i < firstWeekday; i += 1){
        html += '<div class="calendar-cell is-empty" aria-hidden="true"></div>';
      }

      for(let day = 1; day <= totalDays; day += 1){
        const dateKey = [
          year,
          String(monthIndex + 1).padStart(2,'0'),
          String(day).padStart(2,'0')
        ].join('-');

        const stat = calendarOverviewMap[dateKey] || { shoppingCount:0, factoryCount:0, threadCount:0 };
        const classes = [
          'calendar-cell',
          dateKey === todayKey ? 'is-today' : '',
          dateKey === calendarSelectedDateKey ? 'is-selected' : ''
        ].filter(Boolean).join(' ');

        html += ''
          + '<button type="button" class="' + classes + '" onclick="selectCalendarDate(\'' + dateKey + '\')">'
          +   '<div class="calendar-day-number">' + day + '</div>'
          +   '<div class="calendar-lines">'
          +     '<div class="calendar-line' + (stat.shoppingCount ? '' : ' zero') + '">상가 ' + stat.shoppingCount + '</div>'
          +     '<div class="calendar-line' + (stat.factoryCount ? '' : ' zero') + '">공장 ' + stat.factoryCount + '</div>'
          +     '<div class="calendar-line' + (stat.threadCount ? '' : ' zero') + '">기록 ' + stat.threadCount + '</div>'
          +   '</div>'
          + '</button>';
      }

      calendarGrid.innerHTML = html;
    }

    function moveCalendarMonth(diff){
      const parts = calendarCurrentMonth.split('-');
      const base = new Date(Number(parts[0]), Number(parts[1]) - 1 + diff, 1);
      const nextMonthKey = [
        base.getFullYear(),
        String(base.getMonth() + 1).padStart(2,'0')
      ].join('-');

      calendarCurrentMonth = nextMonthKey;
      calendarOverviewMap = buildLocalOverviewMapForMonth(nextMonthKey);
      calendarMonthLabel.textContent = formatMonthLabel(nextMonthKey);
      calendarSelectedDateKey = nextMonthKey + '-01';
      renderCalendarGrid();
      loadCalendarDateDetail(calendarSelectedDateKey);
    }

    function selectCalendarDate(dateKey){
      calendarSelectedDateKey = dateKey;
      renderCalendarGrid();
      loadCalendarDateDetail(dateKey);
    }

    function getLocalCalendarPropertiesByDate(dateKey){
      return rawItems
        .filter(function(item){
          const created = parseDateValue(item && item.createdAt);
          if(!created) return false;
          const d = new Date(created);
          const itemDateKey = [
            d.getFullYear(),
            String(d.getMonth() + 1).padStart(2,'0'),
            String(d.getDate()).padStart(2,'0')
          ].join('-');
          return itemDateKey === dateKey;
        })
        .sort(function(a,b){
          return (parseDateValue(b.updatedAt || b.createdAt) || 0) - (parseDateValue(a.updatedAt || a.createdAt) || 0);
        })
        .map(function(item){
          return {
            listingNumber: text(item.listingNumber),
            title: text(item.title),
            address: text(item.address),
            dealType: text(item.dealType),
            price: text(item.price),
            teamType: detectTeamByListingNumber(item.listingNumber),
            heroUrl: text(item.heroUrl),
            createdAt: text(item.createdAt),
            writerName: text(item.lastEditor)
          };
        });
    }

    function formatThreadTime(value){
      const ts = parseDateValue(value);
      if(!ts) return '-';
      const d = new Date(ts);
      return d.getFullYear() + '.'
        + (d.getMonth()+1) + '.'
        + d.getDate() + ' '
        + String(d.getHours()).padStart(2,'0') + ':'
        + String(d.getMinutes()).padStart(2,'0');
    }

    function loadCalendarDateDetail(dateKey){
      calendarCurrentDetail = {
        dateKey: dateKey,
        properties: getLocalCalendarPropertiesByDate(dateKey),
        threads: getLocalThreadItemsByDate(dateKey)
      };
      renderCalendarDetail();
      return Promise.resolve(calendarCurrentDetail);
    }

    function renderCalendarDetail(){
      const detail = calendarCurrentDetail || {};
      const properties = Array.isArray(detail.properties) ? detail.properties : [];
      const threads = Array.isArray(detail.threads) ? detail.threads : [];

      calendarDetailDate.textContent = formatDetailDate(calendarSelectedDateKey);
      calendarDetailMeta.textContent =
        '상가 ' + properties.filter(function(x){ return x.teamType === 'shopping'; }).length
        + ' · 공장 ' + properties.filter(function(x){ return x.teamType === 'factory'; }).length
        + ' · 기록 ' + threads.length;

      if(!properties.length){
        calendarPropertyList.innerHTML = '<div class="calendar-empty">등록된 매물이 없습니다.</div>';
      }else{
        calendarPropertyList.innerHTML = properties.map(function(item){
          const thumb = item.heroUrl ? "background-image:url('" + escapeAttr(item.heroUrl) + "')" : '';
          const teamLabel = item.teamType === 'shopping' ? '상가' : item.teamType === 'factory' ? '공장' : '-';
          return ''
            + '<div class="calendar-property-item">'
            +   '<div class="calendar-property-thumb" style="' + thumb + '"></div>'
            +   '<div class="calendar-property-body">'
            +     '<div class="calendar-property-title">' + escapeHtml(item.title || '제목 없음') + '</div>'
            +     '<div class="calendar-property-address">' + escapeHtml(item.address || '-') + '</div>'
            +     '<div class="calendar-property-price">' + escapeHtml((item.dealType || '-') + ' / ' + (item.price || '-')) + '</div>'
            +     '<div class="calendar-property-meta">' + escapeHtml(item.listingNumber || '-') + ' · ' + escapeHtml(teamLabel) + '</div>'
            +   '</div>'
            + '</div>';
        }).join('');
      }

      if(!threads.length){
        calendarThreadList.innerHTML = '<div class="calendar-empty">기록이 없습니다.</div>';
      }else{
        const myWriterCode = getUnlockedWriterCode();
        calendarThreadList.innerHTML = threads.map(function(item){
          const isOwn = text(item.writerCode) === text(myWriterCode);
          const itemClass = 'calendar-thread-item' + (isOwn ? ' is-own' : '');
          const openAttr = isOwn ? ' onclick="openCalendarThreadEditor(\'' + encodeURIComponent(item.rowId || '') + '\')"' : '';
          const actionsHtml = isOwn
            ? '<div class="calendar-thread-actions">'
              + '<button type="button" class="calendar-thread-action" onclick="event.stopPropagation(); openCalendarThreadEditor(\'' + encodeURIComponent(item.rowId || '') + '\')">수정</button>'
              + '<button type="button" class="calendar-thread-action delete" onclick="event.stopPropagation(); deleteCalendarThread(\'' + encodeURIComponent(item.rowId || '') + '\')">삭제</button>'
              + '</div>'
            : '';
          return ''
            + '<div class="' + itemClass + '"' + openAttr + '>'
            +   '<div class="calendar-thread-head">'
            +     '<div class="calendar-thread-writer">' + escapeHtml((item.writerEmoji || '📝') + ' ' + (item.writerName || '작성자')) + '</div>'
            +     '<div class="calendar-thread-time">' + escapeHtml(formatThreadTime(item.updatedAt || item.createdAt)) + '</div>'
            +   '</div>'
            +   '<div class="calendar-thread-content">' + escapeHtml(item.content || '') + '</div>'
            + '</div>';
        }).join('');
      }
    }

    function saveCalendarNotice(){
      const writerCode = getUnlockedWriterCode();
      if(!writerCode){
        alert('작성자 코드가 없습니다.');
        return;
      }

      startCalendarInlineLoading();

      fetch(CONFIG.adminListUrl, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type':'text/plain;charset=UTF-8' },
        body: JSON.stringify({
          action: 'updateCalendarNotice',
          noticeText: text(calendarNoticeInput.value) || '매슬로우 화이팅',
          noticeLink: text(calendarNoticeLinkInput.value),
          writerCode: writerCode
        })
      })
      .then(function(res){
        if(!res.ok) throw new Error('공지 저장 실패: ' + res.status);
        return res.json();
      })
      .then(function(data){
        if(!data || data.ok !== true){
          throw new Error((data && data.message) || '공지 저장 실패');
        }
        calendarCurrentNotice = data.notice || {
          noticeText: text(calendarNoticeInput.value) || '매슬로우 화이팅',
          noticeLink: text(calendarNoticeLinkInput.value),
          updatedBy: getWriterMetaByCode(writerCode).name,
          updatedByCode: writerCode,
          updatedAt: new Date().toISOString()
        };
        renderCalendarNotice();
        closeCalendarNoticeEdit();
      })
      .catch(function(err){
        console.error(err);
        alert((err && err.message) ? err.message : '공지 저장 중 문제가 발생했습니다.');
      })
      .finally(function(){
        stopCalendarInlineLoading();
      });
    }

    function submitCalendarThread(){
      const writerCode = getUnlockedWriterCode();
      const content = text(calendarThreadInput.value);

      if(!calendarSelectedDateKey){
        alert('날짜를 먼저 선택하세요.');
        return;
      }
      if(!writerCode){
        alert('작성자 코드가 없습니다.');
        return;
      }
      if(!content){
        alert('내용을 입력하세요.');
        return;
      }

      if(calendarEditingThreadId){
        const item = getCalendarThreadById(calendarSelectedDateKey, calendarEditingThreadId);
        if(!item) return;
        if(text(item.writerCode) !== text(writerCode)) return;
        item.content = content;
        item.updatedAt = new Date().toISOString();
        calendarOverviewMap = buildLocalOverviewMapForMonth(calendarCurrentMonth);
        setCalendarThreadWriteOpen(false);
        renderCalendarGrid();
        loadCalendarDateDetail(calendarSelectedDateKey);
        return;
      }

      startCalendarInlineLoading();

      fetch(CONFIG.adminListUrl, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type':'text/plain;charset=UTF-8' },
        body: JSON.stringify({
          action: 'saveCalendarThread',
          dateKey: calendarSelectedDateKey,
          writerCode: writerCode,
          content: content
        })
      })
      .then(function(res){
        if(!res.ok) throw new Error('기록 저장 실패: ' + res.status);
        return res.json();
      })
      .then(function(data){
        if(!data || data.ok !== true){
          throw new Error((data && data.message) || '기록 저장 실패');
        }
        const meta = getWriterMetaByCode(writerCode);
        const newThread = {
          rowId: text(data && (data.rowId || data.threadId)) || ('LOCAL_' + Date.now()),
          writerCode: writerCode,
          writerName: meta.name,
          writerEmoji: meta.emoji,
          content: content,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
        if(!Array.isArray(calendarThreadMap[calendarSelectedDateKey])){
          calendarThreadMap[calendarSelectedDateKey] = [];
        }
        calendarThreadMap[calendarSelectedDateKey].unshift(newThread);
        calendarOverviewMap = buildLocalOverviewMapForMonth(calendarCurrentMonth);
        calendarThreadInput.value = '';
        setCalendarThreadWriteOpen(false);
        renderCalendarGrid();
        loadCalendarDateDetail(calendarSelectedDateKey);
      })
      .catch(function(err){
        console.error(err);
        alert((err && err.message) ? err.message : '기록 저장 중 문제가 발생했습니다.');
      })
      .finally(function(){
        stopCalendarInlineLoading();
      });
    }

                return (parseDateValue((b && (b.updatedAt || b.createdAt)) || '') || 0) - (parseDateValue((a && (a.updatedAt || a.createdAt)) || '') || 0);

    function parseDateValue(value){
      const s = text(value);
      if(!s) return null;
      const t = new Date(s).getTime();
      return Number.isNaN(t) ? null : t;
    }

    function formatDateGroup(value){
      const ts = parseDateValue(value);
      if(!ts) return '날짜 미확인';
      const d = new Date(ts);
      const days = ['일','월','화','수','목','금','토'];
      return d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate() + ' (' + days[d.getDay()] + ')';
    }

    function formatUpdatedMeta(item){
      if(!text(item.updatedAt)) return '수정 -';
      const ts = parseDateValue(item.updatedAt);
      if(!ts) return '수정 -';
      const d = new Date(ts);
      const stamp = d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate() + ' ' +
        String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      const editor = text(item.lastEditor);
      return '수정 ' + stamp + (editor ? ' (' + escapeHtml(editor) + ')' : '');
    }

    function formatDealPrice(item){
      var dealType = text(item.dealType);
      var price = text(item.price);
      if(dealType && price) return escapeHtml(dealType + ' / ' + price);
      if(dealType) return escapeHtml(dealType);
      if(price) return escapeHtml(price);
      return '-';
    }

    function matchesKeyword(item){
      if(!currentKeyword) return true;
      const haystack = [
        item.title,
        item.address,
        item.listingNumber,
        item.dealType,
        item.price,

        item.summary1,
        item.summary2,
        item.summary3,

        item.propertyType,
        item.zoning,
        item.approvalDate,

        item.landAreaM2,
        item.landAreaPy,
        item.totalFloorAreaM2,
        item.totalFloorAreaPy,
        item.exclusiveAreaM2,
        item.exclusiveAreaPy,

        item.buildingComposition,
        item.parkingCount,
        item.entranceDirection,
        item.moveInDate,
        item.floorInfo,
        item.restroomInfo,
        item.maintenanceFee,

        item.ceilingHeight,
        item.crane,
        item.hoist,
        item.powerCapacity,
        item.mainFacilities,
        item.recommendedUse,
        item.restrictedUse,
        item.roadWidth,
        item.doorWidth,
        item.truckAccess,
        item.loadingAvailable,
        item.officeIncluded,
        item.yardSize,
        item.readyToOperate,

        item.requesterName,
        item.requesterPhone,
        item.requesterType,
        item.requesterNote,
        item.memo
      ]
      .map(function(v){ return String(v == null ? '' : v).toLowerCase(); })
      .join(' ');

      return haystack.indexOf(currentKeyword) > -1;
    }

    function applyFilter(items){
      let result = items.filter(matchesKeyword);

      if(currentTeamFilter){
        result = result.filter(function(item){
          return detectTeamByListingNumber(item.listingNumber) === currentTeamFilter;
        });
      }

      if(currentFilter === 'visible'){
        result = result.filter(function(item){ return item.status === 'visible' || item.status === 'show' || item.status === '공개'; });
      }else if(currentFilter === 'hidden'){
        result = result.filter(function(item){ return !(item.status === 'visible' || item.status === 'show' || item.status === '공개'); });
      }

      if(currentFilter === 'updated'){
        result = result.slice().sort(function(a,b){
          return (parseDateValue(b.updatedAt) || 0) - (parseDateValue(a.updatedAt) || 0);
        });
      }else{
        result = result.slice().sort(function(a,b){
          return (parseDateValue(b.createdAt) || 0) - (parseDateValue(a.createdAt) || 0);
        });
      }

      return result;
    }

    function groupItems(items){
      const groups = new Map();
      items.forEach(function(item){
        const key = currentFilter === 'updated'
          ? formatDateGroup(item.updatedAt || item.createdAt)
          : formatDateGroup(item.createdAt);

        if(!groups.has(key)) groups.set(key, []);
        groups.get(key).push(item);
      });
      return Array.from(groups.entries()).map(function(entry){
        return { title: entry[0], items: entry[1] };
      });
    }

    function escapeHtml(value){
      return String(value == null ? '' : value)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function buildCard(item){

      const channelHtml = CHANNELS.map(function(channel){

        const stateClass = state.done ? '' : ' is-not-yet';
        return '<button class="channel-icon' + stateClass + '" type="button" title="' + escapeHtml(channel.name) + '" onclick="event.stopPropagation(); openChannelModal(\'' + encodeURIComponent(item.listingNumber) + '\', \''
          + channel.key + '\')"><img class="channel-favicon" src="' + escapeHtml(channel.icon) + '" alt="' + escapeHtml(channel.name) + '"></button>';
      }).join('');
      const ownSiteState = getChannelStateByItem(item, 'ownSite');
      const ownSiteClass = ownSiteState.done ? '' : ' is-not-yet';

      return ''
        + '<article class="property-card">'
        +   '<div class="property-main" onclick="openPreview(\'' + encodeURIComponent(item.listingNumber) + '\')">'
        +     '<div class="thumb" style="' + thumb + '"></div>'
        +     '<div class="card-content">'
        +       '<div class="title-row">'
        +         '<h3 class="card-title">' + escapeHtml(item.title || '제목 없음') + '</h3>'
        +         buildStatusChip(item)
        +       '</div>'
        +       '<div class="card-address">' + escapeHtml(item.address || '-') + '</div>'
        +       '<div class="card-deal-price">' + formatDealPrice(item) + '</div>'
        +       '<div class="card-meta"><strong>' + escapeHtml(item.listingNumber || '-') + '</strong><br>' + formatUpdatedMeta(item) + '</div>'
        +     '</div>'
        +   '</div>'
        +   '<div class="card-bottom">'
        +     '<div class="action-row">'
        +       '<div class="action-left">'
        +         '<button class="mini-btn blue" type="button" onclick="event.stopPropagation(); editItem(\'' + encodeURIComponent(item.listingNumber) + '\')">수정</button>'
        +         '<button class="mini-btn" type="button" onclick="event.stopPropagation(); markVisible(\'' + encodeURIComponent(item.listingNumber) + '\')">보이기</button>'
        +         '<button class="mini-btn gray" type="button" onclick="event.stopPropagation(); markHidden(\'' + encodeURIComponent(item.listingNumber) + '\')">숨기기</button>'
        +       '</div>'
        +       ''
        +     '</div>'
        +     '<div class="channel-row">' + channelHtml + '<button class="site-chip' + ownSiteClass + '" type="button" title="자사사이트" onclick="event.stopPropagation(); openChannelModal(\'' + encodeURIComponent(item.listingNumber) + '\', \'ownSite\')"><img class="site-favicon" src="' + escapeHtml(SELF_SITE_ICON) + '" alt="자사사이트"></button></div>'
        +   '</div>'
        + '</article>';
    }

    function renderDashboard(){
      const filtered = applyFilter(rawItems);
      const totalCount = filtered.length;
      const visibleItems = filtered.slice(0, visibleCount);

      toolbarMeta.textContent = '전체 ' + totalCount + '건';

      if(!totalCount){
        const emptyMeta = getTeamMeta(currentTeamFilter);
        dashboardRoot.innerHTML = '<div class="empty">' + escapeHtml(emptyMeta.empty) + '</div>';
        return;
      }

      const groups = groupItems(visibleItems);
      const hasMore = totalCount > visibleCount;

      dashboardRoot.innerHTML =
        groups.map(function(group){
          return ''
            + '<section class="group">'
            +   '<div class="group-head">'
            +     '<div class="group-title">' + escapeHtml(group.title) + '</div>'
            +     '<div class="group-count">' + group.items.length + '건</div>'
            +   '</div>'
            +   '<div class="card-list">' + group.items.map(buildCard).join('') + '</div>'
            + '</section>';
        }).join('')
        + (hasMore
            ? '<div class="more-wrap"><button class="more-btn" type="button" onclick="loadMoreItems()">더보기</button></div>'
            : '');
    }

    window.loadMoreItems = function(){
      visibleCount += PAGE_SIZE;
      renderDashboard();
    };

    function unlockWithPassword(){
      const pw = String(lockInput.value || '').trim();
      const matched = PASSWORD_MAP[pw];
      if(!matched){
        lockError.textContent = '비밀번호가 올바르지 않습니다.';
        return;
      }
      unlockedUserName = matched;
      localStorage.setItem(CONFIG.authStorageKey, matched);
      updateGreeting();
      lockOverlay.style.display = 'none';
      fetchAdminItems();
    }

    lockBtn.addEventListener('click', unlockWithPassword);
    lockInput.addEventListener('keydown', function(e){
      if(e.key === 'Enter') unlockWithPassword();
    });

    if(localStorage.getItem(CONFIG.authStorageKey)){
      unlockedUserName = localStorage.getItem(CONFIG.authStorageKey) || '';
      updateGreeting();
      lockOverlay.style.display = 'none';
      fetchAdminItems();
    }

    window.openPreview = function(listingNumber){
      startLoadingOverlay();
      const url = CONFIG.listingsUrl + '?listingNumber=' + encodeURIComponent(listingNumber) + '&open=1';
      window.open(url, '_blank');
      window.setTimeout(stopLoadingOverlay, 900);
    };

    window.editItem = function(listingNumber){
      location.href = CONFIG.adminEditUrl + '?listingNumber=' + encodeURIComponent(listingNumber);
    };

    window.markVisible = function(listingNumber){
      setPropertyStatus(listingNumber, 'visible');
    };

    window.markHidden = function(listingNumber){
      setPropertyStatus(listingNumber, 'hidden');
    };

    document.getElementById('channelModal').addEventListener('click', function(e){
      if(e.target === this) closeChannelModal();
    });

    window.addEventListener('keydown', function(e){
      if(e.key === 'Escape'){
        if(isCalendarModalOpen()){
          closeCalendarModal();
          return;
        }
        closeChannelModal();
      }
    });

    window.addEventListener('popstate', function(){
      if(isCalendarModalOpen()){
        closeCalendarModal(true);
      }
    });

    updateGreeting();
    updateTeamTogglePanel();
  </script>
</body>
</html>
