<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>전체 매물 PDF 만들기</title>
<style>
  html,body{margin:0;padding:0;background:#fff;color:#111318;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif}
  .page{max-width:980px;margin:0 auto;padding:20px 16px 28px}
  .topbar{position:sticky;top:0;z-index:10;background:#fff;padding:14px 0 10px;border-bottom:1px solid #e5e7eb}
  .topbar-inner{max-width:980px;margin:0 auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:0 16px}
  .head-btn{width:auto;min-width:88px;min-height:38px;padding:0 14px;border-radius:12px;border:1px solid #dce6f1;background:#fff;color:#111;font-size:14px;font-weight:800;cursor:pointer}
  .head-btn.primary{background:#111827;color:#fff;border-color:#111827}
  .status{font-size:13px;color:#6b7280;font-weight:700;padding-left:4px}
  .preview-wrap{padding-top:18px}
  #bulkPreviewArea{display:grid;gap:18px}
  .bulk-page-card{width:794px;min-height:1123px;margin:0 auto;background:#fff;color:#111;padding:38px 22px 18px;box-sizing:border-box;border:1px solid #e5e7eb;box-shadow:0 12px 30px rgba(15,23,42,.06)}
  .pdf-brand{font-size:18px;font-weight:900;letter-spacing:-0.03em;margin:0 0 12px;}
  .pdf-top-grid{display:grid;grid-template-columns:180px 1fr;gap:12px;align-items:start;}
  .pdf-hero{width:100%;height:112px;border-radius:14px;overflow:hidden;background:#f3f4f6;border:1px solid #e5e7eb;}
  .pdf-hero img{width:100%;height:100%;object-fit:cover;display:block;}
  .pdf-chip{display:inline-flex;align-items:center;justify-content:center;min-height:26px;padding:0 12px;border-radius:999px;background:#0f7cff;color:#fff;font-size:12px;font-weight:900;margin:0 0 6px;}
  .pdf-title{font-size:22px;line-height:1.14;font-weight:900;letter-spacing:-0.05em;margin:0 0 5px;word-break:keep-all;}
  .pdf-address{font-size:12px;line-height:1.4;color:#4b5563;margin:0 0 5px;word-break:keep-all;}
  .pdf-price{font-size:18px;line-height:1.2;font-weight:900;color:#d62828;margin:0 0 6px;word-break:keep-all;}
  .pdf-summary{display:grid;gap:3px;margin:0;}
  .pdf-summary-item{font-size:11px;line-height:1.35;color:#1f2937;word-break:keep-all;}
  .pdf-thumb-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:7px;}
  .pdf-thumb{aspect-ratio:1/1;border-radius:10px;overflow:hidden;background:#f3f4f6;border:1px solid #e5e7eb;}
  .pdf-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .pdf-two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:9px;align-items:start;}
  .pdf-section{border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;break-inside:avoid;}
  .pdf-section + .pdf-section{margin-top:9px;}
  .pdf-section-title{background:#f8fafc;padding:7px 10px;font-size:12px;font-weight:900;letter-spacing:-0.03em;}
  .pdf-kv{display:grid;grid-template-columns:84px 1fr;}
  .pdf-kv-row{display:contents;}
  .pdf-kv-label,.pdf-kv-value{padding:4px 7px;border-top:1px solid #eef2f7;font-size:10.5px;line-height:1.32;word-break:break-word;}
  .pdf-kv-label{background:#fcfcfd;color:#6b7280;font-weight:700;}
  .pdf-kv-value{color:#111827;font-weight:500;}
  .pdf-factory-table{width:100%;border-collapse:collapse;table-layout:fixed;}
  .pdf-factory-table th,.pdf-factory-table td{border-top:1px solid #eef2f7;padding:4px 6px;font-size:10px;line-height:1.3;vertical-align:top;word-break:break-word;}
  .pdf-factory-table th{width:19%;background:#fcfcfd;color:#6b7280;font-weight:700;text-align:left;}
  .pdf-factory-table td{width:31%;color:#111827;font-weight:500;}
  .pdf-memo-box{padding:7px 8px;font-size:10.5px;line-height:1.36;white-space:pre-wrap;min-height:54px;word-break:break-word;}
  @media print {
    @page{size:A4 portrait;margin:12mm 8mm 8mm;}
    html,body{background:#fff}
    .topbar{display:none !important}
    .page{max-width:none;margin:0;padding:0}
    .preview-wrap{padding:0}
    #bulkPreviewArea{display:block}
    .bulk-page-card{width:auto;min-height:auto;margin:0;border:none;box-shadow:none;page-break-after:always;break-after:page;padding:0}
    .bulk-page-card:last-child{page-break-after:auto;break-after:auto}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <button class="head-btn" id="allBtn">전체매물 PDF</button>
    <button class="head-btn" id="skBtn">상가팀 PDF</button>
    <button class="head-btn" id="mkBtn">공장팀 PDF</button>
    <button class="head-btn primary" id="printBtn">PDF 저장</button>
    <div class="status" id="statusText">대기중</div>
  </div>
</div>
<div class="page">
  <div class="preview-wrap">
    <div id="bulkPreviewArea"></div>
  </div>
</div>
<script>
(function(){
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbznhBvYFIv_GKeNoGIPFTi_mIXXH04BOvYrb4ZN9dk_Cc4Xjir3TP_vL3bbPrLLxgg2/exec';
  var statusText = document.getElementById('statusText');
  var previewArea = document.getElementById('bulkPreviewArea');
  function setStatus(t){ statusText.textContent = t || ''; }
  function textOf(v){ return String(v == null ? '' : v).replace(/\s+/g,' ').trim(); }
  function htmlEscape(s){ return String(s||'').replace(/[&<>"']/g, function(ch){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch]; }); }
  function nl2br(s){ return htmlEscape(String(s||'')).replace(/\n/g,'<br>'); }
  function cleanAddress(s){ return String(s||'').replace(/(^|\s)(검색|조회)(?=\s|$)/g, ' ').replace(/\s+/g,' ').trim(); }
  function postJson(payload){ return fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload)}).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }); }
  function safeParseArray(v){
    if(Array.isArray(v)) return v;
    if(!v) return [];
    try{ var p = JSON.parse(v); return Array.isArray(p) ? p : []; }catch(e){ return []; }
  }
  function getImageUrlsFromItem(item){
    var photos = safeParseArray(item.photoUrlsJson || item.photosJson || item.photos || item.photoTemps);
    var urls = photos.map(function(p){
      if(!p) return '';
      if(typeof p === 'string') return p;
      return p.url || p.originalUrl || p.lightUrl || p.heroUrl || p.thumbUrl || p.thumbnailUrl || p.src || '';
    }).filter(Boolean);
    var hero = item.heroUrl || urls[0] || '';
    return { hero: hero, thumbs: urls.slice(0,5) };
  }
  function formatPrice(item){
    var deal = textOf(item.dealType);
    if(deal === '임대'){
      var parts = [];
      if(textOf(item.deposit)) parts.push('보증금 ' + textOf(item.deposit));
      if(textOf(item.monthlyRent)) parts.push('월세 ' + textOf(item.monthlyRent));
      if(textOf(item.maintenanceFee)) parts.push('관리비 ' + textOf(item.maintenanceFee));
      return parts.join(' / ') || textOf(item.price);
    }
    if(deal === '매매'){
      return textOf(item.salePrice || item.price);
    }
    return textOf(item.price || item.salePrice || '');
  }
  function basicRowsFromItem(item){
    return [
      ['소재지', cleanAddress(item.address)],
      ['거래형태', textOf(item.dealType)],
      ['매매가 / 임대가', formatPrice(item)],
      ['사용승인일', textOf(item.approvalDate)],
      ['대지면적', [textOf(item.landAreaM2) && (textOf(item.landAreaM2)+'㎡'), textOf(item.landAreaPy) && (textOf(item.landAreaPy)+'평')].filter(Boolean).join(' / ')],
      ['건축면적', [textOf(item.buildingAreaM2) && (textOf(item.buildingAreaM2)+'㎡'), textOf(item.buildingAreaPy) && (textOf(item.buildingAreaPy)+'평')].filter(Boolean).join(' / ')],
      ['연면적', [textOf(item.totalFloorAreaM2) && (textOf(item.totalFloorAreaM2)+'㎡'), textOf(item.totalFloorAreaPy) && (textOf(item.totalFloorAreaPy)+'평')].filter(Boolean).join(' / ')],
      ['전용면적', [textOf(item.exclusiveAreaM2) && (textOf(item.exclusiveAreaM2)+'㎡'), textOf(item.exclusiveAreaPy) && (textOf(item.exclusiveAreaPy)+'평')].filter(Boolean).join(' / ')],
      ['용도지역', textOf(item.zoning)],
      ['매물종류', textOf(item.propertyType)],
      ['건축물 구성', textOf(item.buildingComposition)],
      ['주차대수', textOf(item.parkingCount)],
      ['출입구 방향', textOf(item.entranceDirection)],
      ['입주가능일', textOf(item.moveInDate)],
      ['건물 층수', textOf(item.floorInfo)],
      ['화장실', textOf(item.restroomInfo)],
      ['관리비', textOf(item.maintenanceFee)],
      ['매물번호', textOf(item.listingNumber)]
    ];
  }
  function factoryRowsFromItem(item){
    return [
      ['층고', item.ceilingHeight], ['크레인', item.crane], ['호이스트', item.hoist], ['전력', item.powerCapacity], ['주요 설비', item.mainFacilities || item.mainEquipment], ['추천 업종', item.recommendedUse || item.recommendedIndustry], ['업종 제한', item.restrictedUse || item.industryRestriction], ['진입로 폭', item.roadWidth], ['도어폭', item.doorWidth], ['대형차 진입', item.truckAccess || item.largeTruckAccess], ['상하차 가능', item.loadingAvailable], ['사무동 포함', item.officeIncluded], ['야드 크기', item.yardSize], ['즉시 가동', item.readyToOperate]
    ];
  }
  function requesterRowsFromItem(item){
    return [['의뢰인명', item.requesterName], ['연락처', item.requesterPhone], ['의뢰 구분', item.requesterType], ['비고', item.requesterNote]];
  }
  function buildKv(rows, emptyText){
    var filtered = (rows || []).filter(function(r){ return textOf(r[0]); });
    if(!filtered.length) return '<div class="pdf-memo-box">'+ htmlEscape(emptyText || '내용 없음') +'</div>';
    return '<div class="pdf-kv">' + filtered.map(function(r){ return '<div class="pdf-kv-row"><div class="pdf-kv-label">'+ htmlEscape(r[0]) +'</div><div class="pdf-kv-value">'+ nl2br(r[1] || '') +'</div></div>'; }).join('') + '</div>';
  }
  function buildFactoryTable(rows){
    var normalized = (rows || []).map(function(r){ return [textOf(r[0]), textOf(r[1])]; });
    var html = '<table class="pdf-factory-table"><tbody>';
    for(var i=0;i<normalized.length;i+=2){
      var left = normalized[i] || ['',''];
      var right = normalized[i+1] || ['',''];
      html += '<tr>'
        + '<th>'+ htmlEscape(left[0]) +'</th><td>'+ nl2br(left[1]) +'</td>'
        + '<th>'+ htmlEscape(right[0]) +'</th><td>'+ nl2br(right[1]) +'</td>'
        + '</tr>';
    }
    html += '</tbody></table>';
    return html;
  }
  function buildPdfHtmlFromItem(item){
    var imgs = getImageUrlsFromItem(item);
    var deal = textOf(item.dealType);
    var title = textOf(item.title) || '제목 미입력';
    var address = cleanAddress(item.address);
    var price = formatPrice(item);
    var summaries = [item.summary1, item.summary2, item.summary3].map(textOf).filter(Boolean).slice(0,3);
    var basicRows = basicRowsFromItem(item);
    var factoryRows = factoryRowsFromItem(item);
    var requesterRows = requesterRowsFromItem(item);
    var memo = textOf(item.memo);
    var thumbsHtml = imgs.thumbs.map(function(url){ return '<div class="pdf-thumb"><img src="'+ htmlEscape(url) +'" alt=""></div>'; }).join('');
    return ''
      + '<div class="pdf-brand">Maslow Korea</div>'
      + '<div class="pdf-top-grid">'
      + '  <div>'
      + '    <div class="pdf-hero">' + (imgs.hero ? '<img src="'+ htmlEscape(imgs.hero) +'" alt="대표사진">' : '') + '</div>'
      +      (thumbsHtml ? '<div class="pdf-thumb-grid">'+ thumbsHtml +'</div>' : '')
      + '  </div>'
      + '  <div>'
      +      (deal ? '<div class="pdf-chip">'+ htmlEscape(deal) +'</div>' : '')
      + '    <h1 class="pdf-title">'+ htmlEscape(title) +'</h1>'
      +      (address ? '<p class="pdf-address">'+ htmlEscape(address) +'</p>' : '')
      +      (price ? '<p class="pdf-price">'+ htmlEscape(price) +'</p>' : '')
      + '    <div class="pdf-summary">'
      +        (summaries.length ? summaries.map(function(t){ return '<div class="pdf-summary-item">✔ '+ htmlEscape(t) +'</div>'; }).join('') : '<div class="pdf-summary-item">요약 없음</div>')
      + '    </div>'
      + '  </div>'
      + '</div>'
      + '<div class="pdf-two-col">'
      + '  <div class="pdf-section"><div class="pdf-section-title">기본정보</div>'+ buildKv(basicRows) +'</div>'
      + '  <div>'
      + '    <div class="pdf-section"><div class="pdf-section-title">공장특화정보</div>'+ buildFactoryTable(factoryRows) +'</div>'
      + '    <div class="pdf-section"><div class="pdf-section-title">의뢰인 정보</div>'+ buildKv(requesterRows, '의뢰인 정보가 없습니다.') +'</div>'
      + '  </div>'
      + '</div>'
      + '<div class="pdf-section"><div class="pdf-section-title">MEMO</div><div class="pdf-memo-box">'+ nl2br(memo || '') +'</div></div>';
  }
  function waitForImages(doc, cb){
    var imgs = Array.prototype.slice.call(doc.images || []);
    if(!imgs.length){ cb(); return; }
    var left = imgs.length; var done = false;
    function finish(){ if(done) return; done = true; cb(); }
    function check(){ left -= 1; if(left <= 0) finish(); }
    imgs.forEach(function(img){
      if(img.complete) return check();
      img.addEventListener('load', check, {once:true});
      img.addEventListener('error', check, {once:true});
    });
    setTimeout(finish, 4000);
  }
  function loadList(){ return postJson({action:'listAdminProperties'}).then(function(res){ return Array.isArray(res.items) ? res.items : []; }); }
  function loadDetail(listingNumber){ return postJson({action:'getPropertyByListingNumber', listingNumber: listingNumber}); }
  function matchesTeam(item, team){
    var no = textOf(item.listingNumber).toUpperCase();
    if(team === 'SK') return no.indexOf('SK') === 0;
    if(team === 'MK') return no.indexOf('MK') === 0;
    return true;
  }
  async function buildBulk(team){
    previewArea.innerHTML = '';
    setStatus('목록 불러오는 중...');
    var rows = await loadList();
    var filtered = rows.filter(function(item){ return matchesTeam(item, team); });
    setStatus('상세 불러오는 중... 0 / ' + filtered.length);
    for(var i=0;i<filtered.length;i++){
      var row = filtered[i];
      var no = textOf(row.listingNumber);
      if(!no) continue;
      var detail;
      try{
        detail = await loadDetail(no);
      }catch(e){
        detail = row;
      }
      var item = Object.assign({}, row, detail || {});
      var card = document.createElement('div');
      card.className = 'bulk-page-card';
      card.innerHTML = buildPdfHtmlFromItem(item);
      previewArea.appendChild(card);
      setStatus('상세 불러오는 중... ' + (i+1) + ' / ' + filtered.length);
    }
    setStatus('완료: ' + filtered.length + '건');
  }
  function printAll(){
    if(!previewArea.children.length){ alert('먼저 페이지를 만들어주세요.'); return; }
    var w = window.open('', '_blank');
    if(!w){ alert('팝업이 차단되어 있습니다. 팝업 허용 후 다시 시도해주세요.'); return; }
    var doc = w.document;
    doc.open();
    doc.write('<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>bulk-property-pdf</title><style>' + document.querySelector('style').innerHTML + '</style></head><body><div id="bulkPreviewArea">' + previewArea.innerHTML + '</div></body></html>');
    doc.close();
    waitForImages(doc, function(){ setTimeout(function(){ w.focus(); w.print(); }, 250); });
  }
  document.getElementById('allBtn').addEventListener('click', function(){ buildBulk('ALL').catch(function(e){ console.error(e); setStatus('오류: ' + (e && e.message || e)); }); });
  document.getElementById('skBtn').addEventListener('click', function(){ buildBulk('SK').catch(function(e){ console.error(e); setStatus('오류: ' + (e && e.message || e)); }); });
  document.getElementById('mkBtn').addEventListener('click', function(){ buildBulk('MK').catch(function(e){ console.error(e); setStatus('오류: ' + (e && e.message || e)); }); });
  document.getElementById('printBtn').addEventListener('click', printAll);
})();
</script>
</body>
</html>
