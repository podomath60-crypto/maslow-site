<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>블로그 발행기</title>
  <script src="https://t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <style>
    :root{
      --bg:#ffffff;
      --line:#e6ebf1;
      --text:#111318;
      --muted:#67707b;
      --blue:#0f7cff;
      --blue-soft:#eef5ff;
      --shadow:0 14px 30px rgba(15,23,42,.05);
      --hero-on:#dff7bf;
      --hero-on-line:#b7e37d;
      --hero-on-text:#4e7b10;
      --hero-off:#f3f5f8;
      --hero-off-line:#dce3ea;
      --hero-off-text:#9aa4af;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:#fff;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif !important;
      letter-spacing:-0.02em;
      overflow-x:hidden;
    }
    body{min-width:0}
    img{display:block;max-width:100%}
    button,input,select{font:inherit}
    button{border:none;background:none;cursor:pointer}
    .page{
      min-height:100vh;
      background:linear-gradient(180deg,#ffffff 0%,#f9fbff 100%);
      overflow-x:hidden;
    }
    .shell{
      width:100%;
      max-width:980px;
      margin:0 auto;
      padding:0 20px 128px;
      min-width:0;
      overflow-x:hidden;
    }
    .head{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(230,235,241,.95);
      padding:14px 0 12px;
    }
    .head-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
      min-width:0;
    }
    .title{
      font-size:22px;
      line-height:1.1;
      font-weight:900;
      color:#111318;
      letter-spacing:-0.04em;
      min-width:0;
    }
    .ghost-btn{
      min-height:40px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111;
      font-size:14px;
      font-weight:800;
      flex:0 0 auto;
    }

    .top-tools{
      display:grid;
      grid-template-columns:190px minmax(0,1fr);
      gap:8px;
      align-items:center;
      min-width:0;
    }
    .date-nav{
      display:grid;
      grid-template-columns:32px minmax(0,1fr) 32px;
      align-items:center;
      gap:4px;
      min-height:44px;
      padding:0 6px;
      border:1px solid #dce6f1;
      border-radius:14px;
      background:#fff;
      box-shadow:0 8px 20px rgba(15,23,42,.03);
      min-width:0;
      overflow:hidden;
    }
    .nav-arrow{
      width:32px;
      min-width:32px;
      max-width:32px;
      min-height:30px;
      height:30px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:10px;
      color:#111318;
      font-size:20px;
      font-weight:900;
      flex:0 0 32px;
      user-select:none;
    }
    .date-trigger{
      min-width:0;
      width:100%;
      min-height:30px;
      height:30px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:13px;
      font-weight:900;
      letter-spacing:-0.03em;
      color:#111318;
    }
    .search-col{
      min-width:0;
      width:100%;
    }
    .search-input{
      width:100%;
      min-width:0;
      min-height:44px;
      padding:0 14px;
      border-radius:14px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:14px;
      font-weight:800;
      outline:none;
      box-shadow:0 8px 20px rgba(15,23,42,.03);
    }
    .search-input::placeholder{
      color:rgba(123,135,148,.55);
      font-weight:700;
    }
    .meta-line{
      margin-top:8px;
      padding-left:2px;
      font-size:12px;
      color:#7b8794;
      font-weight:800;
      line-height:1.4;
    }

    .section{
      margin-top:16px;
      border:1px solid var(--line);
      border-radius:28px;
      background:#fff;
      box-shadow:var(--shadow);
      padding:14px;
      min-width:0;
      overflow:hidden;
    }
    .section-title{
      margin:0 0 12px;
      font-size:18px;
      line-height:1.25;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.04em;
    }
    .empty{
      border:1px dashed #d9e3ed;
      border-radius:22px;
      background:#fff;
      padding:28px 18px;
      text-align:center;
      color:#7b8794;
      font-size:14px;
      font-weight:800;
    }

    .listing-slider-wrap{
      width:100%;
      overflow-x:auto;
      overflow-y:visible;
      -webkit-overflow-scrolling:touch;
      min-width:0;
    }
    .listing-slider-wrap::-webkit-scrollbar{display:none}
    .listing-slider{
      display:flex;
      gap:12px;
      width:max-content;
      max-width:none;
      min-width:100%;
    }
    .listing-card{
      flex:0 0 232px;
      width:232px;
      border:1px solid #e6ebf1;
      border-radius:22px;
      background:#fff;
      overflow:hidden;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      cursor:pointer;
    }
    .listing-card.is-active{
      border-color:#bfdcff;
      box-shadow:0 14px 26px rgba(15,124,255,.10);
    }
    .listing-thumb{
      width:100%;
      height:152px;
      background:#edf2f7 center/cover no-repeat;
    }
    .listing-body{
      padding:12px;
      display:grid;
      gap:7px;
    }
    .listing-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }
    .listing-team{
      min-height:24px;
      padding:0 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .listing-team.shopping{background:#fff3f7;color:#c13f73;border:1px solid #efb6c8}
    .listing-team.factory{background:#eef5ff;color:#0f7cff;border:1px solid #cfe2ff}
    .listing-no{
      font-size:11px;
      color:#7b8794;
      font-weight:900;
    }
    .listing-title{
      font-size:16px;
      line-height:1.4;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.03em;
      min-height:44px;
      word-break:keep-all;
    }
    .listing-address,.listing-price{
      font-size:12px;
      line-height:1.5;
      color:#58616b;
      font-weight:700;
      word-break:keep-all;
    }

    .slider-bar-wrap{
      display:block;
      margin-top:10px;
      padding:16px 0;
    }
    .slider-track{
      position:relative;
      height:6px;
      background:#eef2f6;
      border-radius:999px;
      overflow:visible;
    }
    .slider-track-hit{
      position:absolute;
      left:0;
      right:0;
      top:50%;
      height:36px;
      transform:translateY(-50%);
      background:transparent;
      cursor:pointer;
    }
    .slider-thumb-hit{
      position:absolute;
      left:0;
      top:50%;
      height:36px;
      width:0;
      transform:translateY(-50%) translateX(0);
      display:flex;
      align-items:center;
      background:transparent;
      cursor:grab;
    }
    .slider-thumb{
      width:100%;
      height:6px;
      background:#0f7cff;
      border-radius:999px;
    }

    .selected-summary{
      display:none;
      margin-top:16px;
      border:1px solid var(--line);
      border-radius:24px;
      background:#fff;
      box-shadow:var(--shadow);
      padding:16px;
    }
    .selected-summary.show{display:block}
    .selected-title{
      font-size:20px;
      line-height:1.3;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.04em;
      margin-bottom:6px;
    }
    .selected-sub{
      font-size:13px;
      line-height:1.6;
      color:#66707a;
      font-weight:700;
    }

    .assets-section{display:none}
    .assets-section.show{display:block}
    .tools-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .tools-left,.tools-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .chip{
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#5d6670;
      font-size:12px;
      font-weight:900;
    }
    .mini-btn{
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:12px;
      font-weight:900;
    }
    .mini-btn.blue{background:#eef5ff;border-color:#cfe2ff;color:#0f7cff}
    .mini-btn.pink{background:#fff3f7;border-color:#efb6c8;color:#b83268}

    .asset-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
      min-width:0;
    }
    .asset-card{
      border:1px solid #e6ebf1;
      border-radius:22px;
      background:#fff;
      overflow:hidden;
      box-shadow:0 8px 18px rgba(15,23,42,.04);
      min-width:0;
    }
    .asset-preview{
      position:relative;
      width:100%;
      aspect-ratio:1 / .9;
      background:#edf2f7 center/cover no-repeat;
      border-bottom:1px solid #eef2f6;
    }
    .asset-hero{
      position:absolute;
      top:8px;
      left:8px;
      min-height:22px;
      padding:0 6px;
      border-radius:8px;
      background:var(--hero-off);
      border:1px solid var(--hero-off-line);
      color:var(--hero-off-text);
      font-size:10px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      cursor:pointer;
      z-index:2;
    }
    .asset-card.is-hero .asset-hero{
      background:var(--hero-on);
      border-color:var(--hero-on-line);
      color:var(--hero-on-text);
    }
    .asset-check{
      position:absolute;
      top:8px;
      right:8px;
      width:24px;
      height:24px;
      border-radius:999px;
      background:rgba(255,255,255,.96);
      border:1px solid #dce6f1;
      color:#b8c2cc;
      font-size:14px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      cursor:pointer;
      z-index:2;
      box-shadow:0 6px 14px rgba(15,23,42,.08);
    }
    .asset-card.is-selected .asset-check{
      background:#0f7cff;
      border-color:#0f7cff;
      color:#fff;
    }
    .asset-body{
      padding:9px;
      display:grid;
      gap:6px;
    }
    .select{
      width:100%;
      min-height:32px;
      border-radius:10px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111;
      padding:0 8px;
      outline:none;
      font-size:12px;
      font-weight:800;
    }

    .bottom-bar{
      position:fixed;
      left:50%;
      bottom:calc(18px + env(safe-area-inset-bottom, 0px));
      transform:translateX(-50%);
      z-index:40;
      width:min(980px - 32px, calc(100% - 20px));
      display:flex;
      gap:10px;
      padding:10px;
      border-radius:22px;
      border:1px solid #dfe7f0;
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(10px);
      box-shadow:0 16px 36px rgba(15,23,42,.12);
    }
    .bottom-btn{
      flex:1 1 auto;
      min-height:52px;
      border-radius:16px;
      font-size:15px;
      font-weight:900;
      letter-spacing:-0.03em;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111;
    }
    .bottom-btn.primary{
      background:#0f7cff;
      border-color:#0f7cff;
      color:#fff;
    }
    .bottom-btn:disabled{opacity:.5;cursor:default}

    .calendar-modal{
      position:fixed;
      inset:0;
      z-index:120;
      display:none;
      background:#f7f8fb;
    }
    .calendar-modal.show{display:block}
    .calendar-sheet{
      width:100vw;
      height:100dvh;
      min-height:100dvh;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      background:#f7f8fb;
    }
    .calendar-top{
      position:sticky;
      top:0;
      z-index:3;
      min-height:72px;
      background:rgba(247,248,251,.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid #e7ebf1;
    }
    .calendar-top-inner{
      max-width:980px;
      margin:0 auto;
      padding:0 20px;
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .calendar-back{
      min-height:42px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid #d8e0ea;
      background:#fff;
      color:#111318;
      font-size:14px;
      font-weight:800;
    }
    .calendar-title{
      flex:1 1 auto;
      text-align:center;
      font-size:18px;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.04em;
    }
    .calendar-spacer{width:72px;flex:0 0 72px}
    .calendar-inner{
      max-width:980px;
      margin:0 auto;
      padding:14px 20px 28px;
    }
    .calendar-shell{
      border:1px solid #e5e9ef;
      border-radius:30px;
      background:#fdfefe;
      box-shadow:0 14px 30px rgba(15,23,42,.04);
      padding:18px 18px 16px;
      overflow:hidden;
    }
    .calendar-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .calendar-nav{
      width:42px;
      height:42px;
      border-radius:999px;
      border:1px solid #dde4ec;
      background:#fff;
      color:#111318;
      font-size:24px;
      line-height:1;
      font-weight:500;
    }
    .calendar-month-label{
      font-size:17px;
      font-weight:800;
      color:#17191d;
      letter-spacing:-0.03em;
    }
    .calendar-weekdays{
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
      padding:0 2px 8px;
      border-bottom:1px solid #edf1f5;
    }
    .calendar-weekday{
      text-align:center;
      font-size:12px;
      font-weight:700;
      color:#7f8792;
      padding:0 0 6px;
    }
    .calendar-grid{
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
    }
    .calendar-cell{
      min-height:76px;
      padding:5px 5px 5px;
      border-right:1px solid #eef2f6;
      border-bottom:1px solid #eef2f6;
      background:transparent;
      text-align:left;
      display:flex;
      flex-direction:column;
      gap:2px;
      border-radius:0;
      min-width:0;
    }
    .calendar-cell:nth-child(7n){border-right:none}
    .calendar-cell.is-selected{background:#eef5ff}
    .calendar-day-number{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:4px;
      font-size:16px;
      line-height:1.15;
      font-weight:700;
      color:#111318;
    }
    .calendar-lines{
      margin-top:3px;
      display:grid;
      gap:2px;
      line-height:1.22;
    }
    .calendar-line{
      font-size:11.5px;
      line-height:1.32;
      font-weight:400;
      color:#5f6873;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .calendar-line.zero{display:none}

    .loading-overlay{
      position:fixed;
      inset:0;
      z-index:140;
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(3px);
    }
    .loading-overlay.show{display:flex}
    .loading-panel{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-align:center;
    }
    .loading-buddy{
      width:74px;
      height:74px;
      object-fit:cover;
      border-radius:18px;
      animation:buddyBounce 1.15s ease-in-out infinite;
      box-shadow:0 10px 22px rgba(15,124,255,.16);
    }
    .loading-text{
      min-height:24px;
      font-size:18px;
      font-weight:800;
      line-height:1.4;
      color:#2b8fe8;
      letter-spacing:-0.03em;
    }
    @keyframes buddyBounce{
      0%,100%{transform:translateY(0) scale(1)}
      20%{transform:translateY(-3px) scale(1.01)}
      50%{transform:translateY(-10px) scale(1.04)}
      75%{transform:translateY(-4px) scale(1.01)}
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:calc(92px + env(safe-area-inset-bottom, 0px));
      transform:translateX(-50%);
      z-index:160;
      min-width:180px;
      max-width:calc(100% - 48px);
      padding:13px 16px;
      border-radius:14px;
      background:rgba(17,24,39,.92);
      color:#fff;
      font-size:14px;
      line-height:1.45;
      font-weight:800;
      text-align:center;
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease;
    }
    .toast.show{opacity:1}

    @media (max-width:860px){
      .shell{
        padding:0 14px 120px;
        overflow-x:hidden;
      }
      .top-tools{
        grid-template-columns:132px minmax(0,1fr);
        gap:6px;
      }
      .date-nav{
        grid-template-columns:24px minmax(0,1fr) 24px;
        min-height:38px;
        padding:0 4px;
        gap:2px;
      }
      .nav-arrow{
        width:24px;
        min-width:24px;
        max-width:24px;
        min-height:24px;
        height:24px;
        font-size:17px;
        flex:0 0 24px;
      }
      .date-trigger{
        min-height:24px;
        height:24px;
        font-size:11px;
      }
      .search-input{
        min-height:38px;
        height:38px;
        font-size:13px;
      }
      .listing-slider{
        display:flex;
        gap:10px;
        width:max-content;
        max-width:none;
        min-width:0;
      }
      .listing-card{
        flex:0 0 186px;
        width:186px;
        min-width:186px;
        max-width:186px;
      }
      .listing-thumb{
        height:132px;
      }
      .slider-bar-wrap{display:none !important}
      .asset-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
      .bottom-bar{
        width:calc(100% - 20px);
        gap:8px;
        padding:8px;
        border-radius:18px;
      }
      .bottom-btn{
        min-height:48px;
        font-size:14px;
      }
      .calendar-top-inner,
      .calendar-inner{
        padding-left:16px;
        padding-right:16px;
      }
      .calendar-shell{
        padding:14px 12px 12px;
        border-radius:26px;
      }
      .calendar-nav{
        width:38px;
        height:38px;
        font-size:22px;
      }
      .calendar-month-label{
        font-size:16px;
      }
      .calendar-cell{
        min-height:68px;
        padding:4px 4px 4px;
      }
      .calendar-line{font-size:11px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <div class="head">
        <div class="head-top">
          <div class="title"><span style="display:inline-block;margin-right:8px;font-weight:1000;font-size:1.28em;line-height:1;color:#19ce60;">N</span>블로그 발행기</div>
          <button type="button" class="ghost-btn" id="goStatusBtn"><span style="display:inline-block;margin-right:6px;font-weight:1000;font-size:1.18em;line-height:1;color:#19ce60;">N</span>현황판</button>
        </div>

        <div class="top-tools">
          <div class="date-nav">
            <button type="button" class="nav-arrow" id="prevDateBtn">‹</button>
            <button type="button" class="date-trigger" id="datePickerBtn">날짜 선택</button>
            <button type="button" class="nav-arrow" id="nextDateBtn">›</button>
          </div>
          <div class="search-col">
            <input id="searchInput" class="search-input" type="text" placeholder="제목, 주소, 매물번호 검색" autocomplete="off" />
          </div>
        </div>

        <div class="meta-line" id="dateMetaLine">날짜를 선택하거나 검색하세요.</div>
      </div>

      <section class="section">
        <h2 class="section-title">매물 선택</h2>
        <div id="listingEmpty" class="empty">매물을 불러오는 중입니다.</div>

        <div id="listingSliderWrap" class="listing-slider-wrap" style="display:none;">
          <div id="listingSlider" class="listing-slider"></div>
        </div>

        <div id="listingSliderBarWrap" class="slider-bar-wrap" style="display:none;">
          <div id="listingSliderTrack" class="slider-track">
            <div id="listingSliderTrackHit" class="slider-track-hit"></div>
            <div id="listingSliderBarHit" class="slider-thumb-hit">
              <div id="listingSliderBar" class="slider-thumb"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="selectedSummary" class="selected-summary">
        <div id="selectedListingTitle" class="selected-title"></div>
        <div id="selectedListingSub" class="selected-sub"></div>
      </section>

      <section id="assetsSection" class="section assets-section">
        <div class="tools-row">
          <div class="tools-left">
            <div id="selectedCountChip" class="chip">선택 0</div>
            <div id="heroCountChip" class="chip">대표 미지정</div>
          </div>
          <div class="tools-right">
            <button type="button" class="mini-btn pink" id="generateInfoImageBtn">정보 이미지 생성</button>
          </div>
        </div>

        <h2 class="section-title">사진 배치</h2>
        <div id="assetGrid" class="asset-grid"></div>
      </section>
    </div>

    <div class="bottom-bar">
      <button type="button" class="bottom-btn" id="draftSaveBtn">임시저장</button>
      <button type="button" class="bottom-btn primary" id="publishPrepBtn" disabled>발행</button>
    </div>
  </div>

  <div id="calendarModal" class="calendar-modal" aria-hidden="true">
    <div class="calendar-sheet">
      <div class="calendar-top">
        <div class="calendar-top-inner">
          <button type="button" class="calendar-back" id="calendarBackBtn">← 뒤로</button>
          <div class="calendar-title">캘린더</div>
          <div class="calendar-spacer"></div>
        </div>
      </div>

      <div class="calendar-inner">
        <section class="calendar-shell">
          <div class="calendar-head">
            <button type="button" class="calendar-nav" id="calendarPrevBtn">‹</button>
            <div id="calendarMonthLabel" class="calendar-month-label">2026.04</div>
            <button type="button" class="calendar-nav" id="calendarNextBtn">›</button>
          </div>

          <div class="calendar-weekdays">
            <div class="calendar-weekday">월</div>
            <div class="calendar-weekday">화</div>
            <div class="calendar-weekday">수</div>
            <div class="calendar-weekday">목</div>
            <div class="calendar-weekday">금</div>
            <div class="calendar-weekday">토</div>
            <div class="calendar-weekday">일</div>
          </div>

          <div id="calendarGrid" class="calendar-grid"></div>
        </section>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
    <div class="loading-panel">
      <img class="loading-buddy" src="https://cdn.imweb.me/thumbnail/20260407/eb862821485f9.jpg" alt="로딩">
      <div id="loadingText" class="loading-text">불러오는 중</div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const CONFIG = {
      adminListUrl: 'https://script.google.com/macros/s/AKfycbznhBvYFIv_GKeNoGIPFTi_mIXXH04BOvYrb4ZN9dk_Cc4Xjir3TP_vL3bbPrLLxgg2/exec',
      editorUrl: '/blog-editor',
      statusUrl: '/blog-status'
    };

    let rawItems = [];
    let selectedDate = '';
    let calendarCurrentMonth = '';
    let calendarOverviewMap = {};
    let selectedListing = null;
    let lookupPicked = null;
    let lookupAddressSearchWaiter = null;
    let lastLookupResult = null;
    let assets = [];
    let searchTimer = null;

    const els = {
      goStatusBtn: document.getElementById('goStatusBtn'),
      prevDateBtn: document.getElementById('prevDateBtn'),
      nextDateBtn: document.getElementById('nextDateBtn'),
      datePickerBtn: document.getElementById('datePickerBtn'),
      searchInput: document.getElementById('searchInput'),
      dateMetaLine: document.getElementById('dateMetaLine'),
      listingEmpty: document.getElementById('listingEmpty'),
      listingSliderWrap: document.getElementById('listingSliderWrap'),
      listingSlider: document.getElementById('listingSlider'),
      listingSliderBarWrap: document.getElementById('listingSliderBarWrap'),
      listingSliderTrack: document.getElementById('listingSliderTrack'),
      listingSliderTrackHit: document.getElementById('listingSliderTrackHit'),
      listingSliderBarHit: document.getElementById('listingSliderBarHit'),
      listingSliderBar: document.getElementById('listingSliderBar'),
      selectedSummary: document.getElementById('selectedSummary'),
      selectedListingTitle: document.getElementById('selectedListingTitle'),
      selectedListingSub: document.getElementById('selectedListingSub'),
      assetsSection: document.getElementById('assetsSection'),
      assetGrid: document.getElementById('assetGrid'),
      selectedCountChip: document.getElementById('selectedCountChip'),
      heroCountChip: document.getElementById('heroCountChip'),
      generateInfoImageBtn: document.getElementById('generateInfoImageBtn'),
      draftSaveBtn: document.getElementById('draftSaveBtn'),
      publishPrepBtn: document.getElementById('publishPrepBtn'),
      calendarModal: document.getElementById('calendarModal'),
      calendarBackBtn: document.getElementById('calendarBackBtn'),
      calendarPrevBtn: document.getElementById('calendarPrevBtn'),
      calendarNextBtn: document.getElementById('calendarNextBtn'),
      calendarMonthLabel: document.getElementById('calendarMonthLabel'),
      calendarGrid: document.getElementById('calendarGrid'),
      loadingOverlay: document.getElementById('loadingOverlay'),
      loadingText: document.getElementById('loadingText'),
      toast: document.getElementById('toast')
    };

    function text(v){ return String(v == null ? '' : v).trim(); }
    function escapeAttr(v){
      return String(v == null ? '' : v)
        .replace(/&/g,'&amp;')
        .replace(/"/g,'&quot;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
    }
    function parseDateValue(value){
      const s = text(value);
      if(!s) return null;
      const t = new Date(s).getTime();
      return Number.isNaN(t) ? null : t;
    }
    function formatDateKeyFromTs(ts){
      const d = new Date(ts);
      return [
        d.getFullYear(),
        String(d.getMonth()+1).padStart(2,'0'),
        String(d.getDate()).padStart(2,'0')
      ].join('-');
    }
    function formatDateLabel(dateKey){
      if(!dateKey) return '날짜 선택';
      const d = new Date(dateKey + 'T00:00:00');
      return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
    }
    function formatMonthLabel(monthKey){
      const parts = String(monthKey || '').split('-');
      if(parts.length !== 2) return '';
      return Number(parts[0]) + '.' + parts[1];
    }
    function getCurrentMonthKeyFromDate(dateKey){
      return text(dateKey).slice(0, 7);
    }
    function detectTeamByListingNumber(listingNumber){
      const s = text(listingNumber).toUpperCase();
      if(s.indexOf('SK-') === 0 || s.indexOf('SK') === 0) return 'shopping';
      if(s.indexOf('MK-') === 0 || s.indexOf('MK') === 0) return 'factory';
      return '';
    }
    function teamLabel(teamType){
      if(teamType === 'shopping') return '상가';
      if(teamType === 'factory') return '공장';
      return '매물';
    }
    function firstDayOfMonthKey(baseDateKey){
      const d = baseDateKey ? new Date(baseDateKey + 'T00:00:00') : new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    }
    function safeJsonParse(textValue, fallback){
      try{
        const parsed = JSON.parse(textValue);
        return parsed == null ? fallback : parsed;
      }catch(e){
        return fallback;
      }
    }
    function showToast(message){
      if(!message) return;
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(function(){
        els.toast.classList.remove('show');
      }, 1800);
    }
    function setLoading(on, label){
      els.loadingText.textContent = label || '불러오는 중';
      els.loadingOverlay.classList.toggle('show', !!on);
    }

    function normalizeItem(item, idx){
      const photoList = safeJsonParse(item && item.photoUrlsJson || '[]', []) || [];
      let firstPhoto = '';
      if(Array.isArray(photoList) && photoList.length){
        const p0 = photoList[0];
        firstPhoto = typeof p0 === 'string' ? p0 : (p0 && (p0.heroUrl || p0.url || p0.lightUrl || p0.thumbUrl)) || '';
      }
      return {
        id: text(item && item.listingNumber) || ('LIST-' + idx),
        listingNumber: text(item && item.listingNumber),
        title: text(item && item.title) || text(item && item.summary1) || '제목 없음',
        address: text(item && item.address),
        dealType: text(item && item.dealType),
        price: text(item && (item.price || item.salePrice)),
        deposit: text(item && item.deposit),
        monthlyRent: text(item && item.monthlyRent),
        heroUrl: text(item && item.heroUrl) || firstPhoto,
        photoUrlsJson: text(item && item.photoUrlsJson) || '[]',
        createdAt: text(item && item.createdAt),
        updatedAt: text(item && item.updatedAt),
        raw: item || {}
      };
    }

    function formatDealPrice(item){
      const dealType = text(item.dealType);
      const price = text(item.price);
      if(dealType && price) return dealType + ' / ' + price;
      if(dealType) return dealType;
      if(price) return price;
      if(item.deposit || item.monthlyRent){
        return '보증금 ' + (item.deposit || '-') + ' / 월세 ' + (item.monthlyRent || '-');
      }
      return '-';
    }

    function fetchPostJson(payload){
      return fetch(CONFIG.adminListUrl, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body: JSON.stringify(payload)
      }).then(function(res){
        if(!res.ok) throw new Error('조회 실패: ' + res.status);
        return res.json();
      });
    }

    function fetchAdminItems(){
      const monthKey = calendarCurrentMonth || firstDayOfMonthKey(selectedDate || formatDateKeyFromTs(Date.now()));
      setLoading(true, '매물 불러오는 중');
      return Promise.all([
        fetchPostJson({ action: 'listAdminProperties' }),
        fetchPostJson({ action: 'getCalendarOverview', month: monthKey })
      ])
      .then(function(results){
        const propertyData = results[0] || {};
        const calendarData = results[1] || {};

        const items = Array.isArray(propertyData && propertyData.items) ? propertyData.items : [];
        rawItems = items.map(normalizeItem);

        calendarCurrentMonth = monthKey;
        calendarOverviewMap = {};

        (Array.isArray(calendarData && calendarData.days) ? calendarData.days : []).forEach(function(day){
          const dateKey = text(day && day.dateKey);
          calendarOverviewMap[dateKey] = {
            shoppingCount: Number(day && day.shoppingCount || 0),
            factoryCount: Number(day && day.factoryCount || 0),
            threadCount: Number(day && day.threadCount || 0)
          };
        });

        if(!selectedDate){
          selectedDate = formatDateKeyFromTs(Date.now());
        }

        renderDateMetaLine();
        renderCalendarGrid();
        applyFiltersAndRenderListings();
      })
      .catch(function(err){
        console.error(err);
        els.listingEmpty.style.display = 'block';
        els.listingEmpty.textContent = '매물 데이터를 불러오지 못했습니다.';
        els.listingSliderWrap.style.display = 'none';
        showToast((err && err.message) || '불러오기 실패');
      })
      .finally(function(){
        setLoading(false);
      });
    }

    function getLocalCalendarPropertiesByDate(dateKey){
      return rawItems
        .filter(function(item){
          const created = parseDateValue(item && item.createdAt);
          if(!created) return false;
          return formatDateKeyFromTs(created) === dateKey;
        })
        .sort(function(a, b){
          return (parseDateValue(b.createdAt) || 0) - (parseDateValue(a.createdAt) || 0);
        });
    }

    function matchesKeyword(item, keyword){
      if(!keyword) return true;
      const haystack = [
        item.title, item.address, item.listingNumber, item.dealType, item.price,
        item.raw && item.raw.summary1, item.raw && item.raw.summary2, item.raw && item.raw.summary3
      ].map(text).join(' ').toLowerCase();
      return haystack.indexOf(keyword.toLowerCase()) > -1;
    }

    function applyFiltersAndRenderListings(){
      const keyword = text(els.searchInput.value);
      let items = selectedDate ? getLocalCalendarPropertiesByDate(selectedDate) : rawItems.slice();
      if(keyword){
        items = items.filter(function(item){ return matchesKeyword(item, keyword); });
      }
      renderListingSlider(items);
    }

    function renderListingSlider(items){
      selectedListing = null;
      assets = [];
      lastLookupResult = null;
      lookupPicked = null;
      els.selectedSummary.classList.remove('show');
      els.assetsSection.classList.remove('show');
      els.assetGrid.innerHTML = '';
      syncBottomButtons();

      if(!Array.isArray(items) || !items.length){
        els.listingEmpty.style.display = 'block';
        els.listingEmpty.textContent = '해당 조건의 매물이 없습니다.';
        els.listingSliderWrap.style.display = 'none';
        if(els.listingSliderBarWrap) els.listingSliderBarWrap.style.display = 'none';
        return;
      }

      els.listingEmpty.style.display = 'none';
      els.listingSliderWrap.style.display = 'block';
      if(els.listingSliderBarWrap){
        els.listingSliderBarWrap.style.display = (window.innerWidth <= 860 ? 'none' : 'block');
      }

      els.listingSlider.innerHTML = items.map(function(item){
        const team = detectTeamByListingNumber(item.listingNumber);
        const thumb = item.heroUrl ? "background-image:url('" + escapeAttr(item.heroUrl) + "')" : '';
        return ''
          + '<div class="listing-card" data-id="' + escapeAttr(item.id) + '">'
          + '  <div class="listing-thumb" style="' + thumb + '"></div>'
          + '  <div class="listing-body">'
          + '    <div class="listing-top">'
          + '      <div class="listing-team ' + team + '">' + teamLabel(team) + '</div>'
          + '      <div class="listing-no">' + escapeAttr(item.listingNumber) + '</div>'
          + '    </div>'
          + '    <div class="listing-title">' + escapeAttr(item.title) + '</div>'
          + '    <div class="listing-address">' + escapeAttr(item.address || '주소 정보 없음') + '</div>'
          + '    <div class="listing-price">' + escapeAttr(formatDealPrice(item)) + '</div>'
          + '  </div>'
          + '</div>';
      }).join('');

      els.listingSlider.onclick = function(e){
        const card = e.target.closest('.listing-card');
        const id = card ? card.getAttribute('data-id') : '';
        if(!id) return;
        const found = items.find(function(v){ return String(v.id) === String(id); });
        if(found){
          selectListing(found);
        }
      };

      if(bindSliderBar._update && window.innerWidth > 860){
        bindSliderBar._update();
      }
    }

    function selectListing(item){
      selectedListing = item;
      lookupPicked = null;
      lastLookupResult = null;
      assets = buildPhotoAssets(item.photoUrlsJson);
      if(assets[0]) assets[0].isHero = true;

      Array.prototype.forEach.call(els.listingSlider.querySelectorAll('.listing-card'), function(card){
        card.classList.toggle('is-active', card.getAttribute('data-id') === String(item.id));
      });

      els.selectedSummary.classList.add('show');
      els.selectedListingTitle.textContent = item.title || '선택된 매물';
      els.selectedListingSub.textContent = [item.listingNumber || '-', item.address || '-', formatDealPrice(item)].join(' · ');
      renderAssets();
    }

    function buildPhotoAssets(photoUrlsJson){
      const list = safeJsonParse(photoUrlsJson || '[]', []) || [];
      return (Array.isArray(list) ? list : []).map(function(row, idx){
        return {
          assetId: 'photo_' + idx,
          previewUrl: typeof row === 'string' ? row : text(row && (row.heroUrl || row.url || row.lightUrl || row.thumbUrl)),
          selected: true,
          paragraph: 'p1',
          isHero: false,
          source: row
        };
      });
    }

    function paragraphOptionsHtml(current){
      let html = '';
      for(let i=1;i<=9;i++){
        const value = 'p' + i;
        html += '<option value="' + value + '"' + (current === value ? ' selected' : '') + '>' + i + '단락</option>';
      }
      return html;
    }

    function renderAssets(){
      if(!selectedListing){
        els.assetsSection.classList.remove('show');
        syncBottomButtons();
        return;
      }

      els.assetsSection.classList.add('show');
      els.assetGrid.innerHTML = assets.map(function(item){
        const preview = item.previewUrl ? "background-image:url('" + escapeAttr(item.previewUrl) + "')" : '';
        return ''
          + '<div class="asset-card' + (item.isHero ? ' is-hero' : '') + (item.selected ? ' is-selected' : '') + '" data-asset-id="' + escapeAttr(item.assetId) + '">'
          + '  <div class="asset-preview" style="' + preview + '">'
          + '    <button type="button" class="asset-hero">대표</button>'
          + '    <button type="button" class="asset-check">' + (item.selected ? '✓' : '') + '</button>'
          + '  </div>'
          + '  <div class="asset-body">'
          + '    <select class="select asset-paragraph-select">'
          + paragraphOptionsHtml(item.paragraph)
          + '    </select>'
          + '  </div>'
          + '</div>';
      }).join('');

      Array.prototype.forEach.call(els.assetGrid.querySelectorAll('.asset-card'), function(card){
        const assetId = card.getAttribute('data-asset-id');
        const item = assets.find(function(v){ return v.assetId === assetId; });
        if(!item) return;

        const paraSelect = card.querySelector('.asset-paragraph-select');
        const checkBtn = card.querySelector('.asset-check');
        const heroBtn = card.querySelector('.asset-hero');

        paraSelect.addEventListener('change', function(){
          item.paragraph = paraSelect.value;
        });
        checkBtn.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          item.selected = !item.selected;
          renderAssets();
        });
        heroBtn.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          assets.forEach(function(v){ v.isHero = false; });
          item.isHero = true;
          renderAssets();
        });
      });

      renderAssetMeta();
      syncBottomButtons();
    }

    function renderAssetMeta(){
      const selectedCount = assets.filter(function(v){ return !!v.selected; }).length;
      const hero = assets.find(function(v){ return !!v.isHero; });
      els.selectedCountChip.textContent = '선택 ' + selectedCount;
      els.heroCountChip.textContent = hero ? '대표 지정됨' : '대표 미지정';
    }

    function syncBottomButtons(){
      const hasListing = !!selectedListing;
      const selectedCount = assets.filter(function(v){ return !!v.selected; }).length;
      const hasHero = assets.some(function(v){ return !!v.isHero; });
      els.draftSaveBtn.disabled = !hasListing;
      els.publishPrepBtn.disabled = !(hasListing && selectedCount > 0 && hasHero);
    }

    function renderDateMetaLine(){
      const key = selectedDate;
      const counts = key ? (calendarOverviewMap[key] || { shoppingCount:0, factoryCount:0 }) : null;
      els.datePickerBtn.textContent = key ? formatDateLabel(key) : '날짜 선택';
      els.dateMetaLine.textContent = key
        ? (formatDateLabel(key) + ' · 상가 ' + (counts.shoppingCount || 0) + ' · 공장 ' + (counts.factoryCount || 0))
        : '날짜를 선택하거나 검색하세요.';
    }

    function renderCalendarGrid(){
      els.calendarMonthLabel.textContent = formatMonthLabel(calendarCurrentMonth);
      const parts = String(calendarCurrentMonth || '').split('-');
      const year = Number(parts[0] || 0);
      const monthIndex = Number(parts[1] || 1) - 1;
      const first = new Date(year, monthIndex, 1);
      const start = new Date(first);
      const mondayOffset = (first.getDay() + 6) % 7;
      start.setDate(first.getDate() - mondayOffset);

      let html = '';
      for(let i=0;i<42;i++){
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        const dateKey = formatDateKeyFromTs(date.getTime());
        const isSelected = dateKey === selectedDate;
        const counts = calendarOverviewMap[dateKey] || { shoppingCount:0, factoryCount:0, threadCount:0 };
        html += ''
          + '<button type="button" class="calendar-cell' + (isSelected ? ' is-selected' : '') + '" data-date-key="' + dateKey + '">'
          + '  <div class="calendar-day-number">' + date.getDate() + '</div>'
          + '  <div class="calendar-lines">'
          + '    <div class="calendar-line' + ((counts.shoppingCount || 0) ? '' : ' zero') + '">상가 ' + (counts.shoppingCount || 0) + '</div>'
          + '    <div class="calendar-line' + ((counts.factoryCount || 0) ? '' : ' zero') + '">공장 ' + (counts.factoryCount || 0) + '</div>'
          + '  </div>'
          + '</button>';
      }
      els.calendarGrid.innerHTML = html;

      Array.prototype.forEach.call(els.calendarGrid.querySelectorAll('.calendar-cell'), function(cell){
        cell.addEventListener('click', function(){
          selectedDate = cell.getAttribute('data-date-key');
          renderDateMetaLine();
          applyFiltersAndRenderListings();
          closeCalendarModal();
        });
      });
    }

    function moveCalendarMonth(offset){
      const parts = String(calendarCurrentMonth || firstDayOfMonthKey()).split('-');
      const d = new Date(Number(parts[0]), Number(parts[1]) - 1 + offset, 1);
      calendarCurrentMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      fetchCalendarOverviewOnly();
    }

    function fetchCalendarOverviewOnly(){
      setLoading(true, '달력 불러오는 중');
      fetchPostJson({ action:'getCalendarOverview', month: calendarCurrentMonth })
        .then(function(calendarData){
          calendarOverviewMap = {};
          (Array.isArray(calendarData && calendarData.days) ? calendarData.days : []).forEach(function(day){
            const dateKey = text(day && day.dateKey);
            calendarOverviewMap[dateKey] = {
              shoppingCount: Number(day && day.shoppingCount || 0),
              factoryCount: Number(day && day.factoryCount || 0),
              threadCount: Number(day && day.threadCount || 0)
            };
          });
          renderCalendarGrid();
          renderDateMetaLine();
        })
        .catch(function(err){
          console.error(err);
          showToast((err && err.message) || '달력 불러오기 실패');
        })
        .finally(function(){
          setLoading(false);
        });
    }

    function openCalendarModal(){
      els.calendarModal.classList.add('show');
      renderCalendarGrid();
    }
    function closeCalendarModal(){
      els.calendarModal.classList.remove('show');
    }

    function buildLookupPickedFromPostcode_(data){
      data = data || {};
      return {
        jibunAddress: data.jibunAddress || data.autoJibunAddress || '',
        roadAddress: data.roadAddress || data.autoRoadAddress || '',
        lookupAddress: (data.jibunAddress || data.autoJibunAddress || data.roadAddress || data.autoRoadAddress || ''),
        bcode: data.bcode || '',
        sido: data.sido || '',
        sigungu: data.sigungu || '',
        bname: data.bname || '',
        buildingName: data.buildingName || '',
        zonecode: data.zonecode || '',
        apartment: data.apartment || '',
        autoJibunAddress: data.autoJibunAddress || '',
        autoRoadAddress: data.autoRoadAddress || '',
        addressType: data.addressType || data.userSelectedType || ''
      };
    }

    function openAddressSearch(initialQuery){
      try{
        new daum.Postcode({
          autoClose: true,
          oncomplete:function(data){
            lookupPicked = buildLookupPickedFromPostcode_(data);
            if(lookupAddressSearchWaiter){
              var waiter = lookupAddressSearchWaiter;
              lookupAddressSearchWaiter = null;
              lookup().then(waiter.resolve).catch(waiter.reject);
            }
          },
          onclose:function(state){

    function infoFirstNonEmpty(){
      for(var i=0;i<arguments.length;i++){
        var v = arguments[i];
        if(v == null) continue;
        v = String(v).trim();
        if(v) return v;
      }
      return '';
    }
    function infoNumberText(n){
      if(!isFinite(n)) return '';
      if(Math.abs(n - Math.round(n)) < 1e-9) return String(Math.round(n));
      return (Math.round(n*100)/100).toString();
    }
    function infoFormatDate(v){
      v = String(v == null ? '' : v).replace(/\D/g,'');
      if(v.length !== 8) return String(v || '').trim();
      return v.slice(0,4)+'.'+v.slice(4,6)+'.'+v.slice(6,8);
    }
    function infoFormatArea(v){
      if(v == null || v === '') return '-';
      var n = Number(v);
      if(!isFinite(n) || n <= 0) return '-';
      var py = n / 3.305785;
      return infoNumberText(n) + '㎡ / ' + infoNumberText(py) + '평';
    }
    function infoFormatPercent(v){
      if(v == null || v === '') return '-';
      var n = Number(v);
      if(!isFinite(n)) return String(v).trim() || '-';
      return infoNumberText(n) + '%';
    }
    function infoFormatHeight(v){
      if(v == null || v === '') return '-';
      var n = Number(v);
      if(!isFinite(n) || n === 0) return '-';
      return infoNumberText(n) + 'm';
    }
    function infoUniqueNonEmpty(arr){
      var out = [];
      (arr || []).forEach(function(v){
        v = String(v == null ? '' : v).trim();
        if(v && out.indexOf(v) === -1) out.push(v);
      });
      return out;
    }
    function infoFindPositive(items, key){
      var best = null;
      (items || []).forEach(function(it){
        var n = Number(it && it[key]);
        if(isFinite(n) && n > 0 && (best == null || n > best)) best = n;
      });
      return best;
    }
    function infoBuildFloorText(v){
      var g = infoFirstNonEmpty(v && v.grndFlrCnt);
      var u = infoFirstNonEmpty(v && v.ugrndFlrCnt);
      if(!g && !u) return '-';
      return '지상 ' + (g || '0') + '층 / 지하 ' + (u || '0') + '층';
    }
    function infoBuildingSortKey(name){
      var m = String(name || '').match(/(\d+)/);
      return m ? parseInt(m[1],10) : 9999;
    }
    function infoFloorSortKey(name){
      var s = String(name || '').trim();
      var m = s.match(/-?\d+/);
      if(!m) return 9999;
      return parseInt(m[0],10);
    }
    function infoJoinAreaPurpose(area, purpose, struct){
      var parts = [];
      if(area && area !== '-') parts.push(area);
      if(purpose && purpose !== '-') parts.push(purpose);
      if(struct && struct !== '-') parts.push(struct);
      return parts.length ? parts.join(' / ') : '-';
    }
    function infoGetBuildingArchArea(buildingSource, flrItemsForBuilding){
      var direct = Number(buildingSource && buildingSource.archArea);
      if(isFinite(direct) && direct > 0) return direct;
      var firstFloorArea = null;
      (flrItemsForBuilding || []).forEach(function(f){
        var floorName = String(f.flrNoNm || '').trim();
        var floorGb = String(f.flrGbCdNm || '').trim();
        var floorNo = String(f.flrNo == null ? '' : f.flrNo).trim();
        var area = Number(f && f.area);
        if(!isFinite(area) || area <= 0) return;
        var isFirstFloor = floorName === '1층' || (floorGb === '지상' && floorNo === '1');
        if(isFirstFloor) firstFloorArea = area;
      });
      return firstFloorArea;
    }
    function extractLookupImageRows(data){
      var apis = (data && data.apis) || {};
      var titleItems = ((apis.title || {}).items || []).slice();
      var recapItems = ((apis.recap || {}).items || []).slice();
      var basisItems = ((apis.basis || {}).items || []).slice();
      var jijiguItems = ((apis.jijigu || {}).items || []).slice();
      var flrItems = ((apis.flr || {}).items || []).slice();
      var titleFirst = ((apis.title || {}).firstItem || {});
      var recapFirst = ((apis.recap || {}).firstItem || {});

      var zoningParts = infoUniqueNonEmpty(
        basisItems.map(function(it){ return it.jiyukCdNm; })
          .concat(basisItems.map(function(it){ return it.jiguCdNm; }))
          .concat(basisItems.map(function(it){ return it.guyukCdNm; }))
          .concat(jijiguItems.map(function(it){ return it.jiyukCdNm; }))
          .concat(jijiguItems.map(function(it){ return it.jiguCdNm; }))
          .concat(jijiguItems.map(function(it){ return it.guyukCdNm; }))
          .concat(jijiguItems.map(function(it){ return it.jijigu; }))
      ).join(' / ');

      var landArea = Number(recapFirst.platArea);
      if(!isFinite(landArea) || landArea <= 0) landArea = infoFindPositive(recapItems, 'platArea');
      if(!isFinite(landArea) || landArea <= 0) landArea = infoFindPositive(titleItems, 'platArea');

      var archArea = Number(recapFirst.archArea);
      if(!isFinite(archArea) || archArea <= 0) archArea = infoFindPositive(recapItems, 'archArea');
      if(!isFinite(archArea) || archArea <= 0) {
        archArea = titleItems.reduce(function(sum, it){
          var n = Number(it.archArea);
          return sum + (isFinite(n) && n > 0 ? n : 0);

      var totArea = Number(recapFirst.totArea);
      if(!isFinite(totArea) || totArea <= 0) totArea = infoFindPositive(recapItems, 'totArea');
      if(!isFinite(totArea) || totArea <= 0) {
        totArea = titleItems.reduce(function(sum, it){
          var n = Number(it.totArea);
          return sum + (isFinite(n) && n > 0 ? n : 0);
        }, 0);
      }

      var mainCnt = titleItems.filter(function(it){ return String(it.mainAtchGbCd || '').trim() === '0'; }).length;
      var atchCnt = titleItems.filter(function(it){ return String(it.mainAtchGbCd || '').trim() && String(it.mainAtchGbCd || '').trim() !== '0'; }).length;
      if(!mainCnt && recapFirst.mainBldCnt) mainCnt = Number(recapFirst.mainBldCnt) || 0;
      if(!atchCnt && recapFirst.atchBldCnt) atchCnt = Number(recapFirst.atchBldCnt) || 0;
      var totalCnt = titleItems.length || (mainCnt + atchCnt);
      var compText = '-';
      if(totalCnt){
        compText = '총 ' + totalCnt + '동';
        if(mainCnt || atchCnt) compText += ' (주건축물 ' + (mainCnt || 0) + '동, 부속건축물 ' + (atchCnt || 0) + '동)';
      }

      var summaryRows = [
        ['주소', infoFirstNonEmpty(data && data.normalized && data.normalized.jibunAddress, data && data.address, titleFirst.platPlc, recapFirst.platPlc, '-')],
        ['도로명주소', infoFirstNonEmpty(data && data.normalized && data.normalized.roadAddress, titleFirst.newPlatPlc, recapFirst.newPlatPlc, '-')],
        ['건축물구성', compText],
        ['건물용도', infoFirstNonEmpty(recapFirst.mainPurpsCdNm, titleFirst.mainPurpsCdNm, recapFirst.etcPurps, titleFirst.etcPurps, '-')],
        ['용도지역', zoningParts || '-'],
        ['사용승인일', infoFormatDate(infoFirstNonEmpty(recapFirst.useAprDay, titleFirst.useAprDay)) || '-'],
        ['대지면적', infoFormatArea(landArea)],
        ['건축면적', infoFormatArea(archArea)],
        ['연면적', infoFormatArea(totArea)],
        ['건폐율', infoFormatPercent(infoFirstNonEmpty(recapFirst.bcRat, titleFirst.bcRat))],
        ['용적률', infoFormatPercent(infoFirstNonEmpty(recapFirst.vlRat, titleFirst.vlRat))],
        ['주차대수', (function(){
          var n = Number(infoFirstNonEmpty(recapFirst.totPkngCnt, ''));
          return (isFinite(n) && n > 0) ? (String(Math.round(n)) + '대') : '-';
        })()]
      ];

      var basisByPk = {};
      basisItems.forEach(function(it){
        var pk = String(it.mgmBldrgstPk || '').trim();
        if(!pk) return;
        if(!basisByPk[pk]) basisByPk[pk] = [];
        basisByPk[pk].push(it);
      });

      var floorsByDong = {};
      flrItems.forEach(function(it){
        var dk = String(it.dongNm || '').trim();
        if(!dk) return;
        if(!floorsByDong[dk]) floorsByDong[dk] = [];
        floorsByDong[dk].push(it);
      });

      var buildings = titleItems.slice().sort(function(a,b){
        return infoBuildingSortKey(a.dongNm) - infoBuildingSortKey(b.dongNm);
      }).map(function(it){
        var floorList = (floorsByDong[String(it.dongNm || '').trim()] || []).slice().sort(function(a,b){
          return infoFloorSortKey(a.flrNoNm || a.flrGbCdNm) - infoFloorSortKey(b.flrNoNm || b.flrGbCdNm);
        });
        var isMainBuilding = String(it.mainAtchGbCd || '').trim() === '0';
        var isResidentialApartmentDong = isMainBuilding && /공동주택|아파트/.test(
          infoFirstNonEmpty(it.mainPurpsCdNm, '') + ' ' + infoFirstNonEmpty(it.etcPurps, '')
        ) && /(\d+동)$/.test(infoFirstNonEmpty(it.dongNm, ''));
        var floorSummary = isResidentialApartmentDong
          ? '-'
          : (floorList.length ? floorList.map(function(f){
              var fname = infoFirstNonEmpty(f.flrNoNm, f.flrGbCdNm, '층정보');

      function hasMeaningfulRows(rows){

          return v && v !== '-' && v !== '--';
        });
      }

      return {
        summaryRows: hasMeaningfulRows(summaryRows) ? summaryRows : [],
        buildings: buildings.filter(function(b){ return hasMeaningfulRows(b.rows); })
      };
    }

    function drawInfoRowsToBlob(title, rows){
      return new Promise(function(resolve, reject){
        try{
          function splitLines(ctx, text, maxWidth){
            var raw = String(text == null ? '' : text).split('\n');
            var lines = [];
            raw.forEach(function(block){
              var words = block.split(' ');
              var line = '';
              for(var i=0;i<words.length;i++){
                var test = line ? (line + ' ' + words[i]) : words[i];
                if(ctx.measureText(test).width <= maxWidth){
                  line = test;
                }else{
                  if(line) lines.push(line);
                  line = words[i];
                  while(ctx.measureText(line).width > maxWidth && line.length > 1){
                    var cut = line.length - 1;
                    while(cut > 1 && ctx.measureText(line.slice(0, cut)).width > maxWidth) cut--;
                    lines.push(line.slice(0, cut));
                    line = line.slice(cut);
                  }
                }
              }
              lines.push(line || '');
            });
            return lines.length ? lines : [''];
          }
          function roundRect(ctx, x, y, w, h, r){
            var radius = Math.min(r, w/2, h/2);
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.arcTo(x + w, y, x + w, y + h, radius);
            ctx.arcTo(x + w, y + h, x, y + h, radius);
            ctx.arcTo(x, y + h, x, y, radius);
            ctx.arcTo(x, y, x + w, y, radius);
            ctx.closePath();
          }

          var safeRows = (rows || []).map(function(row){ return [row[0], row[1]]; });
          var dpr = 2;
          var paddingLeft = 20, paddingRight = 12, paddingTop = 20, paddingBottom = 18, titleH = 58, labelW = 132;
          var probe = document.createElement('canvas');
          var pctx = probe.getContext('2d');

          pctx.font = '900 17px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif';
          safeRows.forEach(function(row){
            labelW = Math.max(labelW, Math.ceil(pctx.measureText(String(row[0] || '')).width) + 26);
          });

          pctx.font = '900 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif';
          var valueW = 220;
          safeRows.forEach(function(row){
            String(row[1] == null ? '' : row[1]).split('\n').forEach(function(line){
              valueW = Math.max(valueW, Math.ceil(pctx.measureText(line).width) + 34);
            });
          });
          valueW = Math.min(valueW, 540);

          var rowHeights = [];
          safeRows.forEach(function(row){
            var lines = splitLines(pctx, row[1], valueW - 24);
            rowHeights.push(Math.max(52, 18 + Math.max(1, lines.length) * 24));
          });

          var tableW = labelW + valueW;
          var fullW = paddingLeft + tableW + paddingRight;
          var fullH = paddingTop + titleH + rowHeights.reduce(function(a,b){ return a+b; }, 0) + paddingBottom;

          var canvas = document.createElement('canvas');
          canvas.width = Math.ceil(fullW * dpr);
          canvas.height = Math.ceil(fullH * dpr);
          var ctx = canvas.getContext('2d');
          ctx.scale(dpr, dpr);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, fullW, fullH);

          ctx.strokeStyle = '#dfe7f3';
          ctx.lineWidth = 1;
          roundRect(ctx, 0.5, 0.5, fullW - 1, fullH - 1, 14);
          ctx.stroke();

          ctx.fillStyle = '#f8fbff';
          roundRect(ctx, 0.5, 0.5, fullW - 1, titleH + 10, 14);
          ctx.fillRect(1, titleH, fullW - 2, 10);
          ctx.fill();

          ctx.fillStyle = '#111827';
          ctx.font = '900 24px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif';
          ctx.textBaseline = 'middle';
          ctx.fillText(title || '부동산 기본정보', paddingLeft, paddingTop + titleH / 2 - 2);

          var startY = paddingTop + titleH;
          var xLabel = paddingLeft;
          var xValue = paddingLeft + labelW;

          for(var i=0;i<safeRows.length;i++){
            var row = safeRows[i];
            var rh = rowHeights[i];
            var y = startY;
            ctx.fillStyle = '#f8fbff';
            ctx.fillRect(xLabel, y, labelW, rh);

            ctx.strokeStyle = '#e7edf5';
            ctx.beginPath(); ctx.moveTo(xLabel, y); ctx.lineTo(xLabel + tableW, y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(xValue, y); ctx.lineTo(xValue, y + rh); ctx.stroke();

            ctx.fillStyle = '#344054';
            ctx.font = '900 17px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif';
            ctx.textBaseline = 'middle';
            ctx.fillText(String(row[0] || ''), xLabel + 14, y + rh / 2);

            ctx.fillStyle = '#111827';
            ctx.font = '900 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif';
            ctx.textBaseline = 'top';
            var lines = splitLines(ctx, row[1], valueW - 24);
            var textY = y + 14;
            lines.forEach(function(line){
              ctx.fillText(String(line || ''), xValue + 14, textY);
              textY += 24;
            });
            startY += rh;
          }

          ctx.beginPath();
          ctx.moveTo(xLabel, startY);
          ctx.lineTo(xLabel + tableW, startY);
          ctx.strokeStyle = '#e7edf5';
          ctx.stroke();

          canvas.toBlob(function(blob){
            if(!blob) reject(new Error('이미지 생성 실패'));
            else resolve(blob);
          }, 'image/png');
        } catch (err){
          reject(err);
        }
      });
    }

      defs = defs.concat((extracted.buildings || []).map(function(b){ return { title: b.title, rows: b.rows }; }));

      var out = [];

        var blob = await drawInfoRowsToBlob(defs[i].title, defs[i].rows);
        var url = URL.createObjectURL(blob);
        out.push({
          title: defs[i].title,
          url: url,
          blob: blob
        });
      }
      return out;
    }

    function jsonpLookupCall(params){
      return new Promise(function(resolve, reject){
        var cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*1000);
        var script = document.createElement('script');
        var done = false;
        var timer = null;

        function cleanup(){
          try{ delete window[cb]; }catch(e){}
          if(timer) clearTimeout(timer);
          if(script.parentNode) script.parentNode.removeChild(script);
        }

        window[cb] = function(payload){
          if(done) return;
          done = true;
          cleanup();
          resolve(payload);
        };

        script.onerror = function(){
          if(done) return;
          done = true;
          cleanup();
          reject(new Error('JSONP 요청 실패'));
        };

        params = params || {};
        params.callback = cb;
        params._ts = Date.now();

        var q = new URLSearchParams();
        Object.keys(params).forEach(function(k){
          q.set(k, params[k] == null ? '' : String(params[k]));
        });

        script.src = CONFIG.adminListUrl + '?' + q.toString();
        document.body.appendChild(script);

        timer = setTimeout(function(){
          if(done) return;
          done = true;
          cleanup();
          reject(new Error('JSONP 타임아웃'));
        }, 15000);
      });
    }

      };

          openAddressSearch((selectedListing && selectedListing.address) || '');
        });
      }

      setLoading(true, '공적자료 조회 중');
      setStatus && setStatus('', '');

      var params = { action:'fetchPublicPropertyBySearchResult' };
      Object.keys(lookupPicked).forEach(function(k){ params[k] = lookupPicked[k]; });
      params.queryAddress = lookupPicked.lookupAddress || lookupPicked.jibunAddress || lookupPicked.autoJibunAddress || lookupPicked.roadAddress || '';
      params.queryAddressType = (lookupPicked.jibunAddress || lookupPicked.autoJibunAddress) ? 'JIBUN' : 'ROAD';

      return jsonpLookupCall(params).then(function(res){
        if(!(res && res.ok)){
          throw new Error('조회 실패 · 서버가 혼잡합니다. 다시 조회 버튼을 눌러주세요.');
        }
        lastLookupResult = res;
        return res;
      }).catch(function(err){
        throw err;
      }).finally(function(){
        setLoading(false);
      });
    }

    async function runLookupLikeOriginal_(){
      return lookup();
    }


async function generateInfoImages(){
      if(!selectedListing){
        showToast('먼저 매물 선택');
        return;
      }

      try{
        lastLookupResult = null;
        lookupPicked = null;
        await runLookupLikeOriginal_();

        setLoading(true, '주소 조회 후 이미지 생성 중');
        var built = await buildLookupGeneratedAssets(lastLookupResult);
        if(!built.length){
          showToast('자료가 없어 넣을 이미지가 없습니다');
          return;
        }

        var photoAssets = assets.filter(function(v){ return String(v.assetId).indexOf('info_') !== 0; });
        var infoAssets = built.map(function(img, idx){
          return {
            assetId:'info_' + idx,
            previewUrl:text(img && img.url),
            selected:true,
            paragraph:'p2',
            isHero:false,
            source:{
              title: img.title,
              url: img.url,
              kind:'generated_from_lookup'
            }
          };
        });

        assets = photoAssets.concat(infoAssets);
        renderAssets();
        showToast('정보 이미지 추가');
      }catch(err){
        console.error(err);
        if(err && err.message === '주소 선택 취소') return;
        showToast((err && err.message) || '조회 실패 · 다시 버튼을 눌러주세요');
      }finally{
        setLoading(false);
      }
    }

    function collectDraftPayload(){
      const hero = assets.find(function(v){ return !!v.isHero; });
      return {
        listingNumber: selectedListing ? selectedListing.listingNumber : '',
        title: selectedListing ? selectedListing.title : '',
        address: selectedListing ? selectedListing.address : '',
        heroAssetId: hero ? hero.assetId : '',
        selectedAssetIdsJson: JSON.stringify(assets.filter(function(v){ return !!v.selected; }).map(function(v){ return v.assetId; })),
        assetOrderJson: JSON.stringify(assets.map(function(v){ return v.assetId; })),
        assetParagraphMapJson: JSON.stringify(assets.reduce(function(acc, item){
          acc[item.assetId] = item.paragraph || 'p1';
          return acc;
        }, {})),
        assetTypeMapJson: JSON.stringify(assets.reduce(function(acc, item){
          acc[item.assetId] = String(item.assetId).indexOf('info_') === 0 ? 'info_image' : 'photo';
          return acc;
        }, {})),
        assetSourceMapJson: JSON.stringify(assets.reduce(function(acc, item){
          acc[item.assetId] = item.source || item.previewUrl || '';
          return acc;
        }, {})),
        selectedDate: selectedDate || '',
        searchKeyword: text(els.searchInput.value),
        status: 'draft'
      };
    }

    function saveDraft(){
      if(!selectedListing){
        showToast('먼저 매물 선택');
        return;
      }
      setLoading(true, '임시저장 중');
      fetchPostJson({
        action:'saveBlogDraft',
        payload: collectDraftPayload()
      })
      .then(function(data){
        if(!data || data.ok === false){
          throw new Error((data && data.message) || '임시저장 실패');
        }
        showToast('임시저장 완료');
      })
      .catch(function(err){
        console.error(err);
        showToast((err && err.message) || '임시저장 실패');
      })
      .finally(function(){
        setLoading(false);
      });
    }

    function goEditor(){
      if(els.publishPrepBtn.disabled) return;
      setLoading(true, '초안 저장 중');
      fetchPostJson({
        action:'saveBlogDraft',
        payload: collectDraftPayload()
      })
      .then(function(data){
        if(!data || data.ok === false){
          throw new Error((data && data.message) || '초안 저장 실패');
        }
        const blogId = text(data.blogId);
        if(!blogId){
          throw new Error('blogId 없음');
        }
        location.href = CONFIG.editorUrl + '?blogId=' + encodeURIComponent(blogId);
      })
      .catch(function(err){
        console.error(err);
        showToast((err && err.message) || '초안 저장 실패');
      })
      .finally(function(){
        setLoading(false);
      });
    }

    function goRelativeDate(offset){
      const base = selectedDate ? new Date(selectedDate + 'T00:00:00') : new Date();
      base.setDate(base.getDate() + offset);
      selectedDate = formatDateKeyFromTs(base.getTime());
      const nextMonth = getCurrentMonthKeyFromDate(selectedDate);
      if(nextMonth !== calendarCurrentMonth){
        calendarCurrentMonth = nextMonth;
        fetchCalendarOverviewOnly();
      }else{
        renderDateMetaLine();
        applyFiltersAndRenderListings();
      }
    }

    function bindSliderBar(){
      if(!els.listingSliderWrap || !els.listingSliderBarHit) return;
      function update(){
        const wrap = els.listingSliderWrap;
        const hit = els.listingSliderBarHit;
        const scrollWidth = wrap.scrollWidth || 0;
        const clientWidth = wrap.clientWidth || 0;
        const maxScroll = Math.max(0, scrollWidth - clientWidth);

        if(scrollWidth <= clientWidth + 2){
          hit.style.width = '100%';
          hit.style.transform = 'translateY(-50%) translateX(0)';
          return;
        }

        const thumbWidthPx = Math.max(36, (clientWidth / scrollWidth) * clientWidth);
        const maxTravelPx = Math.max(0, clientWidth - thumbWidthPx);
        const leftPx = maxScroll > 0 ? (wrap.scrollLeft / maxScroll) * maxTravelPx : 0;

        hit.style.width = thumbWidthPx + 'px';
        hit.style.transform = 'translateY(-50%) translateX(' + leftPx + 'px)';
      }
      els.listingSliderWrap.addEventListener('scroll', update, {passive:true});
      window.addEventListener('resize', update);
      bindSliderBar._update = update;
    }

    function bindSliderBarDrag(){
      const wrap = els.listingSliderWrap;
      const track = els.listingSliderTrack;
      const trackHit = els.listingSliderTrackHit;
      const thumb = els.listingSliderBarHit;
      if(!wrap || !track || !trackHit || !thumb) return;

      function maxScroll(){
        return Math.max(0, wrap.scrollWidth - wrap.clientWidth);
      }

      function syncFromClientX(clientX){
        const trackRect = track.getBoundingClientRect();
        const thumbWidth = thumb.offsetWidth || 0;
        const usable = Math.max(1, trackRect.width - thumbWidth);
        let left = clientX - trackRect.left - (thumbWidth / 2);
        left = Math.max(0, Math.min(usable, left));
        const ratio = usable > 0 ? (left / usable) : 0;
        wrap.scrollLeft = ratio * maxScroll();
        if(bindSliderBar._update) bindSliderBar._update();
      }

      let draggingTrack = false;
      function onTrackDown(e){
        if(window.innerWidth <= 860) return;
        if(e.pointerType === 'mouse' && e.button !== 0) return;
        draggingTrack = true;
        syncFromClientX(e.clientX);
        try{ trackHit.setPointerCapture(e.pointerId); }catch(err){}
        e.preventDefault();
        e.stopPropagation();
      }
      function onTrackMove(e){
        if(!draggingTrack) return;
        syncFromClientX(e.clientX);
        e.preventDefault();
        e.stopPropagation();
      }
      function onTrackUp(e){
        if(!draggingTrack) return;
        draggingTrack = false;
        try{ trackHit.releasePointerCapture(e.pointerId); }catch(err){}
        e.preventDefault();
        e.stopPropagation();
      }

      trackHit.addEventListener('pointerdown', onTrackDown);
      trackHit.addEventListener('pointermove', onTrackMove);
      trackHit.addEventListener('pointerup', onTrackUp);
      trackHit.addEventListener('pointercancel', onTrackUp);
      trackHit.addEventListener('lostpointercapture', onTrackUp);

      let draggingThumb = false;
      function onThumbDown(e){
        if(window.innerWidth <= 860) return;
        if(e.pointerType === 'mouse' && e.button !== 0) return;
        draggingThumb = true;
        thumb.style.cursor = 'grabbing';
        try{ thumb.setPointerCapture(e.pointerId); }catch(err){}
        e.preventDefault();
        e.stopPropagation();
      }
      function onThumbMove(e){
        if(!draggingThumb) return;
        syncFromClientX(e.clientX);
        e.preventDefault();
        e.stopPropagation();
      }
      function onThumbUp(e){
        if(!draggingThumb) return;
        draggingThumb = false;
        thumb.style.cursor = 'grab';
        try{ thumb.releasePointerCapture(e.pointerId); }catch(err){}
        e.preventDefault();
        e.stopPropagation();
      }

      thumb.addEventListener('pointerdown', onThumbDown);
      thumb.addEventListener('pointermove', onThumbMove);
      thumb.addEventListener('pointerup', onThumbUp);
      thumb.addEventListener('pointercancel', onThumbUp);
      thumb.addEventListener('lostpointercapture', onThumbUp);
    }

    function bindEvents(){
      els.goStatusBtn.addEventListener('click', function(){
        location.href = CONFIG.statusUrl;
      });
      els.prevDateBtn.addEventListener('click', function(){ goRelativeDate(-1); });
      els.nextDateBtn.addEventListener('click', function(){ goRelativeDate(1); });
      els.datePickerBtn.addEventListener('click', openCalendarModal);
      els.calendarBackBtn.addEventListener('click', closeCalendarModal);
      els.calendarModal.addEventListener('click', function(e){
        if(e.target === els.calendarModal) closeCalendarModal();
      });
      els.calendarPrevBtn.addEventListener('click', function(){ moveCalendarMonth(-1); });
      els.calendarNextBtn.addEventListener('click', function(){ moveCalendarMonth(1); });
      els.searchInput.addEventListener('input', function(){
        clearTimeout(searchTimer);
        searchTimer = setTimeout(applyFiltersAndRenderListings, 220);
      });
      els.generateInfoImageBtn.addEventListener('click', generateInfoImages);
      els.draftSaveBtn.addEventListener('click', saveDraft);
      els.publishPrepBtn.addEventListener('click', goEditor);
    }

    bindEvents();
    bindSliderBar();
    bindSliderBarDrag();
    selectedDate = formatDateKeyFromTs(Date.now());
    calendarCurrentMonth = firstDayOfMonthKey(selectedDate);
    renderDateMetaLine();
    fetchAdminItems();
  </script>
</body>
</html>
