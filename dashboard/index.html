<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maslow Korea</title>
  <style>
    :root{
      --bg:#ffffff;
      --line:#e6ebf1;
      --text:#111318;
      --muted:#67707b;
      --blue:#0f7cff;
      --shadow:0 14px 30px rgba(15,23,42,.05);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:#fff;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif !important;
      letter-spacing:-0.02em;
    }
    a{text-decoration:none;color:inherit}
    button,input{font:inherit}
    button{border:none;background:none;cursor:pointer}
    img{display:block;max-width:100%}

    .page{min-height:100vh;background:linear-gradient(180deg,#ffffff 0%,#f9fbff 100%)}
    .shell{width:100%;max-width:980px;margin:0 auto;padding:0 20px 48px}

    .topbar{
      position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;
      min-height:76px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(230,235,241,.9)
    }
    .topbar-left{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      width:auto;
      min-width:120px;
      flex:0 0 auto;
    }
    .topbar-right{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      flex:1 1 auto;
      min-width:0;
    }
    .topbar-greeting{
      display:inline-flex;
      align-items:center;
      min-height:44px;
      padding:0 4px;
      font-size:15px;
      font-weight:800;
      color:#5f6873;
      letter-spacing:-0.03em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }
    .brand-link{display:inline-flex;align-items:center;min-height:44px;padding:0 4px;font-size:18px;font-weight:900;color:#111}

    .hero-spacer{height:18px}
    .panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:12px 0 18px}
    .panel-card{
      position:relative;display:flex;flex-direction:column;justify-content:space-between;
      min-height:132px;padding:22px 22px 20px;border:1px solid var(--line);border-radius:28px;
      background:#fff;box-shadow:var(--shadow);text-align:left;transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease
    }
    .panel-card:hover{transform:translateY(-2px);box-shadow:0 18px 34px rgba(15,23,42,.08)}
    .panel-card.primary{background:linear-gradient(180deg,#f7fbff 0%,#eef6ff 100%);border-color:#cfe2ff}
    .panel-eyebrow{font-size:12px;font-weight:900;color:#7d8792;letter-spacing:.08em;text-transform:uppercase}
    .panel-title{margin-top:10px;font-size:30px;line-height:1.08;font-weight:900;color:#111318;letter-spacing:-0.05em}
    .panel-desc{margin-top:10px;font-size:14px;line-height:1.65;color:#66707a;font-weight:700}

    .panel-icon-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:2px;
    }
    .panel-icon{
      width:28px;
      height:28px;
      color:#6e7883;
      flex:0 0 28px;
    }

    .search-wrap{margin:0 0 14px}
    .search-box{
      display:flex;
      align-items:center;
      gap:12px;
      width:min(230px,100%);
      min-height:60px;
      padding:0 18px;
      border:1.5px solid #d9e4ef;
      border-radius:999px;
      background:#fff;
      box-shadow:0 8px 20px rgba(15,23,42,.03);
      transition:width .24s ease, box-shadow .24s ease, border-color .24s ease;
    }
    .search-box:focus-within{
      width:min(100%, 720px);
      border-color:#bfdcff;
      box-shadow:0 12px 24px rgba(15,124,255,.08)
    }
    .search-icon{flex:0 0 auto;font-size:18px;color:#7b8794;width:auto}
    .search-input{
      flex:1 1 auto;
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      color:#111318;
      font-size:17px;
      font-weight:800;
      letter-spacing:-0.03em
    }
    .search-input::placeholder{color:rgba(123,135,148,.55);font-weight:600}

    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:0 0 18px}
    .chip-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .filter-chip{
      min-height:36px;padding:0 14px;border-radius:999px;border:1px solid #dbe5ee;background:#fff;
      color:#5d6670;font-size:14px;font-weight:900;letter-spacing:-0.02em;transition:.18s ease
    }
    .filter-chip.active{background:#0f7cff;border-color:#0f7cff;color:#fff;box-shadow:0 10px 20px rgba(15,124,255,.16)}
    .toolbar-meta{font-size:13px;color:#7b8794;font-weight:800;letter-spacing:-0.02em}

    .group{margin:0 0 26px}
    .group-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 12px;padding:0 2px}
    .group-title{font-size:22px;line-height:1.2;font-weight:900;color:#202227;letter-spacing:-0.04em}
    .group-count{font-size:13px;color:#7b8794;font-weight:900}

    .card-list{display:grid;grid-template-columns:1fr;gap:12px}
    .property-card{border:1px solid var(--line);border-radius:24px;background:#fff;box-shadow:var(--shadow);overflow:hidden}
    .property-main{
      display:grid;grid-template-columns:112px 1fr;gap:14px;padding:14px;align-items:start;cursor:pointer
    }
    .thumb{width:112px;height:112px;border-radius:18px;background:#edf2f7 center/cover no-repeat;overflow:hidden;flex:0 0 112px}
    .card-content{min-width:0;display:grid;gap:8px}
    .title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .card-title{
      margin:0;font-size:24px;line-height:1.16;font-weight:900;color:#17191d;letter-spacing:-0.05em;word-break:keep-all
    }
    .status-chip{
      flex:0 0 auto;min-height:24px;padding:0 8px;border-radius:999px;font-size:11px;font-weight:900;
      display:inline-flex;align-items:center;justify-content:center;white-space:nowrap
    }
    .status-chip.visible{background:#eef5ff;color:#0f7cff;border:1px solid #cfe2ff}
    .status-chip.hidden{background:#f3f5f8;color:#7f8792;border:1px solid #dde3ea}
    .card-address{font-size:15px;line-height:1.55;color:#505862;font-weight:700;word-break:keep-all}
    .card-deal-price{
      font-size:15px;
      line-height:1.5;
      font-weight:900;
      color:#ff3c3c;
      letter-spacing:-0.03em;
      word-break:keep-all;
    }
    .card-meta{font-size:13px;line-height:1.5;color:#7b8794;font-weight:800;letter-spacing:-0.02em}
    .card-meta strong{color:#4f5863;font-weight:900}

    .card-bottom{border-top:1px solid #eef2f6;padding:10px 14px 12px;display:grid;gap:10px}
    .action-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .action-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .mini-btn{
      min-height:34px;padding:0 12px;border-radius:999px;border:1px solid #dce6f1;background:#fff;
      color:#111318;font-size:13px;font-weight:900;letter-spacing:-0.02em
    }
    .mini-btn.blue{border-color:#cfe2ff;background:#eef5ff;color:#0f7cff}
    .mini-btn.gray{border-color:#dde3ea;background:#f4f6f8;color:#6e7782}

    .channel-row{
      display:grid;
      grid-template-columns:repeat(9, 56px);
      justify-content:flex-start;
      gap:8px;
    }
    .channel-icon{
      position:relative;
      aspect-ratio:1 / 1;
      width:56px;
      min-width:56px;
      max-width:56px;
      min-height:56px;
      max-height:56px;
      height:56px;
      margin:0;
      border-radius:14px;
      border:1px solid #e4eaf1;
      background:#fafcff;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      overflow:hidden;
      flex:0 0 56px;
    }
    .channel-favicon{
      position:absolute;
      left:50%;
      top:50%;
      width:90%;
      height:90%;
      transform:translate(-50%, -50%);
      object-fit:cover;
      border-radius:4px;
      flex:none
    }
    .site-chip{
      position:relative;
      aspect-ratio:1 / 1;
      width:56px;
      min-width:56px;
      max-width:56px;
      min-height:56px;
      max-height:56px;
      height:56px;
      border-radius:14px;
      border:1px solid #e4eaf1;
      background:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0;
      overflow:hidden;
      flex:0 0 56px
    }
    .site-favicon{
      position:absolute;
      left:50%;
      top:50%;
      width:90%;
      height:90%;
      transform:translate(-50%, -50%);
      object-fit:cover;
      border-radius:4px;
      flex:none
    }
    .empty{border:1px dashed #d9e3ed;border-radius:24px;background:#fff;padding:30px 18px;text-align:center;color:#7b8794;font-size:15px;font-weight:800}

    .loading-overlay{
      position:fixed;
      inset:0;
      z-index:12050;
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(3px);
      -webkit-backdrop-filter:blur(3px);
    }
    .loading-overlay.show{display:flex}
    .loading-panel{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-align:center;
    }
    .loading-buddy{
      width:74px;
      height:74px;
      object-fit:cover;
      border-radius:18px;
      animation:buddyBounce 1.15s ease-in-out infinite;
      box-shadow:0 10px 22px rgba(15,124,255,.16);
    }
    .loading-text{
      min-height:24px;
      font-size:18px;
      font-weight:800;
      line-height:1.4;
      color:#2b8fe8;
      letter-spacing:-0.03em;
    }
    @keyframes buddyBounce{
      0%,100%{transform:translateY(0) scale(1)}
      20%{transform:translateY(-3px) scale(1.01)}
      50%{transform:translateY(-10px) scale(1.04)}
      75%{transform:translateY(-4px) scale(1.01)}
    }

    .lock-overlay{
      position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;
      background:rgba(255,255,255,.78);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)
    }
    .lock-card{
      width:min(420px,100%);border:1px solid #e6ebf1;border-radius:30px;background:#fff;
      box-shadow:0 24px 48px rgba(15,23,42,.12);padding:24px 22px 22px
    }
    .lock-title{font-size:26px;line-height:1.1;font-weight:900;color:#17191d;letter-spacing:-0.05em;margin:0 0 12px}
    .lock-desc{font-size:14px;line-height:1.65;color:#66707a;font-weight:700;margin:0 0 16px}
    .lock-input{
      width:100%;min-height:56px;border:1.5px solid #dbe5ee;border-radius:18px;padding:0 16px;outline:none;
      font-size:20px;font-weight:900;letter-spacing:.08em;text-align:center;background:#fff;margin:0 0 12px
    }
    .lock-btn{width:100%;min-height:52px;border-radius:18px;background:#0f7cff;color:#fff;font-size:16px;font-weight:900;letter-spacing:-0.02em}
    .lock-error{margin-top:10px;font-size:13px;color:#d64545;font-weight:800;min-height:18px;text-align:center}

    .more-wrap{
      display:flex;
      justify-content:center;
      margin:8px 0 28px;
    }
    .more-btn{
      min-height:42px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:14px;
      font-weight:900;
      letter-spacing:-0.02em;
    }

    .channel-icon.is-not-yet .channel-favicon,
    .site-chip.is-not-yet .site-favicon{
      opacity:.26;
      filter:none;
    }

    .channel-modal{
      position:fixed;
      inset:0;
      z-index:12120;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(17,24,39,.38);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
    }
    .channel-modal.show{display:flex}
    .channel-modal-card{
      width:min(520px, calc(100vw - 32px));
      max-height:min(80vh, 680px);
      overflow:auto;
      background:#fff;
      border:1px solid #e6ebf1;
      border-radius:26px;
      box-shadow:0 24px 48px rgba(15,23,42,.14);
      padding:22px 24px 20px;
    }
    .channel-modal-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:0 0 14px;
    }
    .channel-modal-title{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:24px;
      line-height:1.15;
      font-weight:900;
      color:#17191d;
      letter-spacing:-0.04em;
    }
    .channel-modal-favicon{
      width:28px;
      height:28px;
      border-radius:8px;
      object-fit:cover;
      flex:0 0 28px;
      border:1px solid #e5ebf2;
      background:#fff;
    }
    .channel-modal-close{
      width:36px;
      height:36px;
      border-radius:999px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:18px;
      font-weight:900;
      flex:0 0 36px;
    }
    .channel-status-row{
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
      margin:0 0 16px;
      padding:4px 2px;
    }
    .channel-radio{
      display:inline-flex;
      align-items:center;
      gap:8px;
      width:auto;
      font-size:15px;
      font-weight:900;
      color:#23262b;
    }
    .channel-radio input{
      width:18px;
      height:18px;
      margin:0;
      accent-color:#0f7cff;
    }
    .channel-links{
      display:grid;
      gap:10px;
      margin:0 0 18px;
    }
    .channel-link-row{
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto;
      gap:8px;
      align-items:center;
    }
    .channel-link-input{
      width:100%;
      min-height:46px;
      border:1.5px solid #dbe5ee;
      border-radius:14px;
      padding:0 14px;
      outline:none;
      background:#fff;
      color:#111318;
      font-size:14px;
      font-weight:700;
      letter-spacing:-0.02em;
    }
    .channel-go-btn{
      min-height:46px;
      padding:0 14px;
      border-radius:14px;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
      font-size:13px;
      font-weight:900;
      letter-spacing:-0.02em;
      white-space:nowrap;
    }
    .channel-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
    }
    .channel-action-btn{
      min-height:42px;
      padding:0 16px;
      border-radius:999px;
      font-size:14px;
      font-weight:900;
      letter-spacing:-0.02em;
      border:1px solid #dce6f1;
      background:#fff;
      color:#111318;
    }
    .channel-action-btn.primary{
      border-color:#0f7cff;
      background:#0f7cff;
      color:#fff;
    }

    @media (max-width:860px){
      .shell{padding:0 16px 40px}
      .panel-grid{grid-template-columns:1fr 1fr;gap:10px}
      .panel-card{min-height:114px;padding:18px 16px 16px;border-radius:22px}
      .panel-title{font-size:24px}
      .topbar-greeting{font-size:13px}
      .search-box{width:min(220px,100%);min-height:54px;padding:0 16px}
      .search-box:focus-within{width:min(100%, 420px)}
      .property-main{grid-template-columns:90px 1fr;gap:12px;padding:12px}
      .thumb{width:90px;height:90px;border-radius:16px}
      .card-title{font-size:20px}
      .card-address{font-size:14px}
      .card-deal-price{font-size:14px}
      .channel-row{
        grid-template-columns:repeat(9, minmax(0, 1fr));
        gap:4px;
      }
      .channel-icon{
        position:relative;
        aspect-ratio:1 / 1;
        width:100%;
        min-width:0;
        max-width:none;
        height:auto;
        min-height:auto;
        max-height:none;
        margin:0;
        border-radius:10px;
        padding:0;
        flex:none;
      }
      .channel-favicon{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        object-fit:cover;
        transform:none;
        flex-basis:auto;
      }
      .site-chip{
        position:relative;
        aspect-ratio:1 / 1;
        width:100%;
        min-width:0;
        max-width:none;
        height:auto;
        min-height:auto;
        max-height:none;
        margin:0;
        border-radius:10px;
        padding:0;
        flex:none;
      }
      .site-favicon{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        object-fit:cover;
        transform:none;
        flex-basis:auto;
      }
      .loading-buddy{
        width:64px;
        height:64px;
        border-radius:16px;
      }
      .loading-text{
        font-size:16px;
      }
      .more-btn{
        min-height:38px;
        padding:0 16px;
        font-size:13px;
      }
      .channel-modal{
        padding:16px;
      }
      .channel-modal-card{
        width:min(520px, calc(100vw - 20px));
        max-height:min(78vh, 640px);
        border-radius:22px;
        padding:20px 18px 18px;
      }
      .channel-modal-title{
        font-size:20px;
      }
      .channel-status-row{
        gap:14px;
      }
      .channel-radio{
        font-size:14px;
      }
      .channel-link-input{
        min-height:42px;
        font-size:13px;
      }
      .channel-go-btn{
        min-height:42px;
        padding:0 12px;
        font-size:12px;
      }
      .channel-action-btn{
        min-height:40px;
        padding:0 14px;
        font-size:13px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <div class="topbar">
        <div class="topbar-left">
          <a href="/" class="brand-link">Maslow Korea</a>
        </div>
        <div class="topbar-right">
          <div id="topbarGreeting" class="topbar-greeting"></div>
        </div>
      </div>

      <div class="hero-spacer"></div>

      <section class="panel-grid">
        <button class="panel-card primary" id="goAdminBtn" type="button">
          <div>
            <div class="panel-eyebrow">Create</div>
            <div class="panel-title">매물등록</div>
          </div>
          <div class="panel-desc">입력기로 이동해서 새 매물을 등록합니다.</div>
        </button>

        <button class="panel-card" id="calendarBtn" type="button">
          <div>
            <div class="panel-eyebrow">Schedule</div>
            <div class="panel-title">캘린더</div>
          </div>
          <div class="panel-desc">일정 관리 영역. 추후 연결 예정입니다.</div>
        </button>

        <button class="panel-card" id="goListingLookupBtn" type="button">
          <div>
            <div class="panel-eyebrow">Lookup</div>
            <div class="panel-title">매물조회</div>
          </div>
          <div class="panel-desc">등록된 매물 조회 페이지로 이동합니다.</div>
        </button>

        <button class="panel-card" id="commercialTeamBtn" type="button">
          <div>
            <div class="panel-eyebrow">Team</div>
            <div class="panel-icon-wrap">
              <svg class="panel-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M3 21h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M5 21V9.8c0-.5.24-.96.65-1.25l5.6-3.98a1.3 1.3 0 0 1 1.5 0l5.6 3.98c.41.29.65.75.65 1.25V21" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                <path d="M9 21v-5.2c0-.44.36-.8.8-.8h4.4c.44 0 .8.36.8.8V21" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                <path d="M9 10h.01M15 10h.01" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
              <div class="panel-title">상가 TEAM</div>
            </div>
          </div>
          <div class="panel-desc">상가·빌딩 팀 영역입니다. 추후 연결 예정입니다.</div>
        </button>
      </section>

      <section class="search-wrap">
        <div class="search-box">
          <span class="search-icon">🔎</span>
          <input id="searchInput" class="search-input" type="text" placeholder="제목, 주소, 매물번호 검색" autocomplete="off" />
        </div>
      </section>

      <section class="toolbar">
        <div class="chip-row">
          <button class="filter-chip active" data-filter="default" type="button">기본정렬</button>
          <button class="filter-chip" data-filter="updated" type="button">수정순</button>
          <button class="filter-chip" data-filter="visible" type="button">공개중</button>

    const lockOverlay = document.getElementById('lockOverlay');

    const lockError = document.getElementById('lockError');

    document.getElementById('goAdminBtn').addEventListener('click', function(){
      location.href = CONFIG.adminEditUrl;
    });

    document.getElementById('calendarBtn').addEventListener('click', function(){
      alert('캘린더는 추후 연결 예정입니다.');
    });

    document.getElementById('goListingLookupBtn').addEventListener('click', function(){
      window.open(CONFIG.listingLookupUrl, '_blank', 'noopener');

    document.getElementById('commercialTeamBtn').addEventListener('click', function(){

    });

    searchInput.addEventListener('input', function(e){
      currentKeyword = String(e.target.value || '').trim().toLowerCase();
      visibleCount = PAGE_SIZE;
      renderDashboard();
    });

    document.querySelectorAll('.filter-chip').forEach(function(btn){
      btn.addEventListener('click', function(){
        document.querySelectorAll('.filter-chip').forEach(function(x){
          x.classList.remove('active');
        });
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter') || 'default';
        visibleCount = PAGE_SIZE;
        renderDashboard();
      });
    });

    function text(v){
      return String(v == null ? '' : v).trim();
    }

    function parseJsonArraySafe(value){
      try{
        const parsed = typeof value === 'string' ? JSON.parse(value || '[]') : value;
        return Array.isArray(parsed) ? parsed : [];
      }catch(e){
        return [];
      }
    }

    function normalizeItem(raw){
      raw = raw || {};
      const photos = parseJsonArraySafe(raw.photoUrlsJson);
      const hero = photos[0] && photos[0].url ? String(photos[0].url).trim() : '';
      return {
        listingNumber: text(raw.listingNumber),
        title: text(raw.title),
        address: text(raw.address),
        dealType: text(raw.dealType),
        price: text(raw.price),
        status: text(raw.status || 'hidden').toLowerCase(),
        createdAt: text(raw.createdAt),
        updatedAt: text(raw.updatedAt),
        lastEditor: text(raw.lastEditedBy || raw.updatedBy || raw.editorName || ''),
        heroUrl: hero,

        summary1: text(raw.summary1),
        summary2: text(raw.summary2),
        summary3: text(raw.summary3),

        propertyType: text(raw.propertyType),
        zoning: text(raw.zoning),
        approvalDate: text(raw.approvalDate),

        landAreaM2: text(raw.landAreaM2),
        landAreaPy: text(raw.landAreaPy),
        totalFloorAreaM2: text(raw.totalFloorAreaM2),
        totalFloorAreaPy: text(raw.totalFloorAreaPy),
        exclusiveAreaM2: text(raw.exclusiveAreaM2),
        exclusiveAreaPy: text(raw.exclusiveAreaPy),

        buildingComposition: text(raw.buildingComposition),
        parkingCount: text(raw.parkingCount),
        entranceDirection: text(raw.entranceDirection),
        moveInDate: text(raw.moveInDate),
        floorInfo: text(raw.floorInfo),
        restroomInfo: text(raw.restroomInfo),
        maintenanceFee: text(raw.maintenanceFee),

        ceilingHeight: text(raw.ceilingHeight),
        crane: text(raw.crane),
        hoist: text(raw.hoist),
        powerCapacity: text(raw.powerCapacity),
        mainFacilities: text(raw.mainFacilities),
        recommendedUse: text(raw.recommendedUse),
        restrictedUse: text(raw.restrictedUse),
        roadWidth: text(raw.roadWidth),
        doorWidth: text(raw.doorWidth),
        truckAccess: text(raw.truckAccess),
        loadingAvailable: text(raw.loadingAvailable),
        officeIncluded: text(raw.officeIncluded),
        yardSize: text(raw.yardSize),
        readyToOperate: text(raw.readyToOperate),

        requesterName: text(raw.requesterName),
        requesterPhone: text(raw.requesterPhone),
        requesterType: text(raw.requesterType),
        requesterNote: text(raw.requesterNote),

        memo: text(raw.memo),

        channelYoutube: text(raw.channelYoutube),
        channelInstagram: text(raw.channelInstagram),
        channelThreads: text(raw.channelThreads),
        channelFacebook: text(raw.channelFacebook),
        channelNaverRealEstate: text(raw.channelNaverRealEstate),
        channelNaverBlog: text(raw.channelNaverBlog),
        channelHanbang: text(raw.channelHanbang),
        channelKakaoChannel: text(raw.channelKakaoChannel),
        channelOwnSite: text(raw.channelOwnSite)
      };
    }

    function updateGreeting(){
      if(!topbarGreeting) return;
      if(!unlockedUserName){
        topbarGreeting.textContent = '';
        return;
      }
      topbarGreeting.textContent = unlockedUserName + '님, 반갑습니다.';
    }

    function startLoadingOverlay(){
      const overlay = document.getElementById('loadingOverlay');
      const textEl = document.getElementById('loadingTypingText');
      if(!overlay || !textEl) return;
      overlay.classList.add('show');
      overlay.setAttribute('aria-hidden','false');
      textEl.textContent = '';
      let i = 0;
      const loadingText = String(currentLoadingText || '자료를 가져오고 있어요!');
      window.clearInterval(loadingTypingTimer);
      loadingTypingTimer = window.setInterval(function(){
        i += 1;
        textEl.textContent = loadingText.slice(0, i);
        if(i >= loadingText.length){
          window.clearInterval(loadingTypingTimer);
        }
      }, 85);
      if(navigator.vibrate){
        navigator.vibrate(12);
        let vibCount = 0;
        window.clearInterval(loadingHapticTimer);
        loadingHapticTimer = window.setInterval(function(){
          vibCount += 1;
          try{ navigator.vibrate(8); }catch(e){}
          if(vibCount >= 5){ window.clearInterval(loadingHapticTimer); }
        }, 520);
      }
    }

    function stopLoadingOverlay(){
      const overlay = document.getElementById('loadingOverlay');
      if(!overlay) return;
      overlay.classList.remove('show');
      overlay.setAttribute('aria-hidden','true');
      window.clearInterval(loadingTypingTimer);
      window.clearInterval(loadingHapticTimer);
      currentLoadingText = '자료를 가져오고 있어요!';
    }

    function parseChannelState(value){
      try{
        const parsed = typeof value === 'string' ? JSON.parse(value || '{}') : value;
        return {
          done: !!(parsed && parsed.done === true),
          links: [
            text(parsed && parsed.links && parsed.links[0]),
            text(parsed && parsed.links && parsed.links[1]),
            text(parsed && parsed.links && parsed.links[2])
          ]
        };
      }catch(e){
        return { done:false, links:['','',''] };
      }
    }

    function getChannelStateByItem(item, channelKey){
      const fieldName = CHANNEL_FIELD_MAP[channelKey];
      return parseChannelState(fieldName ? item[fieldName] : '');
    }

    function getItemByListingNumber(listingNumber){
      return rawItems.find(function(item){
        return text(item && item.listingNumber) === text(listingNumber);
      }) || null;
    }

    function openChannelModal(listingNumber, channelKey){
      const modal = document.getElementById('channelModal');
      const titleTextEl = document.getElementById('channelModalTitleText');
      const faviconEl = document.getElementById('channelModalFavicon');
      const link1 = document.getElementById('channelLink1');
      const link2 = document.getElementById('channelLink2');
      const link3 = document.getElementById('channelLink3');
      const radios = document.querySelectorAll('input[name="channelDoneState"]');
      const item = getItemByListingNumber(listingNumber);
      const state = item ? getChannelStateByItem(item, channelKey) : { done:false, links:['','',''] };

      channelModalListingNumber = listingNumber;
      channelModalChannelKey = channelKey;

      if(titleTextEl) titleTextEl.textContent = CHANNEL_LABEL_MAP[channelKey] || '채널';
      if(faviconEl){
        faviconEl.src = CHANNEL_ICON_MAP[channelKey] || '';
        faviconEl.alt = CHANNEL_LABEL_MAP[channelKey] || '채널';
      }
      if(link1) link1.value = state.links[0] || '';
      if(link2) link2.value = state.links[1] || '';
      if(link3) link3.value = state.links[2] || '';
      radios.forEach(function(radio){
        radio.checked = (state.done && radio.value === 'done') || (!state.done && radio.value === 'notYet');
      });
      if(modal) modal.classList.add('show');
    }

    function closeChannelModal(){
      const modal = document.getElementById('channelModal');
      if(modal) modal.classList.remove('show');
      channelModalListingNumber = '';
      channelModalChannelKey = '';
    }

    function updatePropertyChannel(listingNumber, channelKey, done, links){
      currentLoadingText = '상태 변경중이에요.';
      startLoadingOverlay();
      return fetch(CONFIG.adminListUrl, {
        method: 'POST',
        mode: 'cors',
        headers: {
          'Content-Type': 'text/plain;charset=UTF-8'
        },
        body: JSON.stringify({
          action: 'updatePropertyChannel',
          listingNumber: listingNumber,
          channelKey: channelKey,
          done: done,
          links: links
        })
      })
      .then(function(res){
        if(!res.ok) throw new Error('채널 저장 실패: ' + res.status);
        return res.json();
      })
      .then(function(data){
        if(!data || data.ok !== true){
          throw new Error((data && data.message) || '채널 저장 실패');
        }
        closeChannelModal();
        return fetchAdminItems();
      })
      .catch(function(err){
        console.error(err);
        alert((err && err.message) ? err.message : '채널 저장 중 문제가 발생했습니다.');
      })
      .finally(function(){
        stopLoadingOverlay();
      });
    }

    function openChannelLink(index){
      const input = document.getElementById('channelLink' + index);
      const url = text(input && input.value);
      if(!url) return;
      window.open(url, '_blank', 'noopener');
    }

    function saveChannelModal(){
      if(!channelModalListingNumber || !channelModalChannelKey) return;

      const listingNumber = channelModalListingNumber;
      const channelKey = channelModalChannelKey;
      const doneRadio = document.querySelector('input[name="channelDoneState"]:checked');
      const done = !!(doneRadio && doneRadio.value === 'done');
      const links = [
        text(document.getElementById('channelLink1').value),
        text(document.getElementById('channelLink2').value),
        text(document.getElementById('channelLink3').value)
      ];

      const item = getItemByListingNumber(listingNumber);
      const prevState = item ? getChannelStateByItem(item, channelKey) : { done:false, links:['','',''] };
      const isSame =
        !!prevState.done === !!done &&
        text(prevState.links[0]) === text(links[0]) &&
        text(prevState.links[1]) === text(links[1]) &&
        text(prevState.links[2]) === text(links[2]);

      closeChannelModal();

      if(isSame){
        return;
      }

      updatePropertyChannel(listingNumber, channelKey, done, links);
    }

    function setPropertyStatus(listingNumber, status){
      currentLoadingText = '상태 변경중이에요.';
      startLoadingOverlay();
      return fetch(CONFIG.adminListUrl, {
        method: 'POST',
        mode: 'cors',
        headers: {
          'Content-Type': 'text/plain;charset=UTF-8'
        },
        body: JSON.stringify({
          action: 'updatePropertyStatus',
          listingNumber: listingNumber,
          status: status
        })
      })
      .then(function(res){
        if(!res.ok) throw new Error('상태 변경 실패: ' + res.status);
        return res.json();
      })
      .then(function(data){
        if(!data || data.ok !== true){
          throw new Error((data && data.message) || '상태 변경 실패');
        }
        return fetchAdminItems();
      })
      .catch(function(err){
        console.error(err);
        alert((err && err.message) ? err.message : '상태 변경 중 문제가 발생했습니다.');
      })
      .finally(function(){
        stopLoadingOverlay();
      });
    }

    function fetchAdminItems(){
      startLoadingOverlay();
      return fetch(CONFIG.adminListUrl, {
        method: 'POST',
        mode: 'cors',
        headers: {
          'Content-Type': 'text/plain;charset=UTF-8'
        },
        body: JSON.stringify({
          action: 'listAdminProperties'
        })
      })
      .then(function(res){
        if(!res.ok) throw new Error('불러오기 실패: ' + res.status);
        return res.json();
      })
      .then(function(data){
        const items = Array.isArray(data && data.items) ? data.items : [];
        rawItems = items.map(normalizeItem);
        renderDashboard();
      })
      .catch(function(err){
        console.error(err);
        dashboardRoot.innerHTML = '<div class="empty">매물 데이터를 불러오지 못했습니다.</div>';
        toolbarMeta.textContent = '불러오기 실패';
      })
      .finally(function(){
        stopLoadingOverlay();
      });
    }

    function parseDateValue(value){
      const s = text(value);
      if(!s) return null;
      const t = new Date(s).getTime();
      return Number.isNaN(t) ? null : t;
    }

    function formatDateGroup(value){
      const ts = parseDateValue(value);
      if(!ts) return '날짜 미확인';
      const d = new Date(ts);
      const days = ['일','월','화','수','목','금','토'];
      return d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate() + ' (' + days[d.getDay()] + ')';
    }

    function formatUpdatedMeta(item){
      if(!text(item.updatedAt)) return '수정 -';
      const ts = parseDateValue(item.updatedAt);
      if(!ts) return '수정 -';
      const d = new Date(ts);
      const stamp = d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate() + ' ' +
        String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      const editor = text(item.lastEditor);
      return '수정 ' + stamp + (editor ? ' (' + escapeHtml(editor) + ')' : '');
    }

    function formatDealPrice(item){
      var dealType = text(item.dealType);
      var price = text(item.price);
      if(dealType && price) return escapeHtml(dealType + ' / ' + price);
      if(dealType) return escapeHtml(dealType);
      if(price) return escapeHtml(price);
      return '-';
    }

    function matchesKeyword(item){
      if(!currentKeyword) return true;
      const haystack = [
        item.title,
        item.address,
        item.listingNumber,
        item.dealType,
        item.price,

        item.summary1,
        item.summary2,
        item.summary3,

        item.propertyType,
        item.zoning,
        item.approvalDate,

        item.landAreaM2,
        item.landAreaPy,
        item.totalFloorAreaM2,
        item.totalFloorAreaPy,
        item.exclusiveAreaM2,
        item.exclusiveAreaPy,

        item.buildingComposition,
        item.parkingCount,
        item.entranceDirection,
        item.moveInDate,
        item.floorInfo,
        item.restroomInfo,
        item.maintenanceFee,

        item.ceilingHeight,
        item.crane,
        item.hoist,
        item.powerCapacity,
        item.mainFacilities,
        item.recommendedUse,
        item.restrictedUse,
        item.roadWidth,
        item.doorWidth,
        item.truckAccess,
        item.loadingAvailable,
        item.officeIncluded,
        item.yardSize,
        item.readyToOperate,

        item.requesterName,
        item.requesterPhone,
        item.requesterType,
        item.requesterNote,
        item.memo
      ]
      .map(function(v){ return String(v == null ? '' : v).toLowerCase(); })
      .join(' ');

      return haystack.indexOf(currentKeyword) > -1;
    }

    function applyFilter(items){
      let result = items.filter(matchesKeyword);

      if(currentFilter === 'visible'){
        result = result.filter(function(item){ return item.status === 'visible' || item.status === 'show' || item.status === '공개'; });
      }else if(currentFilter === 'hidden'){
        result = result.filter(function(item){ return !(item.status === 'visible' || item.status === 'show' || item.status === '공개'); });
      }

      if(currentFilter === 'updated'){
        result = result.slice().sort(function(a,b){
          return (parseDateValue(b.updatedAt) || 0) - (parseDateValue(a.updatedAt) || 0);
        });
      }else{
        result = result.slice().sort(function(a,b){
          return (parseDateValue(b.createdAt) || 0) - (parseDateValue(a.createdAt) || 0);
        });
      }

      return result;
    }

    function groupItems(items){
      const groups = new Map();
      items.forEach(function(item){
        const key = currentFilter === 'updated'
          ? formatDateGroup(item.updatedAt || item.createdAt)
          : formatDateGroup(item.createdAt);

        if(!groups.has(key)) groups.set(key, []);
        groups.get(key).push(item);
      });
      return Array.from(groups.entries()).map(function(entry){
        return { title: entry[0], items: entry[1] };
      });
    }

    function escapeHtml(value){
      return String(value == null ? '' : value)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function buildStatusChip(item){
      const visible = item.status === 'visible' || item.status === 'show' || item.status === '공개';
      return '<span class="status-chip ' + (visible ? 'visible' : 'hidden') + '">' + (visible ? '공개중' : '비공개') + '</span>';
    }

    function buildCard(item){
      const thumb = item.heroUrl ? "background-image:url('" + escapeHtml(item.heroUrl) + "')" : '';
      const channelHtml = CHANNELS.map(function(channel){
        const state = getChannelStateByItem(item, channel.key);
        const stateClass = state.done ? '' : ' is-not-yet';
        return '<button class="channel-icon' + stateClass + '" type="button" title="' + escapeHtml(channel.name) + '" onclick="event.stopPropagation(); openChannelModal(\'' + encodeURIComponent(item.listingNumber) + '\', \''
          + channel.key + '\')"><img class="channel-favicon" src="' + escapeHtml(channel.icon) + '" alt="' + escapeHtml(channel.name) + '"></button>';
      }).join('');
      const ownSiteState = getChannelStateByItem(item, 'ownSite');
      const ownSiteClass = ownSiteState.done ? '' : ' is-not-yet';

      return ''
        + '<article class="property-card">'
        +   '<div class="property-main" onclick="openPreview(\'' + encodeURIComponent(item.listingNumber) + '\')">'
        +     '<div class="thumb" style="' + thumb + '"></div>'
        +     '<div class="card-content">'
        +       '<div class="title-row">'
        +         '<h3 class="card-title">' + escapeHtml(item.title || '제목 없음') + '</h3>'
        +         buildStatusChip(item)
        +       '</div>'
        +       '<div class="card-address">' + escapeHtml(item.address || '-') + '</div>'
        +       '<div class="card-deal-price">' + formatDealPrice(item) + '</div>'
        +       '<div class="card-meta"><strong>' + escapeHtml(item.listingNumber || '-') + '</strong><br>' + formatUpdatedMeta(item) + '</div>'
        +     '</div>'
        +   '</div>'
        +   '<div class="card-bottom">'
        +     '<div class="action-row">'
        +       '<div class="action-left">'
        +         '<button class="mini-btn blue" type="button" onclick="event.stopPropagation(); editItem(\'' + encodeURIComponent(item.listingNumber) + '\')">수정</button>'
        +         '<button class="mini-btn" type="button" onclick="event.stopPropagation(); markVisible(\'' + encodeURIComponent(item.listingNumber) + '\')">보이기</button>'
        +         '<button class="mini-btn gray" type="button" onclick="event.stopPropagation(); markHidden(\'' + encodeURIComponent(item.listingNumber) + '\')">숨기기</button>'
        +       '</div>'
        +       ''
        +     '</div>'
        +     '<div class="channel-row">' + channelHtml + '<button class="site-chip' + ownSiteClass + '" type="button" title="자사사이트" onclick="event.stopPropagation(); openChannelModal(\'' + encodeURIComponent(item.listingNumber) + '\', \'ownSite\')"><img class="site-favicon" src="' + escapeHtml(SELF_SITE_ICON) + '" alt="자사사이트"></button></div>'
        +   '</div>'
        + '</article>';
    }

    function renderDashboard(){
      const filtered = applyFilter(rawItems);
      const totalCount = filtered.length;
      const visibleItems = filtered.slice(0, visibleCount);

      toolbarMeta.textContent = '전체 ' + totalCount + '건';

      if(!totalCount){
        dashboardRoot.innerHTML = '<div class="empty">표시할 매물이 없습니다.</div>';
        return;
      }

      const groups = groupItems(visibleItems);
      const hasMore = totalCount > visibleCount;

      dashboardRoot.innerHTML =
        groups.map(function(group){
          return ''
            + '<section class="group">'
            +   '<div class="group-head">'
            +     '<div class="group-title">' + escapeHtml(group.title) + '</div>'
            +     '<div class="group-count">' + group.items.length + '건</div>'
            +   '</div>'
            +   '<div class="card-list">' + group.items.map(buildCard).join('') + '</div>'
            + '</section>';
        }).join('')
        + (hasMore
            ? '<div class="more-wrap"><button class="more-btn" type="button" onclick="loadMoreItems()">더보기</button></div>'
            : '');
    }

    window.loadMoreItems = function(){
      visibleCount += PAGE_SIZE;
      renderDashboard();
    };

    function unlockWithPassword(){
      const pw = String(lockInput.value || '').trim();
      const matched = PASSWORD_MAP[pw];
      if(!matched){
        lockError.textContent = '비밀번호가 올바르지 않습니다.';
        return;
      }
      unlockedUserName = matched;
      sessionStorage.setItem(CONFIG.authStorageKey, matched);
      updateGreeting();
      lockOverlay.style.display = 'none';
      fetchAdminItems();
    }

    lockBtn.addEventListener('click', unlockWithPassword);
    lockInput.addEventListener('keydown', function(e){
      if(e.key === 'Enter') unlockWithPassword();
    });

    if(sessionStorage.getItem(CONFIG.authStorageKey)){
      unlockedUserName = sessionStorage.getItem(CONFIG.authStorageKey) || '';
      updateGreeting();
      lockOverlay.style.display = 'none';
      fetchAdminItems();
    }

    window.openPreview = function(listingNumber){
      startLoadingOverlay();
      const url = CONFIG.listingsUrl + '?listingNumber=' + encodeURIComponent(listingNumber) + '&open=1';
      window.open(url, '_blank');
      window.setTimeout(stopLoadingOverlay, 900);
    };

    window.editItem = function(listingNumber){
      location.href = CONFIG.adminEditUrl + '?listingNumber=' + encodeURIComponent(listingNumber);
    };

    window.markVisible = function(listingNumber){
      setPropertyStatus(listingNumber, 'visible');
    };

    window.markHidden = function(listingNumber){
      setPropertyStatus(listingNumber, 'hidden');
    };

    document.getElementById('channelModal').addEventListener('click', function(e){
      if(e.target === this) closeChannelModal();
    });

    window.addEventListener('keydown', function(e){
      if(e.key === 'Escape'){
        closeChannelModal();
      }
    });

    updateGreeting();
  </script>
</body>
</html>
